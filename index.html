<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#000"/>
<title>DAM DAM — Press Kit 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet"/>
<style>
*,*:before,*:after{box-sizing:border-box;margin:0;padding:0}
html{background:#000;scroll-behavior:smooth}
body{background:#000;overflow-x:hidden;-webkit-overflow-scrolling:touch}

/* GRAIN OVERLAY */
body:after{
  content:'';position:fixed;inset:0;z-index:8000;
  pointer-events:none;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4'/%3E%3CfeColorMatrix type='saturate'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;
}

/* SCAN LINE OVERLAY */
body:before{
  content:'';position:fixed;inset:0;z-index:7990;
  pointer-events:none;opacity:.01;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,1) 2px,rgba(0,0,0,1) 4px);
  animation:scanShift 8s linear infinite;
}
@keyframes scanShift{0%{background-position:0 0}100%{background-position:0 120px}}

/* CURSOR */
@media(hover:hover) and (pointer:fine){
body{cursor:none}
#cdot,#cring{
  position:fixed;border-radius:50%;
  pointer-events:none;z-index:9999;
  will-change:left,top;mix-blend-mode:exclusion;
}
#cdot{
  width:7px;height:7px;background:#fff;
  transform:translate(-50%,-50%);
  transition:width .1s,height .1s;
}
#cring{
  width:30px;height:30px;
  border:1px solid rgba(255,255,255,.55);
  transform:translate(-50%,-50%);
}
}

/* LOADER WITH LOGO */
#loader{
  position:fixed;inset:0;z-index:9998;
  background:#000;
  display:flex;align-items:center;justify-content:center;
  opacity:1;transition:opacity 0.8s ease, visibility 0.8s ease;
}
#loader.fade-out{
  opacity:0;
  visibility:hidden;
}
.loader-logo{
  width:180px;height:180px;
  position:relative;
  animation:loaderPulse 1.5s ease-in-out infinite;
  filter:drop-shadow(0 0 30px rgba(0,180,255,0.8)) drop-shadow(0 0 60px rgba(0,180,255,0.4));
}
.loader-logo img{
  width:100%;height:100%;
  object-fit:contain;
}
@keyframes loaderPulse{
  0%,100%{transform:scale(1);opacity:1}
  50%{transform:scale(1.15);opacity:0.85}
}

/* ELECTRIC PARTICLES */
.electric-particle{
  position:absolute;
  width:3px;height:3px;
  background:rgba(0,180,255,0.9);
  border-radius:50%;
  pointer-events:none;
  animation:particleFloat 4s infinite;
  box-shadow:0 0 8px rgba(0,180,255,0.8);
}
@keyframes particleFloat{
  0%{transform:translateY(0) translateX(0);opacity:0}
  20%{opacity:1}
  80%{opacity:1}
  100%{transform:translateY(-100px) translateX(20px);opacity:0}
}

/* PAGE SECTIONS - OPTIMIZADO PARA MÓVIL */
.page-section{
  position:relative;
  width:100%;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.page-section img{
  width:100%;
  height:auto;
  max-width:100%;
  display:block;
}

/* MÓVIL: SECCIONES SE AJUSTAN AL CONTENIDO */
@media(max-width:768px){
  .page-section{
    min-height:auto;
  }
}

/* TRANSITION SPACES WITH MORE ELECTRICITY - REDUCIDOS EN MÓVIL */
.transition-space{
  position:relative;
  width:100%;
  height:80px;
  background:#000;
  overflow:hidden;
}
@media(max-width:768px){
  .transition-space{
    height:40px;
  }
}
.transition-lightning{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0;
  pointer-events:none;
}
.transition-lightning svg{
  position:absolute;
  width:100%;
  height:100%;
}
.electric-glow{
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(ellipse at center, rgba(0,180,255,0.15) 0%, transparent 70%);
  animation:glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse{
  0%,100%{opacity:0.3}
  50%{opacity:0.7}
}

/* YOUTUBE SLIDER - RESPONSIVE Y OPTIMIZADO EN MÓVIL */
#yt-section{
  position:relative;
  width:100%;
  min-height:100vh;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:60px 20px;
  overflow:hidden;
}
@media(max-width:768px){
  #yt-section{
    min-height:auto;
    padding:40px 15px;
  }
}
#yt-section::before{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse at 50% 50%, rgba(0,180,255,0.1) 0%, transparent 60%);
  animation:glowPulse 4s ease-in-out infinite;
}
.yt-slider{
  position:relative;
  width:100%;
  max-width:1400px;
  margin:0 auto;
  z-index:1;
}
.yt-slider-track{
  position:relative;
  width:100%;
  overflow:hidden;
}
.yt-slider-container{
  display:flex;
  transition:transform 0.5s cubic-bezier(0.4,0,0.2,1);
}
.yt-slide{
  min-width:100%;
  padding:0 10px;
}
.yt-ratio{
  position:relative;
  width:100%;
  padding-bottom:56.25%;
  background:#000;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 12px 48px rgba(0,180,255,0.4), 0 0 80px rgba(0,180,255,0.2);
}
.yt-ratio iframe{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  border:0;
}
@media(min-width:1024px){
  .yt-slider{max-width:1600px}
  .yt-ratio{border-radius:20px}
  #yt-section{padding:80px 40px}
}
@media(min-width:1440px){
  .yt-slider{max-width:1800px}
}
.yt-nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:60px;height:60px;
  background:rgba(0,180,255,0.2);
  border:2px solid rgba(0,180,255,0.6);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:10;
  transition:all 0.3s ease;
  color:#fff;
  font-size:28px;
  user-select:none;
}
.yt-nav:hover{
  background:rgba(0,180,255,0.5);
  border-color:rgba(0,180,255,1);
  box-shadow:0 0 30px rgba(0,180,255,0.7);
  transform:translateY(-50%) scale(1.1);
}
.yt-nav.prev{left:15px}
.yt-nav.next{right:15px}
@media(min-width:1024px){
  .yt-nav{width:70px;height:70px;font-size:32px}
  .yt-nav.prev{left:30px}
  .yt-nav.next{right:30px}
}
.yt-dots{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:30px;
}
@media(max-width:768px){
  .yt-dots{
    margin-top:20px;
    gap:10px;
  }
}
.yt-dot{
  width:12px;height:12px;
  border-radius:50%;
  background:rgba(255,255,255,0.3);
  cursor:pointer;
  transition:all 0.3s ease;
}
.yt-dot.active{
  background:rgba(0,180,255,1);
  box-shadow:0 0 15px rgba(0,180,255,0.9);
  transform:scale(1.2);
}

/* SOCIAL BUTTONS - POSITIONED VIA HOTSPOTS */
#social-overlay{
  position:absolute;
  width:100%;
  height:100%;
  top:0;left:0;
  pointer-events:none;
}
.social-hotspot{
  position:absolute;
  border-radius:50%;
  background:rgba(0,180,255,0.15);
  border:2px solid rgba(0,180,255,0.5);
  transition:all 0.3s ease;
  cursor:pointer;
  pointer-events:all;
}
.social-hotspot:hover{
  background:rgba(0,180,255,0.3);
  border-color:rgba(0,180,255,1);
  box-shadow:0 0 25px rgba(0,180,255,0.7);
  transform:scale(1.15);
}

/* WHATSAPP BUTTON WITH LOGO - MEJORADO */
#wa{
  position:fixed;
  bottom:30px;right:30px;
  z-index:7980;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  border:2px solid rgba(0,180,255,0.4);
  border-radius:50px;
  padding:14px 26px;
  display:flex;
  align-items:center;
  gap:12px;
  cursor:pointer;
  transition:all 0.4s ease;
  text-decoration:none;
  box-shadow:0 4px 30px rgba(0,180,255,0.3), 0 0 60px rgba(0,180,255,0.1);
  animation:bookingPulse 3s ease-in-out infinite;
}
@keyframes bookingPulse{
  0%,100%{box-shadow:0 4px 30px rgba(0,180,255,0.3), 0 0 60px rgba(0,180,255,0.1)}
  50%{box-shadow:0 4px 40px rgba(0,180,255,0.5), 0 0 80px rgba(0,180,255,0.2)}
}
#wa:hover{
  transform:translateY(-4px);
  background:rgba(0,0,0,0.85);
  border-color:rgba(0,180,255,0.8);
  box-shadow:0 8px 50px rgba(0,180,255,0.5), 0 0 90px rgba(0,180,255,0.3);
  animation:none;
}
#wa-icon{
  width:38px;height:38px;
  border-radius:50%;
  overflow:hidden;
  background:transparent;
  animation:logoGlow 2s ease-in-out infinite;
}
@keyframes logoGlow{
  0%,100%{filter:drop-shadow(0 0 6px rgba(0,180,255,0.6)) drop-shadow(0 0 12px rgba(0,180,255,0.3))}
  50%{filter:drop-shadow(0 0 12px rgba(0,180,255,0.9)) drop-shadow(0 0 24px rgba(0,180,255,0.5))}
}
#wa-icon img{
  width:100%;height:100%;
  object-fit:contain;
}
#wa-text{
  color:#fff;
  font-family:'Black Ops One',system-ui;
  font-size:15px;
  letter-spacing:2px;
  text-shadow:0 0 10px rgba(0,180,255,0.6);
}
@media(min-width:1024px){
  #wa{padding:16px 30px}
  #wa-icon{width:44px;height:44px}
  #wa-text{font-size:16px}
}
@media(max-width:768px){
  #wa{
    bottom:20px;right:20px;
    padding:12px 20px;
    gap:8px;
  }
  #wa-icon{width:32px;height:32px}
  #wa-text{font-size:13px}
}

/* FOOTER WITH ELECTRIC EFFECTS - REDUCIDO EN MÓVIL */
#footer{
  width:100%;
  height:250px;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}
@media(max-width:768px){
  #footer{
    height:150px;
  }
}
#footer::before{
  content:'';
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(ellipse at 50% 0%, rgba(0,180,255,0.2) 0%, transparent 50%);
  animation:glowPulse 5s ease-in-out infinite;
}

/* LIGHTNING EFFECTS - MEJORADOS */
@keyframes lightningFlash{
  0%,100%{opacity:0}
  5%,10%{opacity:0.8}
  15%,20%{opacity:0.1}
  25%{opacity:1}
  30%,100%{opacity:0}
}

/* RAYOS ATMOSFÉRICOS EN YOUTUBE */
.ambient-lightning{
  position:absolute;
  pointer-events:none;
  z-index:0;
  opacity:0;
  animation:ambientLightning 6s ease-in-out infinite;
}
@keyframes ambientLightning{
  0%,90%,100%{opacity:0}
  92%{opacity:0.15}
  94%{opacity:0.05}
  96%{opacity:0.12}
  98%{opacity:0}
}
</style>
</head>

<script>
// LOADER
window.addEventListener('load',()=>{
  setTimeout(()=>{
    document.getElementById('loader').classList.add('fade-out');
  },1500);
});

// CUSTOM CURSOR
const cdot=document.getElementById('cdot');
const cring=document.getElementById('cring');
let mouseX=0,mouseY=0,ringX=0,ringY=0;
document.addEventListener('mousemove',(e)=>{
  mouseX=e.clientX;
  mouseY=e.clientY;
  cdot.style.left=mouseX+'px';
  cdot.style.top=mouseY+'px';
});
function animateRing(){
  ringX+=(mouseX-ringX)*0.15;
  ringY+=(mouseY-ringY)*0.15;
  cring.style.left=ringX+'px';
  cring.style.top=ringY+'px';
  requestAnimationFrame(animateRing);
}
animateRing();

// YOUTUBE SLIDER (MANUAL)
let ytIndex=0;
const ytContainer=document.getElementById('yt-container');
const ytPrev=document.getElementById('ytPrev');
const ytNext=document.getElementById('ytNext');
const ytDots=document.getElementById('ytDots');
const ytSlides=document.querySelectorAll('.yt-slide');

ytSlides.forEach((slide,i)=>{
  const dot=document.createElement('div');
  dot.classList.add('yt-dot');
  if(i===0)dot.classList.add('active');
  dot.addEventListener('click',()=>goToSlide(i));
  ytDots.appendChild(dot);
});

function updateSlider(){
  ytContainer.style.transform=`translateX(-${ytIndex*100}%)`;
  document.querySelectorAll('.yt-dot').forEach((dot,i)=>{
    dot.classList.toggle('active',i===ytIndex);
  });
}

function goToSlide(index){
  ytIndex=index;
  updateSlider();
}

ytPrev.addEventListener('click',()=>{
  ytIndex=(ytIndex-1+ytSlides.length)%ytSlides.length;
  updateSlider();
});

ytNext.addEventListener('click',()=>{
  ytIndex=(ytIndex+1)%ytSlides.length;
  updateSlider();
});

// HOTSPOT SOCIAL BUTTONS
const SPOTS=[
  {name:'Instagram',  cx:9.0,  cy:91.9, r:3.75, url:'https://www.instagram.com/damdamperreomx'},
  {name:'Facebook',   cx:18.4, cy:91.9, r:3.75, url:'https://www.facebook.com/djdamdamperreomx/'},
  {name:'TikTok',     cx:28.2, cy:91.9, r:3.75, url:'https://www.tiktok.com/@damdamperreo'},
  {name:'YouTube',    cx:37.8, cy:91.9, r:3.75, url:'https://www.youtube.com/@damdamperreomx'},
  {name:'Apple Music',cx:47.4, cy:91.9, r:3.75, url:'https://music.apple.com/mx/artist/dam-dam/309077766'},
  {name:'Spotify',    cx:57.0, cy:91.9, r:3.75, url:'https://open.spotify.com/intl-es/artist/2Tm2uw29i6VXLI2hcY4xpz?si=_zH6G3VuRG-8jG_7PpwarQ'},
  {name:'SoundCloud', cx:66.6, cy:91.9, r:3.75, url:'https://soundcloud.com/damdamperreomx'}
];

const socialOverlay=document.getElementById('social-overlay');
const p3img=document.getElementById('p3img');

function createHotspots(){
  if(!p3img.complete){
    p3img.addEventListener('load',createHotspots);
    return;
  }
  const imgRect=p3img.getBoundingClientRect();
  const imgW=p3img.naturalWidth;
  const imgH=p3img.naturalHeight;
  
  SPOTS.forEach(spot=>{
    const a=document.createElement('a');
    a.href=spot.url;
    a.target='_blank';
    a.classList.add('social-hotspot');
    a.setAttribute('aria-label',spot.name);
    
    const pxX=(spot.cx/100)*imgW;
    const pxY=(spot.cy/100)*imgH;
    const pxR=(spot.r/100)*imgW;
    
    const scaleX=imgRect.width/imgW;
    const scaleY=imgRect.height/imgH;
    
    a.style.left=`${spot.cx}%`;
    a.style.top=`${spot.cy}%`;
    a.style.width=`${spot.r*2}%`;
    a.style.height=`${(spot.r*2)*(imgW/imgH)}%`;
    a.style.transform='translate(-50%,-50%)';
    
    socialOverlay.appendChild(a);
  });
}

if(document.readyState==='complete'){
  createHotspots();
}else{
  window.addEventListener('load',createHotspots);
}

window.addEventListener('resize',()=>{
  socialOverlay.innerHTML='';
  createHotspots();
});

// TRANSITION LIGHTNING ANIMATION - MÁS FRECUENTE
const transitions=document.querySelectorAll('.transition-lightning');
let lastLightning=0;
function triggerLightning(){
  const now=Date.now();
  if(now-lastLightning>1800){
    const rand=Math.floor(Math.random()*transitions.length);
    const t=transitions[rand];
    t.style.animation='lightningFlash 0.9s ease-in-out';
    setTimeout(()=>t.style.animation='',900);
    lastLightning=now;
  }
}
setInterval(triggerLightning,2000);
window.addEventListener('scroll',()=>{
  if(Math.random()>0.7)triggerLightning();
});

// ELECTRIC PARTICLES IN FOOTER
const footer=document.getElementById('footer');
function createParticle(){
  const p=document.createElement('div');
  p.classList.add('electric-particle');
  p.style.left=Math.random()*100+'%';
  p.style.bottom='0';
  p.style.animationDelay=Math.random()*2+'s';
  footer.appendChild(p);
  setTimeout(()=>p.remove(),4000);
}
setInterval(()=>{
  if(Math.random()>0.7)createParticle();
},500);
