<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#000"/>
<title>DAM DAM — Press Kit 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:#000;scroll-behavior:smooth}
body{background:#000;overflow-x:hidden;-webkit-overflow-scrolling:touch}

/* GRAIN OVERLAY — más fino */
body::after{
  content:'';position:fixed;inset:0;z-index:8000;
  pointer-events:none;opacity:.045;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:160px;
}

/* SCAN LINE OVERLAY */
body::before{
  content:'';position:fixed;inset:0;z-index:7990;
  pointer-events:none;opacity:.012;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,1) 2px,rgba(0,0,0,1) 4px);
  animation:scanShift 8s linear infinite;
}
@keyframes scanShift{0%{background-position:0 0}100%{background-position:0 120px}}

/* CURSOR */
@media(hover:hover) and (pointer:fine){
body{cursor:none}
#cd,#cr,#ct{
  position:fixed;border-radius:50%;
  pointer-events:none;z-index:9999;
  will-change:left,top;
}
#cd{
  width:5px;height:5px;background:#3a7eff;
  transform:translate(-50%,-50%);mix-blend-mode:screen;
  transition:background .15s,width .15s,height .15s;
  box-shadow:0 0 8px 2px rgba(58,126,255,.7);
}
#cr{
  width:30px;height:30px;
  border:1px solid rgba(58,126,255,.5);
  transform:translate(-50%,-50%);mix-blend-mode:screen;
  transition:width .2s,height .2s,border-color .2s,transform .1s;
}
#ct{
  width:3px;height:3px;background:rgba(58,126,255,.4);
  transform:translate(-50%,-50%);mix-blend-mode:screen;
  transition:none;
}
body.ch #cd{width:10px;height:10px;background:#ff2d78;box-shadow:0 0 12px 3px rgba(255,45,120,.8)}
body.ch #cr{width:38px;height:38px;border-color:rgba(255,45,120,.6)}
}

/* TRAIL CANVAS */
#trail-cv{
  position:fixed;inset:0;z-index:9990;
  pointer-events:none;mix-blend-mode:screen;
}

/* LOADER */
#loader{
  position:fixed;inset:0;z-index:9500;
  background:#000;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  overflow:hidden;
}
#loader.done{animation:loaderOut 1s cubic-bezier(.7,0,.3,1) forwards}
@keyframes loaderOut{
  0% {opacity:1;transform:scale(1) translateY(0)}
  55% {opacity:1;transform:scale(1.05) translateY(-6px)}
  100%{opacity:0;transform:scale(1.1) translateY(-20px);visibility:hidden;pointer-events:none}
}
#lcv{position:absolute;inset:0;width:100%;height:100%}
.ld-logo{
  position:relative;z-index:2;
  font-family:'Black Ops One',sans-serif;
  font-size:clamp(4rem,14vw,9rem);
  letter-spacing:.06em;color:#fff;
  animation:logoIn .8s cubic-bezier(.16,1,.3,1) both,glitchLoop 4s 1.2s ease-in-out infinite;
}
.ld-logo-inner{
  background:linear-gradient(105deg,#fff 0%,#fff 20%,#3a7eff 38%,#a8ceff 50%,#3a7eff 62%,#fff 80%,#fff 100%);
  background-size:250% 100%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:logoShimmer 2.2s 0.4s ease-in-out forwards;
}
@keyframes logoIn{from{opacity:0;transform:scale(.85) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes logoShimmer{from{background-position:200% 0}to{background-position:-50% 0}}
@keyframes glitchLoop{
  0%,92%,100%{transform:translate(0,0);filter:none;opacity:1}
  93%{transform:translate(-3px,1px);filter:hue-rotate(90deg);opacity:.9;clip-path:polygon(0 15%,100% 15%,100% 45%,0 45%)}
  94%{transform:translate(3px,-1px);filter:hue-rotate(-90deg);opacity:.85;clip-path:polygon(0 55%,100% 55%,100% 80%,0 80%)}
  95%{transform:translate(-2px,2px);filter:none;opacity:1;clip-path:none}
  96%{transform:translate(2px,0);filter:saturate(3) hue-rotate(180deg);opacity:.95;clip-path:polygon(0 5%,100% 5%,100% 25%,0 25%)}
  97%{transform:translate(0,0);filter:none;opacity:1;clip-path:none}
}
.ld-sub{
  position:relative;z-index:2;
  font-family:'Black Ops One',sans-serif;
  font-size:clamp(.7rem,1.8vw,1rem);
  letter-spacing:.55em;text-transform:uppercase;
  color:rgba(255,255,255,.28);margin-top:.9rem;
  animation:fadeUp .6s .5s cubic-bezier(.16,1,.3,1) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ld-bar-wrap{
  position:relative;z-index:2;margin-top:2rem;
  width:clamp(160px,28vw,300px);height:1px;
  background:rgba(255,255,255,.07);overflow:visible;
}
.ld-bar{
  height:1px;width:0;
  background:linear-gradient(90deg,#3a7eff,#ff2d78);
  animation:ldBar 2.4s cubic-bezier(.4,0,.2,1) forwards;
  box-shadow:0 0 10px rgba(58,126,255,.8),0 0 20px rgba(255,45,120,.4);
}
@keyframes ldBar{0%{width:0%;opacity:0}5%{opacity:1}100%{width:100%;opacity:.9}}
.ld-pct{
  position:absolute;right:0;top:-18px;
  font-family:'Black Ops One',sans-serif;
  font-size:.6rem;letter-spacing:.15em;
  color:rgba(58,126,255,.7);
  animation:ldPct 2.4s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes ldPct{0%{opacity:0}5%{opacity:1}100%{opacity:.8}}
.ld-line{
  position:absolute;bottom:0;left:0;height:1px;width:0;
  background:linear-gradient(90deg,transparent,#3a7eff,#ff2d78,#a855f7,transparent);
  animation:ldLine 2.4s cubic-bezier(.4,0,.2,1) forwards;z-index:3;
}
@keyframes ldLine{0%{width:0%;opacity:0}5%{opacity:1}100%{width:100%;opacity:.8}}
.ld-veil{
  position:absolute;inset:0;z-index:1;
  background:radial-gradient(ellipse 70% 50% at 50% 50%,rgba(6,12,40,.85) 0%,transparent 70%);
}

/* PÁGINAS */
.pg{
  position:relative;width:100%;line-height:0;
  opacity:0;filter:brightness(.35) blur(4px) saturate(.5);
  transform:translateY(32px) scale(.993);
  transition:opacity 1.3s cubic-bezier(.16,1,.3,1),filter 1.3s cubic-bezier(.16,1,.3,1),transform 1.3s cubic-bezier(.16,1,.3,1);
  will-change:opacity,filter,transform;
}
.pg.in{opacity:1;filter:brightness(1) blur(0px) saturate(1);transform:translateY(0) scale(1)}
.pg.in img{animation:none}
.pg img{display:block;width:100%;height:auto}
.pg::before,.pg::after{
  content:'';position:absolute;left:0;right:0;
  height:clamp(50px,7vw,90px);pointer-events:none;z-index:2;
}
.pg::before{top:0;background:linear-gradient(to bottom,#000,transparent)}
.pg::after{bottom:0;background:linear-gradient(to top,#000,transparent)}

/* SCAN LINE TRANSITION */
.pg .scan-transition{
  position:absolute;inset:0;z-index:5;pointer-events:none;
  background:linear-gradient(to bottom,rgba(58,126,255,.06) 0%,transparent 3px);
  opacity:0;
}
.pg.in .scan-transition{
  animation:scanReveal 1.2s cubic-bezier(.16,1,.3,1) forwards;
}
@keyframes scanReveal{
  0%{opacity:1;clip-path:inset(0 0 100% 0)}
  80%{opacity:.6;clip-path:inset(0 0 0% 0)}
  100%{opacity:0;clip-path:inset(0 0 0% 0)}
}

/* PARALLAX wrapper */
.pg .parallax-img{
  display:block;width:100%;height:auto;
  will-change:transform;
}

/* SEPARADOR — TORMENTA ELÉCTRICA */
.storm{
  position:relative;width:100%;
  height:clamp(130px,20vw,240px);
  background:#000;overflow:hidden;
  opacity:0;transition:opacity .8s .3s ease;
}
.storm.in{opacity:1}
.storm canvas{position:absolute;inset:0;width:100%;height:100%}
.storm-fog{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 90% 60% at 30% 50%,rgba(10,20,70,.55) 0%,transparent 65%),
    radial-gradient(ellipse 70% 55% at 70% 50%,rgba(8,15,55,.45) 0%,transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 50%,rgba(58,126,255,.04) 0%,transparent 50%);
  pointer-events:none;animation:fogPulse 6s ease-in-out infinite;
}
@keyframes fogPulse{0%,100%{opacity:.7;transform:scaleX(1)}50%{opacity:1;transform:scaleX(1.04)}}
.storm::before,.storm::after{
  content:'';position:absolute;left:0;right:0;z-index:3;
  height:clamp(35px,5vw,60px);pointer-events:none;
}
.storm::before{top:0;background:linear-gradient(to bottom,#000,transparent)}
.storm::after{bottom:0;background:linear-gradient(to top,#000,transparent)}

/* FLASH overlay para relámpagos */
.storm-flash{
  position:absolute;inset:0;z-index:2;
  background:rgba(180,210,255,0);pointer-events:none;
  border-radius:0;
}

/* ENERGY PARTICLES */
#particles-cv{
  position:fixed;inset:0;z-index:10;
  pointer-events:none;mix-blend-mode:screen;
}

/* HOTSPOTS */
.hs-layer{position:absolute;inset:0;pointer-events:none;z-index:6}
.hs{
  position:absolute;border-radius:50%;pointer-events:auto;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle,rgba(58,126,255,.0) 0%,transparent 70%);
  transition:background .22s,box-shadow .22s,transform .3s cubic-bezier(.34,1.56,.64,1);
  animation:hsPulse 3.8s ease-in-out infinite;
}
.hs:nth-child(2){animation-delay:.6s}
.hs:nth-child(3){animation-delay:1.1s}
.hs:nth-child(4){animation-delay:1.6s}
.hs:nth-child(5){animation-delay:2.1s}
.hs:nth-child(6){animation-delay:2.6s}
.hs:nth-child(7){animation-delay:3.1s}
@keyframes hsPulse{0%,100%{box-shadow:0 0 0 0 rgba(58,126,255,0)}50%{box-shadow:0 0 0 4px rgba(58,126,255,.28)}}
.hs:hover{
  background:radial-gradient(circle,rgba(58,126,255,.28) 0%,transparent 70%);
  box-shadow:0 0 20px rgba(58,126,255,.7),0 0 40px rgba(255,45,120,.3);
  transform:translate(-50%,-50%) scale(1.22);animation:none;
}
.hs.pop{animation:hsPop .5s cubic-bezier(.16,1,.3,1) forwards}
@keyframes hsPop{0%{box-shadow:0 0 0 0 rgba(58,126,255,.9)}100%{box-shadow:0 0 0 26px rgba(58,126,255,0)}}
.hs-tip{
  position:absolute;bottom:calc(100% + 10px);left:50%;
  transform:translateX(-50%) translateY(6px);
  background:rgba(0,0,0,.96);border:1px solid rgba(58,126,255,.45);
  color:#fff;font-family:'Black Ops One',sans-serif;
  font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;
  padding:4px 12px;border-radius:999px;white-space:nowrap;opacity:0;
  pointer-events:none;
  box-shadow:0 0 12px rgba(58,126,255,.3),0 0 24px rgba(255,45,120,.1);
  transition:opacity .16s,transform .18s cubic-bezier(.16,1,.3,1);
}
.hs:hover .hs-tip{opacity:1;transform:translateX(-50%) translateY(0)}

/* WHATSAPP */
#wa{
  position:fixed;
  right:clamp(14px,3vw,28px);
  bottom:max(clamp(18px,4vw,30px), env(safe-area-inset-bottom,20px));
  z-index:7000;text-decoration:none;
  opacity:0;transform:translateY(30px) scale(.9);
  animation:waIn .8s 3s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes waIn{to{opacity:1;transform:translateY(0) scale(1)}}
.wa-pill{
  position:relative;display:flex;align-items:center;gap:11px;
  padding:.78rem 1.4rem .78rem 1.1rem;border-radius:999px;
  background:rgba(0,0,0,.85);border:1px solid rgba(255,255,255,.09);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  box-shadow:0 0 0 1px rgba(37,211,102,.0),0 8px 32px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.07);
  transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .35s,border-color .25s;
  overflow:hidden;
}
.wa-pill::before{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);
  transition:left .65s ease;
}
#wa:hover .wa-pill::before{left:160%}
#wa:hover .wa-pill{
  transform:translateY(-4px) scale(1.03);
  border-color:rgba(37,211,102,.4);
  box-shadow:0 0 0 1px rgba(37,211,102,.22),0 14px 44px rgba(0,0,0,.7),0 0 36px rgba(37,211,102,.22),inset 0 1px 0 rgba(255,255,255,.09);
}
#wa:active .wa-pill{transform:translateY(-1px) scale(.98)}
.wa-pulse{
  position:absolute;inset:-8px;border-radius:999px;pointer-events:none;
  border:1px solid rgba(37,211,102,.35);
  animation:waPulse 2.5s ease-in-out infinite;
}
.wa-pulse2{
  position:absolute;inset:-16px;border-radius:999px;pointer-events:none;
  border:1px solid rgba(37,211,102,.18);
  animation:waPulse 2.5s .6s ease-in-out infinite;
}
@keyframes waPulse{
  0%{transform:scale(1);opacity:.5}
  100%{transform:scale(1.15);opacity:0}
}
.wa-icon{position:relative;width:32px;height:32px;flex-shrink:0}
.wa-icon svg{
  width:100%;height:100%;
  filter:drop-shadow(0 0 6px rgba(37,211,102,.55));
  transition:filter .25s,transform .3s cubic-bezier(.34,1.56,.64,1);
}
#wa:hover .wa-icon svg{filter:drop-shadow(0 0 14px rgba(37,211,102,.95));transform:scale(1.14) rotate(-6deg)}
.wa-dot{
  position:absolute;top:-1px;right:-1px;
  width:10px;height:10px;background:#25d366;border-radius:50%;
  border:1.5px solid #000;animation:waDot 2s ease-in-out infinite;
}
@keyframes waDot{0%,100%{box-shadow:0 0 0 0 rgba(37,211,102,.7)}50%{box-shadow:0 0 0 6px rgba(37,211,102,0)}}
.wa-text{display:flex;flex-direction:column;gap:1px}
.wa-label{font-family:'Black Ops One',sans-serif;font-size:.75rem;letter-spacing:.1em;color:#fff;line-height:1}
.wa-sub{font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.38);line-height:1}
.wa-arr{
  display:flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:50%;
  background:rgba(255,255,255,.05);flex-shrink:0;
  transition:background .2s,transform .3s cubic-bezier(.34,1.56,.64,1);
}
#wa:hover .wa-arr{background:rgba(37,211,102,.18);transform:translateX(2px)}
.wa-arr svg{transition:stroke .2s}
#wa:hover .wa-arr svg{stroke:#25d366}
@media(max-width:480px){.wa-text,.wa-arr{display:none}.wa-pill{padding:.82rem}}

/* YOUTUBE PLAYER — Mejorado y posicionado arriba */
.yt-player-wrap{
  position:absolute;
  top:5%;
  left:50%;
  transform:translateX(-50%);
  z-index:8;
  width:90%;
  max-width:900px;
  line-height:normal;
}
.yt-player-shell{
  position:relative;width:100%;
  border-radius:16px;overflow:hidden;background:#000;
  box-shadow:
    0 0 0 1.5px rgba(58,126,255,.25),
    0 0 60px rgba(58,126,255,.35),
    0 0 120px rgba(255,45,120,.18),
    0 30px 90px rgba(0,0,0,.95);
  transition:all .5s cubic-bezier(.16,1,.3,1);
}
.yt-player-shell:hover{
  transform:scale(1.02) translateY(-4px);
  box-shadow:
    0 0 0 2px rgba(58,126,255,.45),
    0 0 80px rgba(58,126,255,.5),
    0 0 160px rgba(255,45,120,.28),
    0 40px 120px rgba(0,0,0,.98);
}
.yt-player-shell::before{
  content:'';position:absolute;inset:0;z-index:2;pointer-events:none;border-radius:16px;
  background:repeating-linear-gradient(to bottom,transparent 0px,transparent 4px,rgba(0,0,0,.03) 4px,rgba(0,0,0,.03) 5px);
  opacity:.5;
}
.yt-ratio{position:relative;width:100%;padding-top:56.25%}
.yt-ratio iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:block}
.yt-corner{position:absolute;width:24px;height:24px;z-index:3;pointer-events:none;transition:all .4s}
.yt-corner::before,.yt-corner::after{
  content:'';position:absolute;
  background:#3a7eff;
  box-shadow:0 0 14px #3a7eff,0 0 28px rgba(58,126,255,.6);
  transition:all .4s;
}
.yt-corner::before{width:2.5px;height:100%}
.yt-corner::after{width:100%;height:2.5px}
.yt-corner.tl{top:0;left:0}
.yt-corner.tr{top:0;right:0;transform:scaleX(-1)}
.yt-corner.bl{bottom:0;left:0;transform:scaleY(-1)}
.yt-corner.br{bottom:0;right:0;transform:scale(-1)}
.yt-player-shell:hover .yt-corner::before,
.yt-player-shell:hover .yt-corner::after{
  background:#ff2d78;
  box-shadow:0 0 20px #ff2d78,0 0 40px rgba(255,45,120,.7);
}
@media(max-width:768px){
  .yt-player-wrap{top:3%;width:94%;max-width:none}
}

</style>
</head>
<body>

<div id="cd"></div>
<div id="cr"></div>
<div id="ct"></div>
<canvas id="trail-cv"></canvas>
<canvas id="particles-cv"></canvas>

<div id="loader">
  <canvas id="lcv"></canvas>
  <div class="ld-veil"></div>
  <div class="ld-logo">
    <span class="ld-logo-inner">DAM DAM</span>
  </div>
  <div class="ld-sub">Press Kit 2026</div>
  <div class="ld-bar-wrap">
    <div class="ld-bar"></div>
    <div class="ld-line"></div>
    <div class="ld-pct" id="ldPct">■</div>
  </div>
</div>

<div class="pg" id="pg1">
  <img src="page1.png" alt="DAM DAM Press Kit 2026 — Portada" loading="eager" class="parallax-img"
       onerror="this.style.minHeight='80vw';this.style.background='#03050E'"/>
</div>

<div class="storm" id="st1">
  <canvas class="storm-cv"></canvas>
  <div class="storm-fog"></div>
  <div class="storm-flash"></div>
</div>

<div class="pg" id="pg2">
  <img src="page2.png" alt="DAM DAM — Biografía" loading="lazy" class="parallax-img"
       onerror="this.style.minHeight='80vw';this.style.background='#03050E'"/>
</div>

<div class="storm" id="st2">
  <canvas class="storm-cv"></canvas>
  <div class="storm-fog"></div>
  <div class="storm-flash"></div>
</div>

<div class="pg" id="pg3">
  <img src="page3.png" alt="DAM DAM — Shows y Redes Sociales" loading="lazy"
       id="p3img"
       onerror="this.style.minHeight='80vw';this.style.background='#03050E'"/>

  <!-- VIDEO PLAYER arriba de hotspots -->
  <div class="yt-player-wrap">
    <div class="yt-player-shell">
      <span class="yt-corner tl"></span>
      <span class="yt-corner tr"></span>
      <span class="yt-corner bl"></span>
      <span class="yt-corner br"></span>
      <div class="yt-ratio">
        <iframe
          src="https://www.youtube.com/embed/7Q6ZKKv2E2k?rel=0&modestbranding=1&color=white&iv_load_policy=3"
          title="DAM DAM DJ Set"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen
          loading="lazy">
        </iframe>
      </div>
    </div>
  </div>

  <div class="hs-layer" id="hsLayer"></div>

</div>

<div class="storm" id="st3">
  <canvas class="storm-cv"></canvas>
  <div class="storm-fog"></div>
  <div class="storm-flash"></div>
</div>

<div class="pg" id="pg4">
  <img src="page4.png" alt="DAM DAM — Rider Técnico" loading="lazy" class="parallax-img"
       onerror="this.style.minHeight='80vw';this.style.background='#03050E'"/>
</div>

<a href="https://wa.me/521TUNUMERO?text=Hola%20DAM%20DAM%2C%20quiero%20hablar%20de%20un%20booking" id="wa" target="_blank" rel="noopener noreferrer" aria-label="Contactar por WhatsApp">
  <div class="wa-pill">
    <span class="wa-pulse"></span>
    <span class="wa-pulse2"></span>
    <div class="wa-icon">
      <svg viewBox="0 0 32 32" fill="none"><path d="M16 2C8.3 2 2 8.3 2 16c0 2.4.6 4.8 1.8 6.8L2 30l7.4-1.9C11.3 29.4 13.6 30 16 30c7.7 0 14-6.3 14-14S23.7 2 16 2z" fill="#25D366"/><path d="M23 20.5c-.3-.2-1.8-.9-2.1-1-.3-.1-.5-.2-.7.2-.2.3-.8 1-1 1.2-.2.2-.4.2-.7.1-1.6-.8-2.7-1.4-3.8-3.1-.3-.5.3-.4.8-1.4.1-.2 0-.4 0-.5-.1-.1-.7-1.8-1-2.4-.3-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.4s1 2.8 1.2 3c.1.2 1.8 2.8 4.4 3.9 1.6.7 2.2.7 3 .6.5-.1 1.8-.7 2-1.4.2-.7.2-1.3.2-1.4-.1-.1-.3-.2-.6-.3z" fill="#FFF"/></svg>
      <span class="wa-dot"></span>
    </div>
    <div class="wa-text">
      <div class="wa-label">WhatsApp</div>
      <div class="wa-sub">Booking · Management</div>
    </div>

      <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 5h8m0 0L5.5 1.5M9 5L5.5 8.5" stroke="#fff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>
</a>

<script>
(function(){
  'use strict';
  var raf=requestAnimationFrame.bind(window);

  /* ── LOADER con contador ── */
  (function(){
    var loader=document.getElementById('loader');
    var lcv=document.getElementById('lcv');
    var pct=document.getElementById('ldPct');
    if(!loader) return;

    /* fondo de partículas del loader */
    if(lcv){
      var ctx=lcv.getContext('2d');
      var W=lcv.width=window.innerWidth,H=lcv.height=window.innerHeight;
      var pts=[];
      for(var i=0;i<60;i++)
        pts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,a:Math.random()*.5+.1,r:Math.random()*1.5+.4});
      (function lloop(){
        ctx.fillStyle='rgba(0,0,0,.06)';ctx.fillRect(0,0,W,H);
        pts.forEach(function(p){
          p.x+=p.vx;p.y+=p.vy;
          if(p.x<0)p.x=W;if(p.x>W)p.x=0;
          if(p.y<0)p.y=H;if(p.y>H)p.y=0;
          ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
          ctx.fillStyle='rgba(58,126,255,'+p.a+')';ctx.fill();
        });
        /* conexiones */
        for(var i=0;i<pts.length;i++){
          for(var j=i+1;j<pts.length;j++){
            var dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y;
            var dist=Math.sqrt(dx*dx+dy*dy);
            if(dist<120){
              ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);
              ctx.strokeStyle='rgba(58,126,255,'+(0.06*(1-dist/120))+')';ctx.lineWidth=.5;ctx.stroke();
            }
          }
        }
        raf(lloop);
      })();
    }

    /* contador */
    if(pct){
      var v=0;
      var ti=setInterval(function(){
        v=Math.min(v+(Math.random()*8+2),100);
        pct.textContent=Math.round(v)+'%';
        if(v>=100)clearInterval(ti);
      },60);
    }

    setTimeout(function(){
      loader.classList.add('done');
      setTimeout(function(){loader.style.display='none'},1050);
    },2600);
  })();

  /* ── CURSOR con trail ── */
  (function(){
    if(!window.matchMedia('(hover:hover) and (pointer:fine)').matches) return;
    var cd=document.getElementById('cd'),cr=document.getElementById('cr'),ct=document.getElementById('ct');
    var tcv=document.getElementById('trail-cv');
    var body=document.body;
    var mx=-200,my=-200,rx=-200,ry=-200;

    /* trail canvas */
    var tctx=tcv.getContext('2d');
    var TW,TH;
    function resizeTrail(){TW=tcv.width=window.innerWidth;TH=tcv.height=window.innerHeight}
    resizeTrail();
    window.addEventListener('resize',resizeTrail);

    var trail=[];
    document.addEventListener('mousemove',function(e){
      mx=e.clientX;my=e.clientY;
      cd.style.left=mx+'px';cd.style.top=my+'px';
      ct.style.left=mx+'px';ct.style.top=my+'px';
      trail.push({x:mx,y:my,a:1,r:3});
      if(trail.length>28)trail.shift();
    });

    (function anim(){
      rx+=(mx-rx)*.10;ry+=(my-ry)*.10;
      cr.style.left=rx+'px';cr.style.top=ry+'px';

      tctx.clearRect(0,0,TW,TH);
      for(var i=trail.length-1;i>=0;i--){
        var t=trail[i];
        var prog=i/trail.length;
        tctx.beginPath();
        tctx.arc(t.x,t.y,prog*2.5,0,Math.PI*2);
        tctx.fillStyle='rgba(58,126,255,'+(prog*.18)+')';
        tctx.fill();
        t.a*=.92;
      }
      raf(anim);
    })();

    var sel='a,button,.hs';
    document.addEventListener('mouseover',function(e){if(e.target.closest(sel))body.classList.add('ch')});
    document.addEventListener('mouseout',function(e){if(e.target.closest(sel))body.classList.remove('ch')});
  })();

  /* ── ENERGY PARTICLES — Más fluidos y rápidos ── */
  (function(){
    var cv=document.getElementById('particles-cv');
    if(!cv) return;
    var ctx=cv.getContext('2d');
    var W,H;
    function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight}
    resize();
    window.addEventListener('resize',function(){setTimeout(resize,50)});

    var particles=[];
    for(var i=0;i<50;i++){
      particles.push({
        x:Math.random()*W,y:Math.random()*H*2,
        vx:(Math.random()-.5)*.8,vy:-Math.random()*1.2-.3,
        a:Math.random()*.35+.08,r:Math.random()*1.5+.4,
        c:Math.random()>.5?'58,126,255':'255,45,120'
      });
    }

    (function loop(){
      ctx.clearRect(0,0,W,H);
      particles.forEach(function(p){
        p.x+=p.vx;p.y+=p.vy;
        p.a*=.998;
        if(p.y<-10||p.a<.01){
          p.x=Math.random()*W;p.y=H+10;
          p.a=Math.random()*.3+.08;p.r=Math.random()*1.5+.4;
        }
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle='rgba('+p.c+','+p.a+')';
        ctx.fill();
      });
      raf(loop);
    })();
  })();

  /* ── PÁGINAS fade in ── */
  (function(){
    var pgs=document.querySelectorAll('.pg');
    if(!pgs.length) return;

    setTimeout(function(){pgs[0].classList.add('in')},150);

    var io=new IntersectionObserver(function(entries){
      entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}});
    },{rootMargin:'0px 0px -4% 0px',threshold:.04});

    for(var i=1;i<pgs.length;i++) io.observe(pgs[i]);
  })();

  /* ── PARALLAX suave ── */
  (function(){
    var imgs=document.querySelectorAll('.parallax-img');
    if(!imgs.length||window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    var scrollY=0;
    window.addEventListener('scroll',function(){scrollY=window.scrollY},{passive:true});

    (function loop(){
      imgs.forEach(function(img){
        var pg=img.closest('.pg');if(!pg) return;
        var rect=pg.getBoundingClientRect();
        var center=(rect.top+rect.bottom)/2-window.innerHeight/2;
        var shift=center*.025;
        img.style.transform='translateY('+shift+'px)';
      });
      raf(loop);
    })();
  })();

  /* ── TORMENTAS — rayos más fluidos y rápidos ── */
  (function(){
    var storms=document.querySelectorAll('.storm');
    if(!storms.length) return;

    var sio=new IntersectionObserver(function(entries){
      entries.forEach(function(e){if(e.isIntersecting)e.target.classList.add('in')});
    },{threshold:.05});

    storms.forEach(function(s){sio.observe(s)});

    function boltPts(x1,y1,x2,y2,d){
      if(d<=0) return [[x1,y1],[x2,y2]];
      var jitter=Math.pow(2,d)*2.5;
      var mx=(x1+x2)/2+(Math.random()-.5)*jitter;
      var my=(y1+y2)/2+(Math.random()-.5)*jitter*.3;
      return boltPts(x1,y1,mx,my,d-1).concat(boltPts(mx,my,x2,y2,d-1).slice(1));
    }

    function drawBolt(ctx,pts,alpha,lw,color,glow){
      if(pts.length<2) return;

      /* outer glow */
      ctx.save();
      ctx.globalAlpha=alpha*.08;ctx.globalCompositeOperation='lighter';
      ctx.strokeStyle='rgba(30,60,180,1)';ctx.lineWidth=lw*6;
      ctx.shadowBlur=18;ctx.shadowColor='rgba(30,60,180,.9)';
      ctx.lineJoin='round';ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
      pts.slice(1).forEach(function(p){ctx.lineTo(p[0],p[1])});
      ctx.stroke();ctx.restore();

      /* core */
      ctx.save();
      ctx.globalAlpha=alpha;ctx.globalCompositeOperation='lighter';
      ctx.strokeStyle=color||'rgba(180,215,255,1)';ctx.lineWidth=lw;
      ctx.shadowBlur=glow||8;ctx.shadowColor=color||'rgba(140,190,255,.8)';
      ctx.lineJoin='round';ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
      pts.slice(1).forEach(function(p){ctx.lineTo(p[0],p[1])});
      ctx.stroke();ctx.restore();

      /* bright core */
      ctx.save();
      ctx.globalAlpha=alpha*.7;ctx.globalCompositeOperation='lighter';
      ctx.strokeStyle='rgba(230,240,255,1)';ctx.lineWidth=lw*.3;
      ctx.lineJoin='round';ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
      pts.slice(1).forEach(function(p){ctx.lineTo(p[0],p[1])});
      ctx.stroke();ctx.restore();
    }

    storms.forEach(function(storm){
      var cv=storm.querySelector('.storm-cv');
      var flash=storm.querySelector('.storm-flash');
      if(!cv) return;
      var ctx=cv.getContext('2d');
      var W,H,bolts=[],lastB=0,isVisible=false,flashA=0;

      function resize(){W=cv.width=storm.offsetWidth||window.innerWidth;H=cv.height=storm.offsetHeight||160}
      resize();
      window.addEventListener('resize',function(){setTimeout(resize,50)});

      var vis=new IntersectionObserver(function(entries){isVisible=entries[0].isIntersecting},{threshold:.01});
      vis.observe(storm);

      function spawnBolt(){
        var colors=['rgba(160,205,255,1)','rgba(130,180,255,1)','rgba(200,220,255,1)','rgba(255,200,255,1)'];
        var col=colors[Math.floor(Math.random()*colors.length)];
        var startSide=Math.random()<.5;
        var sx=startSide?-10:W+10,sy=H*(.1+Math.random()*.8);
        var ex=startSide?W+10:-10,ey=H*(.1+Math.random()*.8);
        var mainBolt={pts:boltPts(sx,sy,ex,ey,9),a:.85+Math.random()*.15,fade:.015+Math.random()*.012,lw:.7+Math.random()*.5,color:col,glow:12};
        bolts.push(mainBolt);

        /* branch bolts */
        if(Math.random()>.4){
          var bi=Math.floor(mainBolt.pts.length/2);
          var bp=mainBolt.pts[bi];
          bolts.push({pts:boltPts(bp[0],bp[1],bp[0]+(Math.random()-.5)*W*.3,H*(Math.random()>.5?-.1:1.1),6),a:.55,fade:.03,lw:.42,color:col,glow:8});
        }

        /* vertical bolts */
        if(Math.random()>.5){
          var vx=W*(.15+Math.random()*.7);
          bolts.push({pts:boltPts(vx,-5,vx+(Math.random()-.5)*80,H+5,7),a:.6,fade:.025,lw:.45,color:col,glow:9});
        }

        /* FLASH */
        flashA=Math.random()*.1+.03;
        if(flash) flash.style.background='rgba(200,220,255,'+flashA+')';
        setTimeout(function(){if(flash)flash.style.background='rgba(200,220,255,0)'},70);
      }

      function loop(ts){
        if(!isVisible){raf(loop);return}
        ctx.fillStyle='rgba(0,0,0,.08)';ctx.fillRect(0,0,W,H);

        if(!lastB)lastB=ts;
        var interval=500+Math.random()*900;
        if(ts-lastB>interval){spawnBolt();lastB=ts}

        bolts=bolts.filter(function(b){return b.a>.005});
        bolts.forEach(function(b){drawBolt(ctx,b.pts,b.a,b.lw,b.color,b.glow);b.a-=b.fade});
        raf(loop);
      }
      raf(loop);
    });
  })();

  /* ── HOTSPOTS REDES ── */
  (function(){
    var SPOTS=[
      {name:'Instagram', cx:9.0, cy:91.9,r:3.75,url:'https://www.instagram.com/damdamperreomx'},
      {name:'Facebook', cx:18.4, cy:91.9,r:3.75,url:'https://www.facebook.com/djdamdamperreomx/'},
      {name:'TikTok', cx:28.2, cy:91.9,r:3.75,url:'https://www.tiktok.com/@damdamperreo'},
      {name:'YouTube', cx:37.8, cy:91.9,r:3.75,url:'https://www.youtube.com/@damdamperreomx'},
      {name:'Apple Music',cx:47.4, cy:91.9,r:3.75,url:'https://music.apple.com/mx/artist/dam-dam/309077766'},
      {name:'Spotify', cx:57.0, cy:91.9,r:3.75,url:'https://open.spotify.com/intl-es/artist/2Tm2uw29i6VXLI2hcY4xpz?si=_zH6G3VuRG-8jG_7PpwarQ'},
      {name:'SoundCloud', cx:66.6, cy:91.9,r:3.75,url:'https://soundcloud.com/damdamperreomx'}
    ];

    var layer=document.getElementById('hsLayer');
    var img=document.getElementById('p3img');
    if(!layer||!img) return;

    function build(){
      layer.innerHTML='';
      var iw=img.offsetWidth,ih=img.offsetHeight;
      if(!iw||!ih) return;

      SPOTS.forEach(function(sp){
        var x=(sp.cx/100)*iw,y=(sp.cy/100)*ih;
        var size=(sp.r/100)*iw*2;
        var el=document.createElement('div');
        el.className='hs';
        el.style.cssText='left:'+x+'px;top:'+y+'px;width:'+size+'px;height:'+size+'px;';
        el.setAttribute('role','link');el.setAttribute('tabindex','0');el.setAttribute('aria-label',sp.name);
        var tip=document.createElement('span');tip.className='hs-tip';tip.textContent=sp.name;
        el.appendChild(tip);
        el.addEventListener('click',function(){
          el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');
          window.open(sp.url,'_blank','noopener,noreferrer');
        });
        el.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();el.click()}});
        layer.appendChild(el);
      });
    }

    if(img.complete&&img.naturalWidth)build();else img.addEventListener('load',build);
    var rt;
    window.addEventListener('resize',function(){clearTimeout(rt);rt=setTimeout(build,80)});
  })();

})();
</script>
