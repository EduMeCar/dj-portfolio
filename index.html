<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>DAM DAM — Experiencia eléctrica</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,500;14..32,700&family=Black+Ops+One&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-primary: #03050E;
      --bg-secondary: #070b1a;
      --accent-primary: #3A7EFF;
      --accent-secondary: #FF2D78;
      --accent-tertiary: #7BAEFF;
      --text-primary: #FFFFFF;
      --transition-cream: cubic-bezier(0.2, 0.9, 0.1, 1.1);
      --transition-pop: cubic-bezier(0.2, 0.9, 0.4, 1.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: "Inter", sans-serif;
      overflow-x: hidden;
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
    }

    /* FONDO RAYOS */
    #lightning-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(circle at 30% 20%, var(--bg-secondary), var(--bg-primary));
      transition: transform 0.25s ease-out;
    }

    /* CONTENIDO */
    .page-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
    }

    section {
      width: 100%;
      position: relative;
      padding: 6vh 0; /* respiro entre páginas */
    }

    .image-wrapper {
      opacity: 0;
      transform: translateY(60px) scale(0.98);
      transition:
        opacity 1.1s var(--transition-cream),
        transform 1.1s var(--transition-cream);
      filter: drop-shadow(0 20px 30px rgba(0,0,0,0.4));
      will-change: opacity, transform;
    }

    .image-wrapper.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .press-page {
      display: block;
      width: 100%;
      height: auto;
    }

    /* foco por página */
    section:not(.section-active) .press-page {
      filter: brightness(0.85) contrast(0.95);
      transform: scale(0.98);
      transition:
        filter 0.6s cubic-bezier(0.16,1,0.3,1),
        transform 0.6s cubic-bezier(0.16,1,0.3,1);
    }
    section.section-active .press-page {
      filter: brightness(1) contrast(1.03);
      transform: scale(1);
    }

    /* HOTSPOTS & HALO EN PAGE3 */
    #hotspotsContainer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }

    #socialHalo {
      position: absolute;
      left: 50%;
      bottom: 5%;
      width: 52%;
      height: 18%;
      transform: translateX(-50%);
      pointer-events: none;
      background: radial-gradient(circle at 50% 40%,
                  rgba(58,126,255,0.38) 0%,
                  rgba(58,126,255,0.10) 35%,
                  transparent 70%);
      opacity: 0.7;
      filter: blur(10px);
      mix-blend-mode: screen;
      transition: transform 0.4s ease-out, opacity 0.4s ease-out;
      z-index: 3;
    }

    .hotspot {
      position: absolute;
      cursor: pointer;
      border-radius: 50%;
      pointer-events: auto;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle,
                  rgba(58,126,255,0.25) 0%,
                  rgba(3,5,14,0.9) 55%,
                  rgba(3,5,14,1) 100%);
      box-shadow: 0 0 0 rgba(58,126,255,0);
      transition:
        transform 0.35s var(--transition-pop),
        box-shadow 0.35s var(--transition-pop),
        background-color 0.2s ease-out;
      z-index: 6;
    }

    .hotspot.pulse {
      animation: hotspotPulse 3s ease-in-out infinite;
    }

    @keyframes hotspotPulse {
      0%, 100% {
        box-shadow: 0 0 0 rgba(58,126,255,0);
        transform: translate(-50%, -50%) scale(1);
      }
      50% {
        box-shadow: 0 0 18px rgba(58,126,255,0.85);
        transform: translate(-50%, -50%) scale(1.06);
      }
    }

    .hotspot:hover {
      background-color: rgba(58,126,255,0.3);
      box-shadow:
        0 0 26px rgba(58,126,255,0.95),
        0 0 60px rgba(255,45,120,0.5);
      transform: translate(-50%, -50%) scale(1.13);
    }

    .hotspot::after {
      content: "";
      position: absolute;
      inset: 50%;
      border-radius: inherit;
      background: radial-gradient(circle,
                  rgba(255,255,255,0.8) 0%,
                  rgba(255,255,255,0) 60%);
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      pointer-events: none;
    }

    .hotspot.clicked::after {
      animation: hotspotRipple 0.55s ease-out;
    }

    @keyframes hotspotRipple {
      0% {
        transform: translate(-50%, -50%) scale(0.35);
        opacity: 0.85;
      }
      100% {
        transform: translate(-50%, -50%) scale(1.9);
        opacity: 0;
      }
    }

    .hotspot-tooltip {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translate(-50%, -100%);
      padding: 4px 11px;
      background: rgba(3,5,14,0.92);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 500;
      border-radius: 999px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      white-space: nowrap;
      border: 1px solid rgba(58,126,255,0.7);
      box-shadow: 0 6px 16px rgba(0,0,0,0.4);
      opacity: 0;
      pointer-events: none;
      transition:
        opacity 0.18s ease-out,
        transform 0.18s ease-out;
    }

    .hotspot:hover .hotspot-tooltip {
      opacity: 1;
      transform: translate(-50%, -125%);
    }

    /* BOTÓN WHATSAPP */
    .floating-brand {
      position: fixed;
      bottom: 26px;
      right: 26px;
      width: 56px;
      height: 56px;
      background: radial-gradient(circle at 30% 20%, #1a1f2e, var(--bg-primary));
      backdrop-filter: blur(12px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      cursor: pointer;
      box-shadow:
        0 0 20px rgba(58,126,255,0.35),
        0 8px 20px rgba(0,0,0,0.45);
      border: 1px solid rgba(58,126,255,0.55);
      text-decoration: none;
      transition:
        transform 0.32s var(--transition-pop),
        box-shadow 0.32s var(--transition-pop),
        border-color 0.2s ease-out;
    }

    .floating-brand span {
      font-family: "Black Ops One", monospace;
      font-size: 1.35rem;
      color: var(--accent-primary);
      text-shadow: 0 0 6px var(--accent-primary);
      transition: color 0.18s ease-out, text-shadow 0.18s ease-out;
    }

    .floating-brand:hover {
      transform: scale(1.12) translateY(-2px);
      box-shadow:
        0 0 32px rgba(58,126,255,0.85),
        0 12px 26px rgba(0,0,0,0.5);
      border-color: var(--accent-secondary);
    }

    .floating-brand:hover span {
      color: var(--accent-secondary);
      text-shadow: 0 0 10px var(--accent-secondary);
    }

    .floating-brand::after {
      content: "DAM DAM";
      position: absolute;
      right: 70px;
      white-space: nowrap;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(8px);
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-family: "Inter", sans-serif;
      letter-spacing: 0.1em;
      color: var(--text-primary);
      opacity: 0;
      border: 1px solid var(--accent-primary);
      transition: opacity 0.18s ease-out;
      pointer-events: none;
    }

    .floating-brand:hover::after {
      opacity: 1;
    }

    /* LOADER */
    .loader-overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, var(--bg-primary), #000000);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 1;
      visibility: visible;
      transition:
        opacity 0.8s var(--transition-cream),
        visibility 0.8s;
    }

    .loader-overlay.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loader-title {
      font-family: "Black Ops One", monospace;
      font-size: clamp(2.5rem, 8vw, 4rem);
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: 0.22em;
      animation: loaderGlow 1.6s ease-in-out infinite alternate;
    }

    @keyframes loaderGlow {
      0%,100% {
        text-shadow: 0 0 0 rgba(58,126,255,0);
        transform: scale(1);
      }
      50% {
        text-shadow: 0 0 18px rgba(58,126,255,0.7);
        transform: scale(1.02);
      }
    }

    .loader-bar-wrapper {
      width: 220px;
      height: 2px;
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
      margin-top: 26px;
      overflow: hidden;
      position: relative;
    }

    .loader-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
      border-radius: 2px;
      animation: loaderProgress 2.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes loaderProgress {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    .loader-sub {
      margin-top: 18px;
      font-size: 0.7rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
    }

    @media (max-width: 768px) {
      #socialHalo {
        width: 70%;
        height: 22%;
      }
      .floating-brand {
        width: 50px;
        height: 50px;
        bottom: 20px;
        right: 20px;
      }
      .floating-brand span {
        font-size: 1.15rem;
      }
    }
  </style>
</head>
<body>

  <canvas id="lightning-canvas" aria-hidden="true"></canvas>

  <div class="loader-overlay" id="loader">
    <div class="loader-title">DAM DAM</div>
    <div class="loader-bar-wrapper"><div class="loader-bar"></div></div>
    <div class="loader-sub">experiencia eléctrica</div>
  </div>

  <div class="page-wrapper">
    <section>
      <div class="image-wrapper">
        <img src="page1.png" alt="DAM DAM" class="press-page" loading="lazy" />
      </div>
    </section>

    <section>
      <div class="image-wrapper">
        <img src="page2.png" alt="DAM DAM" class="press-page" loading="lazy" />
      </div>
    </section>

    <section style="position: relative;">
      <div class="image-wrapper" style="position: relative;">
        <img src="page3.png"
             alt="Presentaciones y redes"
             class="press-page"
             id="socialImage"
             style="width:100%; height:auto; display:block;" />
        <div id="socialHalo"></div>
        <div id="hotspotsContainer"></div>
      </div>
    </section>

    <section>
      <div class="image-wrapper">
        <img src="page4.png" alt="DAM DAM" class="press-page" loading="lazy" />
      </div>
    </section>
  </div>

  <a href="https://wa.me/34666666666?text=Hola%20DAM%20DAM"
     class="floating-brand"
     target="_blank"
     rel="noopener noreferrer">
    <span>⚡</span>
  </a>

  <script>
    (function() {
      const CONFIG = {
        LOADER_DURATION: 2600,
        LIGHTNING: {
          BASE_INTERVAL: 1700,
          RANDOM_INTERVAL: 1400,
          BASE_STEP: 22,
          MAX_STEPS: 16,
          VARIANCE: 32,
          BRANCHES: 2,
          PARTICLES: 20,
          BLUR: 22,
          FADE: 0.05,
          PERSIST: 0.02
        },
        COLORS: {
          MAIN: "#3A7EFF",
          BRANCH: "#7BAEFF",
          P_START: "rgba(200,220,255,1)",
          P_END: "rgba(58,126,255,0)"
        }
      };

      let state = {
        w: window.innerWidth,
        h: window.innerHeight,
        mouseX: window.innerWidth / 2,
        mouseY: window.innerHeight / 2,
        lastStrike: 0,
        resizeTimeout: null
      };

      function init() {
        setupLoader();
        setupFadeIn();
        setupSectionFocus();
        setupSocialHotspots();
        setupParallax();
        setupLightning();
      }

      /* LOADER */
      function setupLoader() {
        setTimeout(() => {
          const loader = document.getElementById('loader');
          if (!loader) return;
          loader.classList.add('hidden');
          setTimeout(() => loader.remove(), 900);
        }, CONFIG.LOADER_DURATION);
      }

      /* FADE IN */
      function setupFadeIn() {
        const wrappers = document.querySelectorAll('.image-wrapper');
        if (!wrappers.length) return;

        const obs = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
              obs.unobserve(entry.target);
            }
          });
        }, { threshold: 0.18, rootMargin: "0px 0px -10% 0px" });

        wrappers.forEach(w => obs.observe(w));
      }

      /* FLASH SECCIÓN + FOCO */
      function flashForSection(sectionIndex) {
        const canvas = document.getElementById('lightning-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const level = 0.25 + 0.18 * sectionIndex;
        const midY = level * state.h;

        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.shadowBlur = 28;
        ctx.shadowColor = CONFIG.COLORS.MAIN;

        ctx.beginPath();
        const startX = state.w * 0.12;
        const endX   = state.w * 0.88;
        const baseY  = midY + (Math.random() - 0.5) * 18;

        const segments = 16;
        for (let i = 0; i <= segments; i++) {
          const t = i / segments;
          const x = startX + (endX - startX) * t;
          const y = baseY + (Math.random() - 0.5) * 22;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = CONFIG.COLORS.MAIN;
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.restore();
      }

      function setupSectionFocus() {
        const sections = document.querySelectorAll('section');
        if (!sections.length) return;

        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (!entry.isIntersecting) return;

            sections.forEach(s => s.classList.remove('section-active'));
            entry.target.classList.add('section-active');

            const index = Array.from(sections).indexOf(entry.target);
            flashForSection(index);
          });
        }, { threshold: 0.55 });

        sections.forEach(s => observer.observe(s));
      }

      /* HOTSPOTS RRSS */
      function setupSocialHotspots() {
        const container = document.getElementById('hotspotsContainer');
        const img = document.getElementById('socialImage');
        const halo = document.getElementById('socialHalo');
        if (!container || !img || !halo) return;

        const R = 4.0; // radio en % del ancho
        const spots = [
          { name: "Instagram",   cx: 8.94,  cy: 97.00, r: R, url: "https://instagram.com/damdam" },
          { name: "Facebook",    cx: 18.76, cy: 91.82, r: R, url: "https://facebook.com/damdam" },
          { name: "TikTok",      cx: 28.06, cy: 91.77, r: R, url: "https://tiktok.com/@damdam" },
          { name: "YouTube",     cx: 37.76, cy: 91.82, r: R, url: "https://youtube.com/@damdam" },
          { name: "Apple Music", cx: 47.59, cy: 91.59, r: R, url: "https://music.apple.com" },
          { name: "Spotify",     cx: 57.06, cy: 92.00, r: R, url: "https://open.spotify.com" },
          { name: "SoundCloud",  cx: 66.59, cy: 91.95, r: R, url: "https://soundcloud.com" }
        ];

        function render() {
          const rect = img.getBoundingClientRect();
          const w = rect.width;
          const h = rect.height;
          container.innerHTML = "";

          spots.forEach(spot => {
            const x = (spot.cx / 100) * w;
            const y = (spot.cy / 100) * h;
            const size = (spot.r / 100) * w * 2;

            const el = document.createElement("div");
            el.className = "hotspot pulse";
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            el.style.width = `${size}px`;
            el.style.height = `${size}px`;

            const tt = document.createElement("span");
            tt.className = "hotspot-tooltip";
            tt.textContent = spot.name;
            el.appendChild(tt);

            el.addEventListener("click", (e) => {
              e.stopPropagation();
              el.classList.remove("clicked");
              void el.offsetWidth; // reinicia la animación
              el.classList.add("clicked");
              window.open(spot.url, "_blank", "noopener");
            });

            container.appendChild(el);
          });
        }

        render();
        window.addEventListener("resize", () => {
          clearTimeout(state.resizeTimeout);
          state.resizeTimeout = setTimeout(render, 80);
        });

        window.addEventListener("mousemove", (e) => {
          const rect = img.getBoundingClientRect();
          const relX = ((e.clientX - rect.left) / rect.width) - 0.5;
          const relY = ((e.clientY - rect.top) / rect.height) - 0.5;
          halo.style.transform =
            `translateX(-50%) translate(${relX * 14}px, ${relY * 10}px)`;
          halo.style.opacity = "0.9";
        });
        window.addEventListener("mouseleave", () => {
          halo.style.transform = "translateX(-50%)";
          halo.style.opacity = "0.7";
        });
      }

      /* PARALLAX CANVAS */
      function setupParallax() {
        const canvas = document.getElementById('lightning-canvas');
        if (!canvas) return;

        window.addEventListener("mousemove", (e) => {
          const relX = (e.clientX / window.innerWidth - 0.5) * 8;
          const relY = (e.clientY / window.innerHeight - 0.5) * 6;
          canvas.style.transform = `translate(${relX}px, ${relY}px)`;
          state.mouseX = e.clientX;
          state.mouseY = e.clientY;
        });
      }

      /* RAYOS DE FONDO */
      function setupLightning() {
        const canvas = document.getElementById('lightning-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        function resize() {
          state.w = window.innerWidth;
          state.h = window.innerHeight;
          canvas.width = state.w;
          canvas.height = state.h;
        }
        resize();
        window.addEventListener("resize", () => {
          clearTimeout(state.resizeTimeout);
          state.resizeTimeout = setTimeout(resize, 120);
        });

        function loop(time) {
          if (!state.lastStrike) state.lastStrike = time;
          const elapsed = time - state.lastStrike;
          const interval = CONFIG.LIGHTNING.BASE_INTERVAL +
                          Math.random() * CONFIG.LIGHTNING.RANDOM_INTERVAL;

          if (elapsed > interval) {
            drawBolt(ctx, true);
            state.lastStrike = time;
          } else {
            ctx.fillStyle = `rgba(0,0,0,${CONFIG.LIGHTNING.PERSIST})`;
            ctx.fillRect(0,0,state.w,state.h);
          }
          requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
      }

      function drawBolt(ctx, followMouse) {
        ctx.fillStyle = `rgba(0,0,0,${CONFIG.LIGHTNING.FADE})`;
        ctx.fillRect(0,0,state.w,state.h);

        const targetX = followMouse ? state.mouseX : state.w * (0.3 + Math.random() * 0.4);
        const targetY = followMouse ? state.mouseY * 0.6 + 40 : state.h * (0.3 + Math.random() * 0.4);

        let x = Math.random() * state.w;
        let y = -20;
        const segments = [];
        let steps = 0;

        while (y < targetY && steps < CONFIG.LIGHTNING.MAX_STEPS) {
          const nx = x + (targetX - x) * 0.16 + (Math.random() - 0.5) * CONFIG.LIGHTNING.VARIANCE;
          const ny = y + CONFIG.LIGHTNING.BASE_STEP + Math.random() * 16;
          segments.push({ x1: x, y1: y, x2: nx, y2: ny });
          x = nx; y = ny; steps++;
        }

        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        ctx.shadowBlur = CONFIG.LIGHTNING.BLUR;
        ctx.shadowColor = CONFIG.COLORS.MAIN;
        ctx.beginPath();
        ctx.strokeStyle = CONFIG.COLORS.MAIN;
        ctx.lineWidth = 2.2;

        segments.forEach(s => {
          ctx.moveTo(s.x1, s.y1);
          ctx.lineTo(s.x2, s.y2);
        });
        ctx.stroke();
        ctx.restore();

        for (let i = 0; i < CONFIG.LIGHTNING.BRANCHES; i++) {
          const s = segments[Math.floor(Math.random() * segments.length)];
          if (!s) continue;
          ctx.beginPath();
          ctx.moveTo(s.x2, s.y2);
          const bx = s.x2 + (Math.random() - 0.5) * 55;
          const by = s.y2 + 20 + Math.random() * 30;
          ctx.lineTo(bx, by);
          ctx.strokeStyle = CONFIG.COLORS.BRANCH;
          ctx.lineWidth = 1.4;
          ctx.stroke();
        }

        for (let i = 0; i < CONFIG.LIGHTNING.PARTICLES; i++) {
          const s = segments[Math.floor(Math.random() * segments.length)];
          if (!s) continue;
          const t = Math.random();
          const px = s.x1 + (s.x2 - s.x1) * t;
          const py = s.y1 + (s.y2 - s.y1) * t;
          const r = 1.5 + Math.random() * 3.5;

          const g = ctx.createRadialGradient(px,py,0,px,py,r*3);
          g.addColorStop(0, CONFIG.COLORS.P_START);
          g.addColorStop(1, CONFIG.COLORS.P_END);
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(px,py,r*2.2,0,Math.PI*2);
          ctx.fill();
        }
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
