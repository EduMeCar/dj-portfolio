<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>DAM DAM - Press Kit 2026</title>

  <!-- Meta básico para responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google Fonts: Black Ops One y Barlow Condensed -->
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ----------------------------------------------------
       VARIABLES DE COLOR Y CONFIGURACIÓN GLOBAL
       ---------------------------------------------------- */
    :root {
      --bg-main: #03050E;
      --primary: #3A7EFF;          /* Azul eléctrico */
      --accent: #FF2D78;           /* Rosa acento */
      --text-main: #FFFFFF;
      --nav-bg-scrolled: rgba(3, 5, 14, 0.9);
      --nav-blur: 18px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: "Barlow Condensed", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      scroll-behavior: smooth;
      overflow-x: hidden;
    }

    body {
      position: relative;
    }

    /* ----------------------------------------------------
       CANVAS DE RELÁMPAGOS (FONDO)
       ---------------------------------------------------- */
    #lightning-canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
      background: radial-gradient(circle at top, #050818 0%, #020309 50%, #000000 100%);
    }

    /* ----------------------------------------------------
       LAYOUT GENERAL
       ---------------------------------------------------- */
    .page-wrapper {
      position: relative;
      z-index: 1;
    }

    section {
      width: 100%;
    }

    .image-section {
      position: relative;
      width: 100%;
      overflow: hidden;
    }

    .image-wrapper {
      width: 100%;
      transform: translateY(40px);
      opacity: 0;
      transition: opacity 0.9s ease-out, transform 0.9s ease-out;
      will-change: opacity, transform;
    }

    .image-wrapper.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .press-page {
      display: block;
      width: 100%;
      height: auto;
      border: none;
      outline: none;
      margin: 0;
      padding: 0;
    }

    /* ----------------------------------------------------
       NAV STICKY
       ---------------------------------------------------- */
    .main-nav {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 6vw;
      color: var(--text-main);
      background: linear-gradient(to bottom, rgba(3, 5, 14, 0.95), rgba(3, 5, 14, 0));
      transition: background-color 0.3s ease, backdrop-filter 0.3s ease, box-shadow 0.3s ease;
      backdrop-filter: blur(0px);
    }

    .main-nav.scrolled {
      background-color: var(--nav-bg-scrolled);
      backdrop-filter: blur(var(--nav-blur));
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6);
    }

    .nav-logo {
      font-family: "Black Ops One", system-ui;
      font-size: 1.5rem;
      letter-spacing: 0.12em;
      color: var(--primary);
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      align-items: center;
      font-size: 0.95rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .nav-links a {
      position: relative;
      color: var(--text-main);
      text-decoration: none;
      padding-bottom: 4px;
      transition: color 0.2s ease;
    }

    .nav-links a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      height: 2px;
      width: 0;
      background: linear-gradient(to right, var(--primary), var(--accent));
      transition: width 0.2s ease;
    }

    .nav-links a:hover {
      color: var(--primary);
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    @media (max-width: 720px) {
      .nav-links {
        gap: 1rem;
        font-size: 0.8rem;
      }
      .main-nav {
        padding-inline: 4vw;
      }
      .nav-logo {
        font-size: 1.25rem;
      }
    }

    /* ----------------------------------------------------
       CURSOR PERSONALIZADO
       ---------------------------------------------------- */
    @media (min-width: 768px) { body.custom-cursor-active {
      cursor: none;
    }

    .cursor-dot,
    .cursor-ring {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      mix-blend-mode: screen;
    }

@media (min-width: 768px) {
                               .cursor-dot {
      width: 8px;
      height: 8px;
      background: var(--primary);
      box-shadow: 0 0 8px rgba(58, 126, 255, 0.8), 0 0 16px rgba(58, 126, 255, 0.8);
    }

    .cursor-ring {
      width: 34px;
      height: 34px;
      border: 2px solid var(--primary);
      box-shadow: 0 0 20px rgba(58, 126, 255, 0.5);
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.1s ease;
    }

    .cursor-hover-link .cursor-dot {
      background: var(--accent);
      box-shadow: 0 0 10px rgba(255, 45, 120, 0.9), 0 0 20px rgba(255, 45, 120, 0.9);
    }

    .cursor-hover-link .cursor-ring {
      border-color: var(--accent);
      box-shadow: 0 0 26px rgba(255, 45, 120, 0.9);
    }
  }

    /* ----------------------------------------------------
       LOADER FULLSCREEN
       ---------------------------------------------------- */
    .loader-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: radial-gradient(circle at top, #050a1a 0%, #020309 50%, #000000 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 26px;
      transition: opacity 0.55s ease-out, visibility 0.55s ease-out;
    }

    .loader-overlay.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loader-title {
      font-family: "Black Ops One", system-ui;
      font-size: clamp(2.4rem, 7vw, 3.7rem);
      color: var(--primary);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(58, 126, 255, 0.9), 0 0 36px rgba(58, 126, 255, 0.9);
      animation: pulseGlow 1.3s ease-in-out infinite alternate;
    }

    @keyframes pulseGlow {
      0% {
        transform: scale(1);
        text-shadow: 0 0 6px rgba(58, 126, 255, 0.8), 0 0 20px rgba(58, 126, 255, 0.6);
      }
      100% {
        transform: scale(1.08);
        text-shadow: 0 0 16px rgba(58, 126, 255, 1), 0 0 40px rgba(58, 126, 255, 0.9);
      }
    }

    .loader-bar-wrapper {
      width: min(380px, 70vw);
      height: 6px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 999px;
      overflow: hidden;
      box-shadow: 0 0 26px rgba(0, 0, 0, 0.6);
    }

    .loader-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--primary));
      border-radius: 999px;
      animation: loaderProgress 2.4s ease-out forwards;
    }

    @keyframes loaderProgress {
      0% { width: 0%; }
      30% { width: 35%; }
      60% { width: 72%; }
      100% { width: 100%; }
    }

    .loader-subtitle {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: rgba(255, 255, 255, 0.7);
    }

    /* ----------------------------------------------------
       HOTSPOTS SOBRE PAGE3 (SHOWS) – POSICIONES EN PX
       ---------------------------------------------------- */
    .hotspots-wrapper {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .hotspot {
      position: absolute;
      width: 50px;   /* ancho del área clickeable */
      height: 50px;  /* alto del área clickeable */
      pointer-events: auto;
      cursor: pointer;
    }

    .hotspot a {
      display: block;
      width: 100%;
      height: 100%;
      text-decoration: none;
    }

    .hotspot-tooltip {
      position: absolute;
      bottom: 110%;
      left: 50%;
      transform: translateX(-50%);
      padding: 5px 10px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      border-radius: 999px;
      white-space: nowrap;
      background: rgba(3, 5, 14, 0.94);
      color: #ffffff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      border: 1px solid rgba(58, 126, 255, 0.6);
      box-shadow: 0 0 12px rgba(58, 126, 255, 0.7);
    }

    .hotspot:hover .hotspot-tooltip {
      opacity: 1;
      transform: translate(-50%, -4px);
    }

    /* ----------------------------------------------------
       SECCIÓN CONTACTO FINAL
       ---------------------------------------------------- */
    .contact-section {
      background-color: #020309;
      padding: 64px 8vw 80px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .contact-inner {
      max-width: 960px;
      margin: 0 auto;
      text-align: center;
    }

    .contact-title {
      font-family: "Black Ops One", system-ui;
      font-size: clamp(2.2rem, 6vw, 3.3rem);
      color: var(--text-main);
      letter-spacing: 0.12em;
      margin-bottom: 32px;
      text-transform: uppercase;
    }

    .contact-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      margin-bottom: 40px;
    }

    .contact-btn {
      position: relative;
      padding: 10px 22px;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      border-radius: 999px;
      border: 1px solid rgba(58, 126, 255, 0.8);
      color: var(--text-main);
      background: radial-gradient(circle at top left, rgba(58, 126, 255, 0.3), transparent 60%);
      box-shadow: 0 0 18px rgba(0, 0, 0, 0.7);
      cursor: pointer;
      text-decoration: none;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .contact-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(58, 126, 255, 0.25), rgba(255, 45, 120, 0.25));
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .contact-btn span {
      position: relative;
      z-index: 1;
    }

    .contact-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 26px rgba(58, 126, 255, 0.7);
      border-color: var(--accent);
      background: radial-gradient(circle at top left, rgba(255, 45, 120, 0.4), transparent 60%);
    }

    .contact-btn:hover::after {
      opacity: 1;
    }

    .contact-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 24px;
      margin-top: 10px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-number {
      font-family: "Black Ops One", system-ui;
      font-size: clamp(1.6rem, 4vw, 2.1rem);
      color: var(--primary);
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .stat-label {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: rgba(255, 255, 255, 0.7);
    }

    @media (max-width: 840px) {
      .contact-stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 520px) {
      .contact-stats {
        grid-template-columns: 1fr;
      }
    }

    /* ----------------------------------------------------
       BOTÓN FLOTANTE RIDER PDF
       ---------------------------------------------------- */
    .floating-rider-btn {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 15;
      padding: 10px 18px;
      border-radius: 999px;
      background: radial-gradient(circle at top left, rgba(58, 126, 255, 0.85), rgba(3, 5, 14, 1));
      color: var(--text-main);
      border: 1px solid rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      gap: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-size: 0.8rem;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 0 22px rgba(0, 0, 0, 0.8);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      backdrop-filter: blur(10px);
    }

    .floating-rider-btn .icon {
      font-size: 1rem;
    }

    .floating-rider-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 32px rgba(58, 126, 255, 0.9);
      background: radial-gradient(circle at top left, rgba(255, 45, 120, 0.9), rgba(3, 5, 14, 1));
    }

    @media (max-width: 480px) {
      .floating-rider-btn {
        right: 14px;
        bottom: 14px;
        padding-inline: 14px;
        letter-spacing: 0.12em;
      }
    }

    /* ----------------------------------------------------
       ANCLAS
       ---------------------------------------------------- */
    .anchor-target {
      scroll-margin-top: 20px;
    }
  </style>
</head>

  <script>
    // NAV

    // CURSOR PERSONALIZADO
    (function() {
      const dot = document.getElementById("cursorDot");
      const ring = document.getElementById("cursorRing");
      const body = document.body;

      let mouseX = window.innerWidth / 2;
      let mouseY = window.innerHeight / 2;
      let ringX = mouseX;
      let ringY = mouseY;

      const lerp = (a, b, t) => a + (b - a) * t;

      window.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        dot.style.transform = `translate(${mouseX - 50}%, ${mouseY - 50}%)`;
      });

      const render = () => {
        ringX = lerp(ringX, mouseX, 0.25);
        ringY = lerp(ringY, mouseY, 0.16);
        ring.style.transform = `translate(${ringX - 50}%, ${ringY - 50}%)`;
        requestAnimationFrame(render);
      };
      render();

      const interactive = "a, button, .contact-btn, .floating-rider-btn, .hotspot a";

      document.addEventListener("mouseover", (e) => {
        if (e.target.closest(interactive)) body.classList.add("cursor-hover-link");
      });
      document.addEventListener("mouseout", (e) => {
        if (e.target.closest(interactive)) body.classList.remove("cursor-hover-link");
      });
    })();

    // LOADER
    (function() {
      const loader = document.getElementById("loader");
      setTimeout, () => {
                loader.classList.add("hidden");
            }, 2800);
    })();

    // CANVAS RELÁMPAGOS
    (function() {
      const canvas = document.getElementById("lightning-canvas");
      const ctx = canvas.getContext("2d");

      let width = window.innerWidth;
      let height = window.innerHeight;
      let lastStrikeTime = 0;

      const resize = () => {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      };
      resize();
      window.addEventListener("resize", resize);

      function drawLightning() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.16)";
        ctx.fillRect(0, 0, width, height);

        const startX = Math.random() * width;
        const startY = -40;
        const endY = height * (0.4 + Math.random() * 0.4);

        const segments = [];
        let x = startX;
        let y = startY;
        const step = 18 + Math.random() * 8;

        while (y < endY) {
          const nextX = x + (Math.random() - 0.5) * 40;
          const nextY = y + step + Math.random() * 14;
          segments.push({ x1: x, y1: y, x2: nextX, y2: nextY });
          x = nextX;
          y = nextY;
        }

        ctx.save();
        ctx.globalCompositeOperation = "lighter";

        const drawPath = (segs, thickness, colorMain, glowColor) => {
          ctx.strokeStyle = colorMain;
          ctx.lineWidth = thickness;
          ctx.shadowColor = glowColor;
          ctx.shadowBlur = 22;
          ctx.beginPath();
          segs.forEach((s, i) => {
            if (i === 0) ctx.moveTo(s.x1, s.y1);
            ctx.lineTo(s.x2, s.y2);
          });
          ctx.stroke();
        };

        drawPath(
          segments,
          3,
          "rgba(160, 200, 255, 0.8)",
          "rgba(58, 126, 255, 1)"
        );

        drawPath(
          segments,
          1.4,
          "rgba(210, 230, 255, 0.9)",
          "rgba(120, 180, 255, 1)"
        );

        const branchCount = 3 + Math.floor(Math.random() * 3);
        for (let i = 0; i < branchCount; i++) {
          const startSeg = segments[Math.floor(Math.random() * segments.length)];
          const branchSegments = [];
          let bx = startSeg.x2;
          let by = startSeg.y2;
          const branchLength = 2 + Math.floor(Math.random() * 4);

          for (let j = 0; j < branchLength; j++) {
            const angle = (Math.random() - 0.5) * Math.PI / 2;
            const len = 18 + Math.random() * 14;
            const nx = bx + Math.cos(angle) * len;
            const ny = by + Math.sin(angle) * len;
            branchSegments.push({ x1: bx, y1: by, x2: nx, y2: ny });
            bx = nx;
            by = ny;
          }

          drawPath(
            branchSegments,
            1.2,
            "rgba(140, 200, 255, 0.8)",
            "rgba(58, 126, 255, 0.8)"
          );
        }

        const particles = 26;
        for (let i = 0; i < particles; i++) {
          const seg = segments[Math.floor(Math.random() * segments.length)];
          const t = Math.random();
          const px = seg.x1 + (seg.x2 - seg.x1) * t + (Math.random() - 0.5) * 18;
          const py = seg.y1 + (seg.y2 - seg.y1) * t + (Math.random() - 0.5) * 18;
          const radius = 1 + Math.random() * 2.5;

          const grad = ctx.createRadialGradient(px, py, 0, px, py, radius * 5);
          grad.addColorStop(0, "rgba(170, 220, 255, 1)");
          grad.addColorStop(0.5, "rgba(58, 126, 255, 0.8)");
          grad.addColorStop(1, "rgba(0, 0, 0, 0)");

          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(px, py, radius * 5, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }

      function animate(timestamp) {
        if (!lastStrikeTime) lastStrikeTime = timestamp;

        const elapsed = timestamp - lastStrikeTime;
        const interval = 2000 + Math.random() * 1000;

        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, width, height);

        if (elapsed > interval) {
          drawLightning();
          lastStrikeTime = timestamp;
        }

        requestAnimationFrame(animate);
      }

      requestAnimationFrame(animate);
    })();

    // CONTADORES
    (function() {
      const counters = document.querySelectorAll(".stat-number");
      let started = false;

      const formatNumber = (n) => {
        if (n >= 1000000) return (n / 1000000).toFixed(1).replace(".0", "") + "M";
        if (n >= 1000) return (n / 1000).toFixed(1).replace(".0", "") + "K";
        return n.toString();
      };

      const startCounters = () => {
        if (started) return;
        started = true;

        counters.forEach(counter => {
          const target = parseInt(counter.getAttribute("data-target"), 10) || 0;
          let current = 0;
          const duration = 1600;
          const startTime = performance.now();

          const step = (now) => {
            const progress = Math.min((now - startTime) / duration, 1);
            const eased = 1 - Math.pow(1 - progress, 3);
            current = Math.floor(target * eased);
            counter.textContent = formatNumber(current);
            if (progress < 1) requestAnimationFrame(step);
            else counter.textContent = formatNumber(target);
          };
          requestAnimationFrame(step);
        });
      };

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            startCounters();
            observer.disconnect();
          }
        });
      }, { threshold: 0.25 });

      const contactSection = document.getElementById("contact");
      observer.observe(contactSection);
    })();
  </script>
