<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#000"/>
<title>DAM DAM — Press Kit 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:#000;scroll-behavior:smooth}
body{background:#000;overflow-x:hidden;-webkit-overflow-scrolling:touch}

/* GRAIN OVERLAY */
body::after{
  content:'';position:fixed;inset:0;z-index:8000;
  pointer-events:none;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;
}

/* SCAN LINE OVERLAY */
body::before{
  content:'';position:fixed;inset:0;z-index:7990;
  pointer-events:none;opacity:.01;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,1) 2px,rgba(0,0,0,1) 4px);
  animation:scanShift 8s linear infinite;
}
@keyframes scanShift{0%{background-position:0 0}100%{background-position:0 120px}}

/* CURSOR */
@media(hover:hover) and (pointer:fine){
body{cursor:none}
#cdot,#cring{
  position:fixed;border-radius:50%;
  pointer-events:none;z-index:9999;
  will-change:left,top;mix-blend-mode:exclusion;
}
#cdot{
  width:7px;height:7px;background:#fff;
  transform:translate(-50%,-50%);
  transition:width .1s,height .1s;
}
#cring{
  width:30px;height:30px;
  border:1px solid rgba(255,255,255,.55);
  transform:translate(-50%,-50%);
  transition:width .16s,height .16s;
}
body.hov #cdot{width:11px;height:11px}
body.hov #cring{width:42px;height:42px;border-color:rgba(255,255,255,.85)}
}

/* TRAIL CANVAS */
#tcv{
  position:fixed;inset:0;z-index:9990;
  pointer-events:none;mix-blend-mode:screen;
}

/* PÁGINAS */
.pg{
  position:relative;width:100%;line-height:0;overflow:hidden;
  opacity:0;clip-path:inset(0 0 100% 0);
  transition:opacity .01s,clip-path .9s cubic-bezier(.76,0,.24,1);
  will-change:clip-path;
}
.pg.in{opacity:1;clip-path:inset(0 0 0% 0)}
.pg img{display:block;width:100%;height:auto;will-change:transform}
.pg::before,.pg::after{
  content:'';position:absolute;left:0;right:0;pointer-events:none;z-index:4;
}
.pg::before{top:0;height:clamp(35px,4.5vw,65px);background:linear-gradient(to bottom,#000,transparent)}
.pg::after{bottom:0;height:clamp(35px,4.5vw,65px);background:linear-gradient(to top,#000,transparent)}

/* PAGE 1 INTRO ELECTRICO */
#pg1{
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
}
#pg1 img{
  width:100%;max-width:100vw;height:auto;
  animation:pgIntro 1.8s cubic-bezier(.16,1,.3,1) forwards;
}
@keyframes pgIntro{
  0%{opacity:0;transform:scale(1.1) translateY(30px);filter:blur(16px) brightness(.2)}
  100%{opacity:1;transform:scale(1) translateY(0);filter:blur(0) brightness(1)}
}

/* YOUTUBE PAGE DEDICADA */
#pgYT{
  position:relative;width:100%;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background:#000;
}
#pgYT canvas{
  position:absolute;inset:0;width:100%;height:100%;
  opacity:.25;
}
.yt-container{
  position:relative;z-index:10;
  width:90%;max-width:800px;
  padding:clamp(20px,4vw,40px);
}
.yt-shell{
  position:relative;width:100%;
  border-radius:12px;overflow:hidden;background:#000;
  box-shadow:
    0 0 0 1px rgba(58,126,255,.2),
    0 0 50px rgba(58,126,255,.25),
    0 0 100px rgba(168,85,247,.12),
    0 30px 80px rgba(0,0,0,.95);
  transition:all .4s cubic-bezier(.16,1,.3,1);
}
.yt-shell:hover{
  transform:scale(1.018) translateY(-6px);
  box-shadow:
    0 0 0 2px rgba(58,126,255,.45),
    0 0 70px rgba(58,126,255,.4),
    0 0 140px rgba(168,85,247,.22),
    0 40px 100px rgba(0,0,0,1);
}
.yt-ratio{position:relative;width:100%;padding-top:56.25%}
.yt-ratio iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.yt-shell .ck{position:absolute;width:18px;height:18px;z-index:5;pointer-events:none;transition:all .3s}
.yt-shell .ck::before,.yt-shell .ck::after{
  content:'';position:absolute;
  background:#3a7eff;
  box-shadow:0 0 10px rgba(58,126,255,.8),0 0 20px rgba(58,126,255,.4);
  transition:all .3s;
}
.yt-shell .ck::before{width:2.5px;height:100%}
.yt-shell .ck::after{width:100%;height:2.5px}
.yt-shell .ck.tl{top:0;left:0}
.yt-shell .ck.tr{top:0;right:0;transform:scaleX(-1)}
.yt-shell .ck.bl{bottom:0;left:0;transform:scaleY(-1)}
.yt-shell .ck.br{bottom:0;right:0;transform:scale(-1)}
.yt-shell:hover .ck::before,.yt-shell:hover .ck::after{
  background:#a855f7;
  box-shadow:0 0 16px rgba(168,85,247,.9),0 0 32px rgba(168,85,247,.5);
}

/* STORM */
.storm{
  position:relative;width:100%;
  height:clamp(90px,12vw,160px);
  background:#000;overflow:hidden;
  opacity:0;transition:opacity .45s ease;
}
.storm.in{opacity:1}
.storm canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
.storm::before,.storm::after{
  content:'';position:absolute;left:0;right:0;z-index:3;
  pointer-events:none;height:clamp(24px,3vw,44px);
}
.storm::before{top:0;background:linear-gradient(to bottom,#000,transparent)}
.storm::after{bottom:0;background:linear-gradient(to top,#000,transparent)}

/* HOTSPOTS */
.hs-layer{position:absolute;inset:0;pointer-events:none;z-index:6}
.hs{
  position:absolute;border-radius:50%;pointer-events:auto;
  transform:translate(-50%,-50%);
  transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .18s;
  animation:hsp 3.5s ease-in-out infinite;
}
.hs:nth-child(2){animation-delay:.5s}
.hs:nth-child(3){animation-delay:1s}
.hs:nth-child(4){animation-delay:1.5s}
.hs:nth-child(5){animation-delay:2s}
.hs:nth-child(6){animation-delay:2.5s}
.hs:nth-child(7){animation-delay:3s}
@keyframes hsp{0%,100%{box-shadow:0 0 0 0 rgba(58,126,255,0)}50%{box-shadow:0 0 0 4px rgba(58,126,255,.28)}}
.hs:hover{
  transform:translate(-50%,-50%) scale(1.28);animation:none;
  box-shadow:0 0 20px rgba(58,126,255,.85),0 0 40px rgba(255,45,120,.3);
}
.hs-tip{
  position:absolute;bottom:calc(100% + 8px);left:50%;
  transform:translateX(-50%) translateY(4px);
  background:rgba(0,0,0,.96);border:1px solid rgba(58,126,255,.48);
  color:#fff;font-family:'Black Ops One',sans-serif;
  font-size:.54rem;letter-spacing:.16em;text-transform:uppercase;
  padding:3px 10px;border-radius:999px;white-space:nowrap;opacity:0;
  pointer-events:none;
  transition:opacity .13s,transform .13s cubic-bezier(.16,1,.3,1);
}
.hs:hover .hs-tip{opacity:1;transform:translateX(-50%) translateY(0)}

/* WHATSAPP PROFESIONAL CON AURICULARES */
#wa{
  position:fixed;
  right:clamp(14px,3vw,26px);
  bottom:max(clamp(16px,3.5vw,26px),env(safe-area-inset-bottom,18px));
  z-index:7000;text-decoration:none;
  opacity:0;transform:translateY(18px) scale(.93);
  animation:waIn .65s 2.2s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes waIn{to{opacity:1;transform:translateY(0) scale(1)}}
.wa-r1,.wa-r2{
  position:absolute;inset:-10px;border-radius:999px;pointer-events:none;
  border:1px solid rgba(58,126,255,.3);
  animation:waRing 2.3s ease-out infinite;
}
.wa-r2{inset:-20px;border-color:rgba(168,85,247,.18);animation-delay:.7s}
@keyframes waRing{0%{transform:scale(1);opacity:.5}100%{transform:scale(1.28);opacity:0}}
.wa-pill{
  position:relative;display:flex;align-items:center;gap:10px;
  padding:.7rem 1.2rem .7rem .95rem;border-radius:999px;
  background:rgba(4,4,14,.95);border:1px solid rgba(58,126,255,.22);
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  box-shadow:0 8px 28px rgba(0,0,0,.85),inset 0 1px 0 rgba(255,255,255,.05);
  overflow:hidden;
  transition:transform .28s cubic-bezier(.34,1.56,.64,1),box-shadow .28s,border-color .2s;
}
.wa-pill::before{
  content:'';position:absolute;inset:0;border-radius:999px;
  background:linear-gradient(105deg,transparent 30%,rgba(58,126,255,.06) 50%,transparent 70%);
  background-size:200% 100%;background-position:200% 0;
  transition:background-position .55s ease;
}
#wa:hover .wa-pill::before{background-position:-50% 0}
#wa:hover .wa-pill{
  transform:translateY(-3px) scale(1.03);
  border-color:rgba(58,126,255,.5);
  box-shadow:0 12px 38px rgba(0,0,0,.9),0 0 32px rgba(58,126,255,.25),0 0 60px rgba(168,85,247,.12);
}
#wa:active .wa-pill{transform:scale(.97)}
.wa-ico{
  position:relative;width:32px;height:32px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.wa-ico svg{
  width:28px;height:28px;
  filter:drop-shadow(0 0 5px rgba(58,126,255,.6));
  transition:filter .22s,transform .28s cubic-bezier(.34,1.56,.64,1);
}
#wa:hover .wa-ico svg{
  filter:drop-shadow(0 0 12px rgba(58,126,255,1)) drop-shadow(0 0 24px rgba(168,85,247,.5));
  transform:scale(1.14) rotate(-8deg);
}
.wa-pulse{
  position:absolute;top:0;right:0;
  width:9px;height:9px;background:#3a7eff;border-radius:50%;
  border:1.5px solid #000;animation:wpls 1.7s ease-in-out infinite;
}
@keyframes wpls{0%,100%{box-shadow:0 0 0 0 rgba(58,126,255,.8)}50%{box-shadow:0 0 0 5px rgba(58,126,255,0)}}
.wa-txt{display:flex;flex-direction:column;gap:2px}
.wa-lbl{font-family:'Black Ops One',sans-serif;font-size:.68rem;letter-spacing:.08em;color:#fff;line-height:1}
.wa-slbl{font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.32);line-height:1}
.wa-arr{
  width:20px;height:20px;border-radius:50%;flex-shrink:0;
  background:rgba(58,126,255,.08);border:1px solid rgba(58,126,255,.18);
  display:flex;align-items:center;justify-content:center;
  transition:background .18s,transform .24s cubic-bezier(.34,1.56,.64,1);
}
#wa:hover .wa-arr{background:rgba(58,126,255,.2);transform:translateX(2px)}
@media(max-width:440px){.wa-txt,.wa-arr{display:none}.wa-pill{padding:.78rem}}

</style>
</head>
<body>

<div id="cdot" aria-hidden="true"></div>
<div id="cring" aria-hidden="true"></div>
<canvas id="tcv" aria-hidden="true"></canvas>

<!-- PAGE 1 INTRO -->
<div class="pg" id="pg1">
  <img src="page1.webp" alt="DAM DAM Press Kit 2026 — Portada" loading="eager"
       onerror="this.style.minHeight='75vw';this.style.background='#06080F'"/>
</div>

<!-- STORM 1 -->
<div class="storm" id="st1"><canvas></canvas></div>

<!-- YOUTUBE PAGE DEDICADA -->
<div id="pgYT">
  <canvas id="ytBg"></canvas>
  <div class="yt-container">
    <div class="yt-shell">
      <span class="ck tl"></span><span class="ck tr"></span>
      <span class="ck bl"></span><span class="ck br"></span>
      <div class="yt-ratio">
        <iframe
          src="https://www.youtube.com/embed/7Q6ZKKv2E2k?rel=0&modestbranding=1&color=white&iv_load_policy=3"
          title="DAM DAM DJ Set"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen loading="lazy">
        </iframe>
      </div>
    </div>
  </div>
</div>

<!-- STORM 2 -->
<div class="storm" id="st2"><canvas></canvas></div>

<!-- PAGE 2 -->
<div class="pg" id="pg2">
  <img src="page2.webp" alt="DAM DAM — Biografía" loading="lazy"
       onerror="this.style.minHeight='75vw';this.style.background='#06080F'"/>
</div>

<!-- STORM 3 -->
<div class="storm" id="st3"><canvas></canvas></div>

<!-- PAGE 3 -->
<div class="pg" id="pg3">
  <img src="page3.webp" alt="DAM DAM — Shows y Redes Sociales" id="p3img" loading="lazy"
       onerror="this.style.minHeight='75vw';this.style.background='#06080F'"/>
  <div class="hs-layer" id="hsLayer"></div>
</div>

<!-- STORM 4 -->
<div class="storm" id="st4"><canvas></canvas></div>

<!-- PAGE 4 -->
<div class="pg" id="pg4">
  <img src="page4.webp" alt="DAM DAM — Rider Técnico" loading="lazy"
       onerror="this.style.minHeight='75vw';this.style.background='#06080F'"/>
</div>

<!-- WA BUTTON CON AURICULARES -->
<a id="wa" href="https://wa.me/521TUNUMERO?text=Hola%20DAM%20DAM%2C%20quiero%20hablar%20de%20un%20booking" target="_blank" rel="noopener noreferrer" aria-label="Booking por WhatsApp">
  <div class="wa-r1" aria-hidden="true"></div>
  <div class="wa-r2" aria-hidden="true"></div>
  <div class="wa-pill">
    <div class="wa-ico">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 16v-2.5a10 10 0 0 1 20 0V16" stroke="#3a7eff" stroke-width="1.8" stroke-linecap="round"/>
        <rect x="2" y="15" width="4.5" height="7.5" rx="2.2" fill="#3a7eff"/>
        <rect x="21.5" y="15" width="4.5" height="7.5" rx="2.2" fill="#a855f7"/>
        <path d="M6.5 22.5c0 2.2 1.6 3.2 3.2 3.2H11" stroke="#3a7eff" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="11.8" cy="25.7" r="1.6" fill="#a855f7"/>
        <line x1="14" y1="3.5" x2="14" y2="6" stroke="rgba(58,126,255,.4)" stroke-width="1" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="wa-pulse"></div>
    <div class="wa-txt">
      <span class="wa-lbl">Booking</span>
      <span class="wa-slbl">WhatsApp · Management</span>
    </div>
    <div class="wa-arr">
      <svg width="9" height="9" viewBox="0 0 9 9" fill="none" stroke="rgba(58,126,255,.75)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1.5 4.5h6M4.5 2L7 4.5 4.5 7"/>
      </svg>
    </div>
  </div>
</a>

<script>
(function(){
  'use strict';
  var raf=requestAnimationFrame.bind(window);

  /* ── CURSOR TRAIL ── */
  (function(){
    if(!matchMedia('(hover:hover) and (pointer:fine)').matches) return;
    var dot=document.getElementById('cdot'),ring=document.getElementById('cring');
    var tcv=document.getElementById('tcv'),tc=tcv.getContext('2d');
    var TW,TH;
    function rsz(){TW=tcv.width=innerWidth;TH=tcv.height=innerHeight}
    rsz();window.addEventListener('resize',rsz);
    var mx=-200,my=-200,rx=-200,ry=-200,trail=[];
    document.addEventListener('mousemove',function(e){
      mx=e.clientX;my=e.clientY;
      dot.style.left=mx+'px';dot.style.top=my+'px';
      trail.push({x:mx,y:my});
      if(trail.length>18)trail.shift();
    });
    function loop(){
      rx+=(mx-rx)*.1;ry+=(my-ry)*.1;
      ring.style.left=rx+'px';ring.style.top=ry+'px';
      tc.clearRect(0,0,TW,TH);
      for(var i=trail.length-1;i>0;i--){
        var p=trail[i],q=trail[i-1],pr=i/trail.length;
        tc.beginPath();tc.moveTo(p.x,p.y);tc.lineTo(q.x,q.y);
        tc.strokeStyle='rgba(58,126,255,'+(pr*.1)+')';
        tc.lineWidth=pr*2.2;tc.stroke();
      }
      raf(loop);
    }
    loop();
    document.addEventListener('mouseover',function(e){if(e.target.closest('a,button,.hs'))document.body.classList.add('hov')});
    document.addEventListener('mouseout',function(e){if(e.target.closest('a,button,.hs'))document.body.classList.remove('hov')});
  })();

  /* ── PÁGINAS reveal ── */
  (function(){
    var pgs=document.querySelectorAll('.pg');
    if(!pgs.length) return;
    setTimeout(function(){pgs[0].classList.add('in')},180);
    var io=new IntersectionObserver(function(entries){
      entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}});
    },{rootMargin:'0px 0px -5% 0px',threshold:.03});
    for(var i=1;i<pgs.length;i++)io.observe(pgs[i]);
  })();

  /* ── PARALLAX ── */
  (function(){
    if(matchMedia('(prefers-reduced-motion:reduce)').matches) return;
    var imgs=document.querySelectorAll('.pg img');
    function loop(){
      imgs.forEach(function(img){
        var pg=img.closest('.pg');if(!pg||!pg.classList.contains('in'))return;
        var r=pg.getBoundingClientRect();
        if(r.bottom<-100||r.top>innerHeight+100)return;
        img.style.transform='translateY('+((r.top+r.height/2-innerHeight/2)*.02)+'px)';
      });
      raf(loop);
    }
    loop();
  })();

  /* ── YOUTUBE BG rayos sutiles ── */
  (function(){
    var cv=document.getElementById('ytBg');
    if(!cv) return;
    var ctx=cv.getContext('2d');
    var W,H,bolts=[],next=0;
    function rsz(){W=cv.width=innerWidth;H=cv.height=innerHeight}
    rsz();window.addEventListener('resize',function(){setTimeout(rsz,50)});

    function fractal(x1,y1,x2,y2,d){
      if(d<=0)return[[x1,y1],[x2,y2]];
      var mx=(x1+x2)/2,my=(y1+y2)/2;
      var dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
      if(len<.5)return[[x1,y1],[x2,y2]];
      var perp=(len*((Math.random()-.5)*.22))-(d*.015);
      mx+=(-dy/len)*perp;my+=(dx/len)*perp;
      return fractal(x1,y1,mx,my,d-1).concat(fractal(mx,my,x2,y2,d-1).slice(1));
    }

    function drawBolt(pts,alpha,lw){
      if(pts.length<2)return;
      ctx.save();ctx.globalCompositeOperation='lighter';
      ctx.strokeStyle='rgba(160,200,255,'+(alpha*.15)+')';
      ctx.lineWidth=lw*3;ctx.lineJoin='round';ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
      for(var i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);
      ctx.stroke();ctx.restore();
      ctx.save();ctx.globalCompositeOperation='lighter';
      ctx.strokeStyle='rgba(180,210,255,'+(alpha*.3)+')';
      ctx.lineWidth=lw;ctx.lineJoin='round';ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
      for(var i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);
      ctx.stroke();ctx.restore();
    }

    function spawn(){
      var sd=Math.random()<.5;
      var sx=sd?-8:W+8,sy=H*(.15+Math.random()*.7);
      var ex=sd?W+8:-8,ey=H*(.15+Math.random()*.7);
      bolts.push({pts:fractal(sx,sy,ex,ey,8),a:.7,f:.008,lw:.6});
    }

    function loop(ts){
      if(ts>next){spawn();next=ts+(1200+Math.random()*1800)}
      ctx.fillStyle='rgba(0,0,0,.12)';ctx.fillRect(0,0,W,H);
      bolts=bolts.filter(function(b){return b.a>.01});
      bolts.forEach(function(b){drawBolt(b.pts,b.a,b.lw);b.a-=b.f});
      raf(loop);
    }
    raf(loop);
  })();

  /* ── STORMS ── */
  (function(){
    var storms=document.querySelectorAll('.storm');
    if(!storms.length) return;
    var sio=new IntersectionObserver(function(e){e.forEach(function(x){if(x.isIntersecting)x.target.classList.add('in')})},{threshold:.05});
    storms.forEach(function(s){sio.observe(s)});

    function fractal(x1,y1,x2,y2,d){
      if(d<=0)return[[x1,y1],[x2,y2]];
      var mx=(x1+x2)/2,my=(y1+y2)/2;
      var dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
      if(len<.5)return[[x1,y1],[x2,y2]];
      var perp=(len*((Math.random()-.5)*.28))-(d*.018);
      mx+=(-dy/len)*perp;my+=(dx/len)*perp;
      return fractal(x1,y1,mx,my,d-1).concat(fractal(mx,my,x2,y2,d-1).slice(1));
    }

    function drawBolt(ctx,pts,alpha,lw,r,g,b){
      if(pts.length<2)return;
      ctx.save();ctx.globalCompositeOperation='lighter';
      ctx.shadowBlur=18;ctx.shadowColor='rgba('+r+','+g+','+b+',.5)';
      ctx.strokeStyle='rgba('+r+','+g+','+b+','+(alpha*.18)+')';
      ctx.lineWidth=lw*4;ctx.lineJoin='round';ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
      for(var i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);
      ctx.stroke();ctx.restore();
      ctx.save();ctx.globalCompositeOperation='lighter';
      ctx.strokeStyle='rgba('+r+','+g+','+b+','+alpha+')';
      ctx.lineWidth=lw;ctx.lineJoin='round';ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
      for(var i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);
      ctx.stroke();ctx.restore();
      ctx.save();ctx.globalCompositeOperation='lighter';
      ctx.strokeStyle='rgba(235,245,255,'+(alpha*.6)+')';
      ctx.lineWidth=lw*.2;ctx.lineJoin='round';ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
      for(var i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);
      ctx.stroke();ctx.restore();
    }

    storms.forEach(function(storm){
      var cv=storm.querySelector('canvas');if(!cv)return;
      var ctx=cv.getContext('2d');
      var W,H,bolts=[],next=0,vis=false;
      function rsz(){W=cv.width=storm.offsetWidth||innerWidth;H=cv.height=storm.offsetHeight||120}
      rsz();window.addEventListener('resize',function(){setTimeout(rsz,35)});
      var vo=new IntersectionObserver(function(e){vis=e[0].isIntersecting},{threshold:.01});
      vo.observe(storm);

      function spawn(){
        var cols=[[160,200,255],[180,160,255],[200,220,255],[220,180,255]];
        var col=cols[Math.floor(Math.random()*cols.length)];
        var sd=Math.random()<.5;
        var sx=sd?-8:W+8,sy=H*(.08+Math.random()*.84);
        var ex=sd?W+8:-8,ey=H*(.08+Math.random()*.84);
        bolts.push({pts:fractal(sx,sy,ex,ey,9),a:.9+Math.random()*.1,f:.014+Math.random()*.01,lw:.8+Math.random()*.5,c:col});
        if(Math.random()<.42){
          var main=bolts[bolts.length-1].pts;
          var bi=Math.floor(main.length*(.35+Math.random()*.3));
          var bp=main[Math.min(bi,main.length-1)];
          var ang=(Math.random()-.5)*1.4;
          var bl=H*(.35+Math.random()*.4);
          bolts.push({pts:fractal(bp[0],bp[1],bp[0]+Math.sin(ang)*bl,bp[1]+Math.cos(ang)*bl,6),a:.5,f:.028,lw:.38,c:col});
        }
      }

      function loop(ts){
        if(!vis){raf(loop);return}
        if(ts>next){spawn();next=ts+(550+Math.random()*850)}
        ctx.fillStyle='rgba(0,0,0,.1)';ctx.fillRect(0,0,W,H);
        bolts=bolts.filter(function(b){return b.a>.008});
        bolts.forEach(function(b){drawBolt(ctx,b.pts,b.a,b.lw,b.c[0],b.c[1],b.c[2]);b.a-=b.f});
        raf(loop);
      }
      raf(loop);
    });
  })();

  /* ── HOTSPOTS REDES ── */

      {name:'Spotify', cx:57.0, cy:91.9,r:3.75,url:'https://open.spotify.com/intl-es/artist/2Tm2uw29i6VXLI2hcY4xpz?si=_zH6G3VuRG-8jG_7PpwarQ'},
      {name:'SoundCloud', cx:66.6, cy:91.9,r:3.75,url:'https://soundcloud.com/damdamperreomx'}
    ];
    var layer=document.getElementById('hsLayer');
    var img=document.getElementById('p3img');
    if(!layer||!img) return;
    function build(){
      layer.innerHTML='';
      var iw=img.offsetWidth,ih=img.offsetHeight;
      if(!iw||!ih) return;
      SPOTS.forEach(function(sp){
        var x=(sp.cx/100)*iw,y=(sp.cy/100)*ih;
        var sz=(sp.r/100)*iw*2;
        var el=document.createElement('div');
        el.className='hs';
        el.style.cssText='left:'+x+'px;top:'+y+'px;width:'+sz+'px;height:'+sz+'px;';
        el.setAttribute('role','link');el.setAttribute('tabindex','0');el.setAttribute('aria-label',sp.name);
        var tip=document.createElement('span');tip.className='hs-tip';tip.textContent=sp.name;
        el.appendChild(tip);
        el.addEventListener('click',function(){window.open(sp.url,'_blank','noopener,noreferrer')});
        el.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();el.click()}});
        layer.appendChild(el);
      });
    }
    if(img.complete&&img.naturalWidth)build();else img.addEventListener('load',build);
    var rt;window.addEventListener('resize',function(){clearTimeout(rt);rt=setTimeout(build,55)});
  })();

})();
