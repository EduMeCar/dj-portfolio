<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#000"/>
<title>DAM DAM — Press Kit 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet"/>
<style>
*,*:before,*:after{box-sizing:border-box;margin:0;padding:0}
html{background:#000;scroll-behavior:smooth}
body{background:#000;overflow-x:hidden;-webkit-overflow-scrolling:touch}

/* GRAIN OVERLAY */
body:after{
  content:'';position:fixed;inset:0;z-index:8000;
  pointer-events:none;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4'/%3E%3CfeColorMatrix type='saturate'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;
}

/* SCAN LINE OVERLAY */
body:before{
  content:'';position:fixed;inset:0;z-index:7990;
  pointer-events:none;opacity:.01;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,1) 2px,rgba(0,0,0,1) 4px);
  animation:scanShift 8s linear infinite;
}
@keyframes scanShift{0%{background-position:0 0}100%{background-position:0 120px}}

/* CURSOR */
@media(hover:hover) and (pointer:fine){
body{cursor:none}
#cdot,#cring{
  position:fixed;border-radius:50%;
  pointer-events:none;z-index:9999;
  will-change:left,top;mix-blend-mode:exclusion;
}
#cdot{
  width:7px;height:7px;background:#fff;
  transform:translate(-50%,-50%);
  transition:width .1s,height .1s;
}
#cring{
  width:30px;height:30px;
  border:1px solid rgba(255,255,255,.55);
  transform:translate(-50%,-50%);
  transition:width .2s,height .2s,border-color .2s;
}
}

/* PAGE BASE */
.page{
  position:relative;width:100%;min-height:100vh;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  overflow:hidden;
}

/* STORM CANVAS */
#trail-cv,#particles-cv{
  position:fixed;inset:0;width:100%;height:100%;z-index:1;
  pointer-events:none;opacity:1;
}

/* PAGE 1 (INTRO) */
#pg1{
  width:100%;min-height:100vh;position:relative;z-index:10;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  background:linear-gradient(180deg,rgba(0,0,40,1) 0%,rgba(0,0,0,1) 100%);
  padding:40px 20px;
}
#pg1 img{
  max-width:90%;width:clamp(300px,70vw,900px);
  height:auto;display:block;
  filter:drop-shadow(0 0 30px rgba(0,150,255,0.7));
}

/* YOUTUBE SECTION - SLIDER */
.youtube-section{
  position:relative;width:100%;min-height:100vh;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  background:linear-gradient(180deg,rgba(0,0,40,1) 0%,rgba(0,0,0,1) 100%);
  padding:60px 20px;z-index:10;
}

.yt-slider-container{
  position:relative;z-index:10;
  width:95%;max-width:1400px;
  padding:clamp(20px,4vw,40px);
}

.yt-slider{
  position:relative;overflow:hidden;
  border-radius:16px;
  box-shadow:0 10px 50px rgba(0,150,255,0.3);
}

.yt-track{
  display:flex;transition:transform 0.5s ease;
}

.yt-slide{
  min-width:100%;position:relative;
}

.yt-ratio{
  position:relative;width:100%;padding-top:56.25%;
}

.yt-ratio iframe{
  position:absolute;inset:0;width:100%;height:100%;border:none;
}

.yt-controls{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  display:flex;gap:12px;z-index:20;
}

.yt-dot{
  width:12px;height:12px;border-radius:50%;
  background:rgba(255,255,255,0.3);
  border:2px solid rgba(255,255,255,0.5);
  cursor:pointer;transition:all 0.3s;
}

.yt-dot.active{
  background:rgba(0,150,255,1);
  border-color:rgba(0,150,255,1);
  box-shadow:0 0 15px rgba(0,150,255,0.8);
}

.yt-arrows{
  position:absolute;top:50%;width:100%;
  display:flex;justify-content:space-between;
  transform:translateY(-50%);z-index:20;pointer-events:none;
}

.yt-arrow{
  width:50px;height:50px;border-radius:50%;
  background:rgba(0,0,0,0.5);border:2px solid rgba(0,150,255,0.6);
  color:#fff;font-size:24px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s;pointer-events:auto;margin:0 10px;
}

.yt-arrow:hover{
  background:rgba(0,150,255,0.8);
  border-color:rgba(0,150,255,1);
  box-shadow:0 0 20px rgba(0,150,255,0.9);
}

@media(min-width:1024px){
  .yt-slider-container{max-width:1600px;}
}

/* PAGE 2 */
.pg{
  position:relative;width:100%;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:40px 20px;z-index:10;
}
.pg img{
  max-width:90%;width:clamp(300px,70vw,900px);height:auto;
  border-radius:12px;
  box-shadow:0 10px 40px rgba(0,150,255,0.3);
}

/* PAGE 3 - SOCIAL BUTTONS */
#p3{
  background:linear-gradient(180deg,rgba(0,0,0,1) 0%,rgba(0,0,40,1) 50%,rgba(0,0,0,1) 100%);
}
#p3img{margin-bottom:40px}
.social-grid{
  display:flex;flex-wrap:wrap;justify-content:center;gap:20px;
  max-width:800px;margin:0 auto;
}
.social-btn{
  width:80px;height:80px;border-radius:50%;
  background:rgba(0,0,0,0.7);border:2px solid rgba(0,150,255,0.5);
  display:flex;align-items:center;justify-content:center;
  text-decoration:none;transition:all .3s;cursor:pointer;
  box-shadow:0 5px 20px rgba(0,150,255,0.2);
}
.social-btn:hover{
  background:rgba(0,150,255,0.2);
  border-color:rgba(0,150,255,1);
  box-shadow:0 10px 40px rgba(0,150,255,0.5);
  transform:translateY(-5px);
}
.social-btn svg{
  width:36px;height:36px;fill:#fff;
}

/* PAGE 4 */
.pg img{display:block}

/* WHATSAPP BUTTON */
#wa{
  position:fixed;bottom:30px;right:30px;z-index:9000;
  display:flex;align-items:center;gap:12px;
  padding:14px 24px;border-radius:50px;
  background:rgba(0,0,0,0.85);border:2px solid rgba(37,211,102,0.6);
  text-decoration:none;transition:all .3s;
  box-shadow:0 8px 30px rgba(37,211,102,0.3);
}
#wa:hover{
  background:rgba(37,211,102,0.2);
  border-color:rgba(37,211,102,1);
  box-shadow:0 12px 50px rgba(37,211,102,0.6);
  transform:translateY(-3px);
}
#wa-icon{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,#25d366,#128c7e);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
#wa-icon svg{
  width:18px;height:18px;fill:#fff;
}
#wa-text{
  font-family:'Black Ops One',cursive;font-size:11px;
  color:#fff;letter-spacing:1px;text-transform:uppercase;
  white-space:nowrap;
}

@media(max-width:768px){
  #wa{padding:12px 16px;gap:10px}
  #wa-icon{width:24px;height:24px}
  #wa-icon svg{width:14px;height:14px}
  #wa-text{font-size:9px}
}
</style>
</head>

<script>
// CURSOR
const cdot=document.getElementById('cdot');
const cring=document.getElementById('cring');
if(cdot&&cring){
  document.addEventListener('mousemove',e=>{
    cdot.style.left=e.clientX+'px';
    cdot.style.top=e.clientY+'px';
    cring.style.left=e.clientX+'px';
    cring.style.top=e.clientY+'px';
  });
}

// STORM CANVAS
const trailCanvas=document.getElementById('trail-cv');
const particlesCanvas=document.getElementById('particles-cv');
const trailCtx=trailCanvas?.getContext('2d');
const particlesCtx=particlesCanvas?.getContext('2d');

function resizeCanvases(){
  [trailCanvas,particlesCanvas].forEach(c=>{
    if(c){
      c.width=window.innerWidth;
      c.height=document.documentElement.scrollHeight;
    }
  });
}
resizeCanvases();
window.addEventListener('resize',resizeCanvases);
window.addEventListener('scroll',resizeCanvases);

class Lightning{
  constructor(){
    this.segments=[];
    this.generate();
  }
  generate(){
    const sx=Math.random()*trailCanvas.width;
    const sy=0;
    const ex=sx+(Math.random()-.5)*300;
    const ey=Math.random()*400+200;
    this.segments=this.createBolt(sx,sy,ex,ey,4);
    this.alpha=.6;
    this.life=Math.random()*8+4;
  }
  createBolt(x1,y1,x2,y2,displace){
    if(displace<1)return[[x1,y1],[x2,y2]];
    const mx=(x1+x2)/2+(Math.random()-.5)*displace;
    const my=(y1+y2)/2+(Math.random()-.5)*displace;
    return[
      ...this.createBolt(x1,y1,mx,my,displace/2),
      ...this.createBolt(mx,my,x2,y2,displace/2)
    ];
  }
  update(){
    this.life-=0.05;
    this.alpha=Math.max(0,this.life/15);
  }
  draw(){
    if(!trailCtx||this.alpha<=0)return;
    trailCtx.beginPath();
    trailCtx.moveTo(this.segments[0][0],this.segments[0][1]);
    for(let i=1;i<this.segments.length;i++){
      trailCtx.lineTo(this.segments[i][0],this.segments[i][1]);
    }
    trailCtx.strokeStyle=`rgba(100,200,255,${this.alpha})`;
    trailCtx.lineWidth=2;
    trailCtx.shadowBlur=15;
    trailCtx.shadowColor='rgba(100,200,255,0.8)';
    trailCtx.stroke();
  }
}

const lightnings=[];
setInterval(()=>{
  if(Math.random()<0.3)lightnings.push(new Lightning());
},2000);

function animateStorm(){
  if(!trailCtx)return;
  trailCtx.clearRect(0,0,trailCanvas.width,trailCanvas.height);
  for(let i=lightnings.length-1;i>=0;i--){
    lightnings[i].update();
    lightnings[i].draw();
    if(lightnings[i].life<=0)lightnings.splice(i,1);
  }
  requestAnimationFrame(animateStorm);
}
animateStorm();

class Particle{
  constructor(){
    this.x=Math.random()*particlesCanvas.width;
    this.y=Math.random()*particlesCanvas.height;
    this.size=Math.random()*2;
    this.speedX=(Math.random()-.5)*.5;
    this.speedY=(Math.random()-.5)*.5;
    this.alpha=Math.random()*.5+.2;
  }
  update(){
    this.x+=this.speedX;
    this.y+=this.speedY;
    if(this.x<0||this.x>particlesCanvas.width)this.speedX*=-1;
    if(this.y<0||this.y>particlesCanvas.height)this.speedY*=-1;
  }
  draw(){
    if(!particlesCtx)return;
    particlesCtx.fillStyle=`rgba(100,180,255,${this.alpha})`;
    particlesCtx.beginPath();
    particlesCtx.arc(this.x,this.y,this.size,0,Math.PI*2);
    particlesCtx.fill();
  }
}

const particles=[];
for(let i=0;i<80;i++)particles.push(new Particle());

function animateParticles(){
  if(!particlesCtx)return;
  particlesCtx.clearRect(0,0,particlesCanvas.width,particlesCanvas.height);
  particles.forEach(p=>{
    p.update();
    p.draw();
  });
  requestAnimationFrame(animateParticles);
}
animateParticles();

// YOUTUBE SLIDER
const ytTrack=document.getElementById('ytTrack');
const ytDots=document.getElementById('ytDots');
const ytPrev=document.getElementById('ytPrev');
const ytNext=document.getElementById('ytNext');
const slides=document.querySelectorAll('.yt-slide');
let currentSlide=0;

// Create dots
slides.forEach((_,i)=>{
  const dot=document.createElement('div');
  dot.classList.add('yt-dot');
  if(i===0)dot.classList.add('active');
  dot.addEventListener('click',()=>goToSlide(i));
  ytDots.appendChild(dot);
});

function updateSlider(){
  ytTrack.style.transform=`translateX(-${currentSlide*100}%)`;
  document.querySelectorAll('.yt-dot').forEach((dot,i)=>{
    dot.classList.toggle('active',i===currentSlide);
  });
}

function goToSlide(n){
  currentSlide=n;
  if(currentSlide<0)currentSlide=slides.length-1;
  if(currentSlide>=slides.length)currentSlide=0;
  updateSlider();
}

ytPrev.addEventListener('click',()=>goToSlide(currentSlide-1));
ytNext.addEventListener('click',()=>goToSlide(currentSlide+1));

// Auto-advance every 10 seconds
setInterval(()=>goToSlide(currentSlide+1),10000);
</script>
