<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAM DAM - Press Kit 2026</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ----- RESET & GLOBALES ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #03050E;
      color: #FFFFFF;
      font-family: "Barlow Condensed", sans-serif;
      overflow-x: hidden;
    }

    /* ----- CANVAS DE RELÁMPAGOS (fondo) ----- */
    #lightning-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(circle at top, #050818 0%, #020309 50%, #000000 100%);
    }

    /* ----- CONTENEDOR PRINCIPAL ----- */
    .page-wrapper {
      position: relative;
      z-index: 1;
    }

    /* ----- SECCIONES CON IMÁGENES ----- */
    section {
      width: 100%;
    }

    .image-wrapper {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s ease-out, transform 0.8s ease-out;
    }

    .image-wrapper.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .press-page {
      display: block;
      width: 100%;
      height: auto;
    }

    /* ----- NAVBAR STICKY ----- */
    .main-nav {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 6vw;
      background: linear-gradient(to bottom, rgba(3, 5, 14, 0.95), transparent);
      transition: background 0.3s, backdrop-filter 0.3s;
    }

    .main-nav.scrolled {
      background: rgba(3, 5, 14, 0.9);
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    .nav-logo {
      font-family: "Black Ops One", monospace;
      font-size: 1.5rem;
      color: #3A7EFF;
      letter-spacing: 0.12em;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.9rem;
      transition: color 0.2s;
      position: relative;
    }

    .nav-links a:hover {
      color: #3A7EFF;
    }

    @media (max-width: 700px) {
      .nav-links {
        gap: 1rem;
      }
      .nav-links a {
        font-size: 0.7rem;
      }
      .nav-logo {
        font-size: 1.2rem;
      }
    }

    /* ----- MAPA DE IMAGEN (contiene los hotspots) ----- */
    .map-container {
      position: relative;
      display: block;
    }

    .map-container img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ----- SECCIÓN CONTACTO ----- */
    .contact-section {
      background: #020309;
      padding: 64px 8vw;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      text-align: center;
    }

    .contact-title {
      font-family: "Black Ops One", monospace;
      font-size: clamp(2rem, 6vw, 3rem);
      margin-bottom: 32px;
    }

    .contact-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      margin-bottom: 48px;
    }

    .contact-btn {
      padding: 10px 26px;
      border: 1px solid #3A7EFF;
      border-radius: 60px;
      background: rgba(58, 126, 255, 0.1);
      color: white;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
      transition: 0.2s;
      backdrop-filter: blur(4px);
    }

    .contact-btn:hover {
      background: #FF2D78;
      border-color: #FF2D78;
      transform: translateY(-2px);
      box-shadow: 0 0 12px rgba(255, 45, 120, 0.6);
    }

    .contact-stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
      margin-top: 20px;
    }

    .stat-item {
      text-align: center;
      min-width: 100px;
    }

    .stat-number {
      font-family: "Black Ops One", monospace;
      font-size: 2.2rem;
      color: #3A7EFF;
    }

    .stat-label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.8;
    }

    /* ----- BOTÓN FLOTANTE (RIDER/WHATSAPP) ----- */
    .floating-rider-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: rgba(58, 126, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 10px 20px;
      border-radius: 60px;
      color: white;
      text-decoration: none;
      font-weight: bold;
      z-index: 15;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }

    .floating-rider-btn:hover {
      background: #FF2D78;
      transform: translateY(-3px);
    }

    /* ----- LOADER ----- */
    .loader-overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, #050a1a, #000000);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s, visibility 0.5s;
    }

    .loader-overlay.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loader-title {
      font-family: "Black Ops One", monospace;
      font-size: clamp(2rem, 7vw, 3.5rem);
      color: #3A7EFF;
      text-shadow: 0 0 15px #3A7EFF;
      animation: pulse 1s infinite alternate;
    }

    @keyframes pulse {
      0% { transform: scale(1); text-shadow: 0 0 5px #3A7EFF; }
      100% { transform: scale(1.05); text-shadow: 0 0 20px #3A7EFF; }
    }

    .loader-bar-wrapper {
      width: 260px;
      height: 4px;
      background: #222;
      border-radius: 4px;
      margin-top: 20px;
      overflow: hidden;
    }

    .loader-bar {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #3A7EFF, #FF2D78);
      animation: load 2.4s ease-out forwards;
    }

    @keyframes load {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    /* ----- CURSOR PERSONALIZADO (solo escritorio) ----- */
    .cursor-dot, .cursor-ring {
      display: none;
    }

    @media (min-width: 768px) {
      .cursor-dot, .cursor-ring {
        display: block;
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        border-radius: 50%;
        transform: translate(-50%, -50%);
      }
      .cursor-dot {
        width: 6px;
        height: 6px;
        background: #3A7EFF;
        box-shadow: 0 0 6px #3A7EFF;
      }
      .cursor-ring {
        width: 32px;
        height: 32px;
        border: 2px solid #3A7EFF;
        transition: width 0.1s, height 0.1s, border-color 0.2s;
      }
      body.custom-cursor {
        cursor: none;
      }
    }

    /* anclas para offset del navbar */
    .anchor-target {
      scroll-margin-top: 70px;
    }
  </style>
</head>
<body>
  <canvas id="lightning-canvas"></canvas>

  <!-- LOADER -->
  <div class="loader-overlay" id="loader">
    <div class="loader-title">DAM DAM</div>
    <div class="loader-bar-wrapper"><div class="loader-bar"></div></div>
    <div style="margin-top: 16px; letter-spacing: 0.2em;">Cargando experiencia eléctrica</div>
  </div>

  <!-- CURSORES -->
  <div class="cursor-dot" id="cursorDot"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <div class="page-wrapper">
    <!-- NAVBAR -->
    <nav class="main-nav" id="navbar">
      <div class="nav-logo">DAM DAM</div>
      <div class="nav-links">
        <a href="#bio">Bio</a>
        <a href="#rider">Rider</a>
        <a href="#shows">Shows</a>
        <a href="#contact">Contacto</a>
      </div>
    </nav>

    <!-- PÁGINA 1 (BIO) -->
    <section id="bio" class="anchor-target">
      <div class="image-wrapper">
        <img src="page1.png" alt="DAM DAM - Página 1" class="press-page" loading="lazy" />
      </div>
    </section>

    <!-- PÁGINA 2 (RIDER) -->
    <section id="rider" class="anchor-target">
      <div class="image-wrapper">
        <img src="page2.png" alt="DAM DAM - Página 2" class="press-page" loading="lazy" />
      </div>
    </section>

    <!-- PÁGINA 3 (SHOWS + HOTSPOTS) -->
    <section id="shows" class="anchor-target">
      <div class="image-wrapper">
        <div class="map-container">
          <img src="page3.png" alt="Shows y redes" class="press-page" id="socialImage" usemap="#socialMap" />
          <map name="socialMap" id="socialMap">
            <!-- Los atributos coords se actualizarán con JS según el tamaño real de la imagen -->
            <area shape="rect" coords="0,0,50,50" href="#" data-social="Instagram" target="_blank" />
            <area shape="rect" coords="0,0,50,50" href="#" data-social="TikTok" target="_blank" />
            <area shape="rect" coords="0,0,50,50" href="#" data-social="YouTube" target="_blank" />
            <area shape="rect" coords="0,0,50,50" href="#" data-social="Spotify" target="_blank" />
            <area shape="rect" coords="0,0,50,50" href="#" data-social="SoundCloud" target="_blank" />
            <area shape="rect" coords="0,0,50,50" href="#" data-social="X" target="_blank" />
            <area shape="rect" coords="0,0,50,50" href="#" data-social="Facebook" target="_blank" />
          </map>
        </div>
      </div>
    </section>

    <!-- PÁGINA 4 (FECHAS O INFO) -->
    <section>
      <div class="image-wrapper">
        <img src="page4.png" alt="DAM DAM - Página 4" class="press-page" loading="lazy" />
      </div>
    </section>

    <!-- SECCIÓN CONTACTO FINAL -->
    <section id="contact" class="contact-section anchor-target">
      <h2 class="contact-title">¿Quieres a DAM DAM en tu evento?</h2>
      <div class="contact-buttons">
        <!-- CAMBIA el mailto: por tu email real -->
        <a href="mailto:contacto@damdam.com?subject=Booking%20DAM%20DAM" class="contact-btn">Email</a>
        <!-- CAMBIA el número de WhatsApp (incluye código país sin '+' ) -->
        <a href="https://wa.me/34666666666?text=Hola%20DAM%20DAM%2C%20me%20gustaría%20contrataros" target="_blank" class="contact-btn">WhatsApp</a>
        <!-- CAMBIA el enlace de Instagram principal -->
        <a href="https://instagram.com/damdamoficial" target="_blank" class="contact-btn">Instagram</a>
      </div>
      <div class="contact-stats">
        <div class="stat-item">
          <div class="stat-number" data-target="250000">0</div>
          <div class="stat-label">+ oyentes</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" data-target="50000">0</div>
          <div class="stat-label">Flow Fest</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" data-target="30">0</div>
          <div class="stat-label">ciudades</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" data-target="8">0</div>
          <div class="stat-label">festivales</div>
        </div>
      </div>
    </section>
  </div>

  <!-- BOTÓN FLOTANTE WHATSAPP (cambia el número) -->
  <a href="https://wa.me/34666666666?text=Hola%20DAM%20DAM%2C%20quiero%20más%20info" class="floating-rider-btn" target="_blank">
    ⚡ WhatsApp DAM DAM
  </a>

  <script>
    // -----------------------------
    // 1. OCULTAR LOADER TRAS 2.8s
    // -----------------------------
    setTimeout(() => {
      const loader = document.getElementById('loader');
      if (loader) loader.classList.add('hidden');
    }, 2800);

    // -----------------------------
    // 2. FADE IN DE IMÁGENES AL HACER SCROLL
    // -----------------------------
    const imageWrappers = document.querySelectorAll('.image-wrapper');
    const fadeObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          fadeObserver.unobserve(entry.target); // opcional: deja de observar una vez visible
        }
      });
    }, { threshold: 0.2 });
    imageWrappers.forEach(wrapper => fadeObserver.observe(wrapper));

    // -----------------------------
    // 3. NAVBAR SCROLL (cambia fondo)
    // -----------------------------
    const navBar = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 50) {
        navBar.classList.add('scrolled');
      } else {
        navBar.classList.remove('scrolled');
      }
    });

    // -----------------------------
    // 4. CURSOR PERSONALIZADO (solo escritorio)
    // -----------------------------
    if (window.innerWidth >= 768) {
      document.body.classList.add('custom-cursor');
      const dot = document.getElementById('cursorDot');
      const ring = document.getElementById('cursorRing');
      let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;

      window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        dot.style.transform = `translate(${mouseX}px, ${mouseY}px)`;
      });

      function animateRing() {
        ringX += (mouseX - ringX) * 0.2;
        ringY += (mouseY - ringY) * 0.2;
        ring.style.transform = `translate(${ringX}px, ${ringY}px)`;
        requestAnimationFrame(animateRing);
      }
      animateRing();

      const interactiveElements = document.querySelectorAll('a, button, .contact-btn, .floating-rider-btn, area');
      interactiveElements.forEach(el => {
        el.addEventListener('mouseenter', () => {
          ring.style.borderColor = '#FF2D78';
          ring.style.width = '44px';
          ring.style.height = '44px';
        });
        el.addEventListener('mouseleave', () => {
          ring.style.borderColor = '#3A7EFF';
          ring.style.width = '32px';
          ring.style.height = '32px';
        });
      });
    }

    // -----------------------------
    // 5. CONTADORES NUMÉRICOS (al llegar a la sección contacto)
    // -----------------------------
    const counters = document.querySelectorAll('.stat-number');
    let countersStarted = false;

    function startCounters() {
      if (countersStarted) return;
      countersStarted = true;
      counters.forEach(counter => {
        const target = parseInt(counter.getAttribute('data-target'), 10);
        let current = 0;
        const increment = target / 45;
        const updateCounter = () => {
          current += increment;
          if (current >= target) {
            counter.innerText = target;
            return;
          }
          counter.innerText = Math.floor(current);
          requestAnimationFrame(updateCounter);
        };
        requestAnimationFrame(updateCounter);
      });
    }

    const contactSection = document.getElementById('contact');
    const contactObserver = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting) {
        startCounters();
        contactObserver.disconnect();
      }
    }, { threshold: 0.3 });
    contactObserver.observe(contactSection);

    // -----------------------------
    // 6. MAPA DE IMAGEN RESPONSIVE (REDES SOCIALES)
    //    DIMENSIONES REALES de page3.png: 1700 x 2200 px
    // -----------------------------
    const ORIGINAL_IMG_W = 1700;   // ANCHO real
    const ORIGINAL_IMG_H = 2200;   // ALTO real

    // Coordenadas originales (x1, y1, x2, y2) sobre la imagen de 1700x2200
    // Ajusta estos números si los iconos no están exactamente donde hiciste clic.
    // (por defecto los dejamos como en tu diseño inicial)
    const originalHotspots = [
      [605, 1860, 655, 1910],   // Instagram
      [685, 1860, 735, 1910],   // TikTok
      [765, 1860, 815, 1910],   // YouTube
      [845, 1860, 895, 1910],   // Spotify
      [925, 1860, 975, 1910],   // SoundCloud
      [1005, 1860, 1055, 1910], // X / Twitter
      [1085, 1860, 1135, 1910]  // Facebook
    ];

    // === REEMPLAZA ESTOS ENLACES CON TUS URL REALES ===
    const socialUrls = [
      "https://instagram.com/tuusuario",      // Instagram
      "https://tiktok.com/@tuusuario",        // TikTok
      "https://youtube.com/@tuusuario",       // YouTube
      "https://open.spotify.com/artist/tuid", // Spotify
      "https://soundcloud.com/tuusuario",     // SoundCloud
      "https://x.com/tuusuario",              // X (Twitter)
      "https://facebook.com/tuusuario"        // Facebook
    ];

    function updateMapCoords() {
      const img = document.getElementById('socialImage');
      if (!img) return;
      const currentWidth = img.clientWidth;
      const currentHeight = img.clientHeight;
      const scaleX = currentWidth / ORIGINAL_IMG_W;
      const scaleY = currentHeight / ORIGINAL_IMG_H;
      const areas = document.querySelectorAll('#socialMap area');
      areas.forEach((area, idx) => {
        if (idx >= originalHotspots.length) return;
        const [x1, y1, x2, y2] = originalHotspots[idx];
        const newX1 = Math.round(x1 * scaleX);
        const newY1 = Math.round(y1 * scaleY);
        const newX2 = Math.round(x2 * scaleX);
        const newY2 = Math.round(y2 * scaleY);
        area.coords = `${newX1},${newY1},${newX2},${newY2}`;
        area.href = socialUrls[idx];
      });
    }

    window.addEventListener('load', () => {
      updateMapCoords();
    });
    window.addEventListener('resize', () => {
      updateMapCoords();
    });

    // -----------------------------
    // 7. CANVAS DE RELÁMPAGOS (EFECTO)
    // -----------------------------
    const canvas = document.getElementById('lightning-canvas');
    const ctxCanvas = canvas.getContext('2d');
    let cw = window.innerWidth, ch = window.innerHeight;

    function resizeCanvas() {
      cw = window.innerWidth;
      ch = window.innerHeight;
      canvas.width = cw;
      canvas.height = ch;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    let lastLightning = 0;

    function drawLightning() {
      ctxCanvas.fillStyle = 'rgba(0, 0, 0, 0.08)';
      ctxCanvas.fillRect(0, 0, cw, ch);

      const startX = Math.random() * cw;
      let x = startX, y = -20;
      const segments = [];
      const maxY = ch * 0.55;
      while (y < maxY && segments.length < 15) {
        const nextX = x + (Math.random() - 0.5) * 55;
        const nextY = y + 22 + Math.random() * 18;
        segments.push({ x1: x, y1: y, x2: nextX, y2: nextY });
        x = nextX;
        y = nextY;
      }

      ctxCanvas.beginPath();
      ctxCanvas.strokeStyle = '#3A7EFF';
      ctxCanvas.lineWidth = 2.2;
      ctxCanvas.shadowBlur = 18;
      ctxCanvas.shadowColor = '#3A7EFF';
      for (let seg of segments) {
        ctxCanvas.moveTo(seg.x1, seg.y1);
        ctxCanvas.lineTo(seg.x2, seg.y2);
      }
      ctxCanvas.stroke();

      // Rama secundaria
      if (segments.length > 2) {
        const branchSeg = segments[Math.floor(Math.random() * segments.length)];
        let bx = branchSeg.x2, by = branchSeg.y2;
        ctxCanvas.beginPath();
        ctxCanvas.moveTo(bx, by);
        const branchEndX = bx + (Math.random() - 0.5) * 45;
        const branchEndY = by + 28 + Math.random() * 20;
        ctxCanvas.lineTo(branchEndX, branchEndY);
        ctxCanvas.strokeStyle = '#7BAEFF';
        ctxCanvas.lineWidth = 1.4;
        ctxCanvas.stroke();
      }

      ctxCanvas.shadowBlur = 0;
    }

    function lightningLoop(time) {
      if (!lastLightning) lastLightning = time;
      const elapsed = time - lastLightning;
      if (elapsed > 1800 + Math.random() * 1500) {
        drawLightning();
        lastLightning = time;
      }
      requestAnimationFrame(lightningLoop);
    }
    requestAnimationFrame(lightningLoop);
  </script>
</body>
</html>
