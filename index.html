<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#000"/>
<title>DAM DAM — Press Kit 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════
   RESET & BASE
═══════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:#000;scroll-behavior:smooth}
body{
  background:#000;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
}

/* ═══════════════════════════════════
   GRAIN OVERLAY — siempre encima
═══════════════════════════════════ */
body::after{
  content:'';
  position:fixed;inset:0;z-index:8000;
  pointer-events:none;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:160px;
}

/* ═══════════════════════════════════
   CURSOR — desktop only
═══════════════════════════════════ */
@media(hover:hover) and (pointer:fine){
  body{cursor:none}
  #cd,#cr{
    position:fixed;border-radius:50%;
    pointer-events:none;z-index:9999;
    will-change:left,top;
    mix-blend-mode:screen;
  }
  #cd{
    width:6px;height:6px;
    background:#3a7eff;
    transform:translate(-50%,-50%);
    transition:background .15s,width .15s,height .15s;
  }
  #cr{
    width:28px;height:28px;
    border:1px solid rgba(58,126,255,.55);
    transform:translate(-50%,-50%);
    transition:border-color .2s;
  }
  body.ch #cd{width:11px;height:11px;background:#ff2d78}
  body.ch #cr{border-color:rgba(255,45,120,.7)}
}

/* ═══════════════════════════════════
   LOADER
═══════════════════════════════════ */
#loader{
  position:fixed;inset:0;z-index:9000;
  background:#000;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:0;
  overflow:hidden;
}
#loader.done{
  animation:loaderOut .9s cubic-bezier(.7,0,.3,1) forwards;
}
@keyframes loaderOut{
  0%  {opacity:1;transform:scale(1)}
  60% {opacity:1;transform:scale(1.04)}
  100%{opacity:0;transform:scale(1.08);visibility:hidden;pointer-events:none}
}

/* Canvas del loader — rayos de intro */
#lcv{position:absolute;inset:0;width:100%;height:100%}

/* Logo loader */
.ld-logo{
  position:relative;z-index:2;
  font-family:'Black Ops One',sans-serif;
  font-size:clamp(4rem,14vw,9rem);
  letter-spacing:.06em;
  color:#fff;
  /* clip de texto para el shimmer */
  background:linear-gradient(
    105deg,
    #fff 0%,#fff 20%,
    #3a7eff 38%,#a8ceff 50%,
    #3a7eff 62%,
    #fff 80%,#fff 100%
  );
  background-size:250% 100%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:logoIn .8s cubic-bezier(.16,1,.3,1) both,
            logoShimmer 2.2s 0.4s ease-in-out forwards;
  text-shadow:none;
}
@keyframes logoIn{
  from{opacity:0;transform:scale(.88) translateY(10px)}
  to  {opacity:1;transform:scale(1) translateY(0)}
}
@keyframes logoShimmer{
  from{background-position:200% 0}
  to  {background-position:-50% 0}
}

/* Subtítulo loader */
.ld-sub{
  position:relative;z-index:2;
  font-family:'Black Ops One',sans-serif;
  font-size:clamp(.7rem,1.8vw,1rem);
  letter-spacing:.55em;
  text-transform:uppercase;
  color:rgba(255,255,255,.28);
  margin-top:.9rem;
  animation:fadeUp .6s .5s cubic-bezier(.16,1,.3,1) both;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(8px)}
  to  {opacity:1;transform:translateY(0)}
}

/* Línea de progreso */
.ld-line{
  position:absolute;bottom:0;left:0;
  height:1px;width:0;
  background:linear-gradient(90deg,transparent,#3a7eff,#ff2d78,transparent);
  animation:ldLine 2.4s cubic-bezier(.4,0,.2,1) forwards;
  z-index:3;
}
@keyframes ldLine{
  0%  {width:0%;opacity:0}
  5%  {opacity:1}
  100%{width:100%;opacity:.7}
}

/* Velo de salida del loader */
.ld-veil{
  position:absolute;inset:0;z-index:1;
  background:radial-gradient(ellipse 70% 50% at 50% 50%,
    rgba(6,12,40,.8) 0%,transparent 70%);
}

/* ═══════════════════════════════════
   PÁGINAS PDF
═══════════════════════════════════ */
.pg{
  position:relative;
  width:100%;
  line-height:0;
  /* Oscura por defecto, iluminada al entrar */
  opacity:0;
  filter:brightness(.4) blur(2px);
  transform:translateY(24px) scale(.995);
  transition:
    opacity 1.1s cubic-bezier(.16,1,.3,1),
    filter 1.1s cubic-bezier(.16,1,.3,1),
    transform 1.1s cubic-bezier(.16,1,.3,1);
  will-change:opacity,filter,transform;
}
.pg.in{
  opacity:1;
  filter:brightness(1) blur(0px);
  transform:translateY(0) scale(1);
}

.pg img{
  display:block;
  width:100%;height:auto;
}

/* Máscara top/bottom sobre cada página */
.pg::before,.pg::after{
  content:'';
  position:absolute;left:0;right:0;
  height:clamp(40px,6vw,80px);
  pointer-events:none;
  z-index:2;
}
.pg::before{
  top:0;
  background:linear-gradient(to bottom,#000,transparent);
}
.pg::after{
  bottom:0;
  background:linear-gradient(to top,#000,transparent);
}

/* ═══════════════════════════════════
   SEPARADOR — TORMENTA ELÉCTRICA
═══════════════════════════════════ */
.storm{
  position:relative;
  width:100%;
  height:clamp(120px,18vw,220px);
  background:#000;
  overflow:hidden;
  /* aparece solo cuando la sección de arriba entra */
  opacity:0;
  transition:opacity .8s .3s ease;
}
.storm.in{opacity:1}

/* Canvas de tormenta — uno por separador */
.storm canvas{
  position:absolute;inset:0;
  width:100%;height:100%;
}

/* Niebla de tormenta — capas CSS */
.storm-fog{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 90% 60% at 30% 50%,
      rgba(10,20,70,.55) 0%,transparent 65%),
    radial-gradient(ellipse 70% 55% at 70% 50%,
      rgba(8,15,55,.45) 0%,transparent 60%);
  pointer-events:none;
  animation:fogPulse 6s ease-in-out infinite;
}
@keyframes fogPulse{
  0%,100%{opacity:.7;transform:scaleX(1)}
  50%    {opacity:1;transform:scaleX(1.03)}
}

/* Flash de tormenta — ilumina el fondo */
.storm-flash{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 100% 100% at 50% 50%,
    rgba(58,126,255,.06) 0%,transparent 70%);
  pointer-events:none;
  animation:stormFlash 0s infinite; /* controlado por JS */
}

/* Borde superior e inferior del separador */
.storm::before,.storm::after{
  content:'';
  position:absolute;left:0;right:0;z-index:3;
  height:clamp(30px,4vw,55px);
  pointer-events:none;
}
.storm::before{
  top:0;
  background:linear-gradient(to bottom,#000,transparent);
}
.storm::after{
  bottom:0;
  background:linear-gradient(to top,#000,transparent);
}

/* ═══════════════════════════════════
   HOTSPOTS — redes sociales (pg3)
═══════════════════════════════════ */
.hs-layer{
  position:absolute;inset:0;
  pointer-events:none;z-index:5;
}
.hs{
  position:absolute;
  border-radius:50%;
  pointer-events:auto;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle,rgba(58,126,255,.0) 0%,transparent 70%);
  transition:background .22s,box-shadow .22s,transform .28s cubic-bezier(.34,1.56,.64,1);
  animation:hsPulse 3.8s ease-in-out infinite;
}
.hs:nth-child(2){animation-delay:.6s}
.hs:nth-child(3){animation-delay:1.1s}
.hs:nth-child(4){animation-delay:1.6s}
.hs:nth-child(5){animation-delay:2.1s}
.hs:nth-child(6){animation-delay:2.6s}
.hs:nth-child(7){animation-delay:3.1s}
@keyframes hsPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(58,126,255,0)}
  50%    {box-shadow:0 0 0 3px rgba(58,126,255,.22)}
}
.hs:hover{
  background:radial-gradient(circle,rgba(58,126,255,.25) 0%,transparent 70%);
  box-shadow:0 0 18px rgba(58,126,255,.65),0 0 36px rgba(255,45,120,.25);
  transform:translate(-50%,-50%) scale(1.18);
  animation:none;
}
.hs.pop{animation:hsPop .45s cubic-bezier(.16,1,.3,1) forwards}
@keyframes hsPop{
  0%  {box-shadow:0 0 0 0 rgba(58,126,255,.8)}
  100%{box-shadow:0 0 0 22px rgba(58,126,255,0)}
}
.hs-tip{
  position:absolute;
  bottom:calc(100% + 9px);left:50%;
  transform:translateX(-50%) translateY(5px);
  background:rgba(0,0,0,.95);
  border:1px solid rgba(58,126,255,.4);
  color:#fff;
  font-family:'Black Ops One',sans-serif;
  font-size:.58rem;letter-spacing:.2em;
  text-transform:uppercase;
  padding:4px 11px;border-radius:999px;
  white-space:nowrap;opacity:0;
  pointer-events:none;
  box-shadow:0 0 10px rgba(58,126,255,.25);
  transition:opacity .16s,transform .16s cubic-bezier(.16,1,.3,1);
}
.hs:hover .hs-tip{opacity:1;transform:translateX(-50%) translateY(0)}

/* ═══════════════════════════════════
   WHATSAPP FLOTANTE — nivel dios
═══════════════════════════════════ */
#wa{
  position:fixed;
  right:clamp(14px,3vw,28px);
  bottom:clamp(18px,4vw,30px);
  bottom:max(clamp(18px,4vw,30px), env(safe-area-inset-bottom,20px));
  z-index:7000;
  text-decoration:none;
  /* Entra desde abajo con delay */
  opacity:0;transform:translateY(30px) scale(.9);
  animation:waIn .8s 3s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes waIn{
  to{opacity:1;transform:translateY(0) scale(1)}
}

.wa-pill{
  position:relative;
  display:flex;align-items:center;gap:11px;
  padding:.78rem 1.4rem .78rem 1.1rem;
  border-radius:999px;
  background:rgba(0,0,0,.82);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  /* glow ring exterior */
  box-shadow:
    0 0 0 1px rgba(58,255,140,.0),
    0 8px 32px rgba(0,0,0,.7),
    inset 0 1px 0 rgba(255,255,255,.06);
  transition:
    transform .35s cubic-bezier(.34,1.56,.64,1),
    box-shadow .35s cubic-bezier(.16,1,.3,1),
    border-color .25s;
  overflow:hidden;
}

/* Brillo animado que recorre el pill */
.wa-pill::before{
  content:'';
  position:absolute;
  top:0;left:-100%;
  width:60%;height:100%;
  background:linear-gradient(90deg,
    transparent,rgba(255,255,255,.07),transparent);
  transition:left .6s ease;
}
#wa:hover .wa-pill::before{left:160%}

#wa:hover .wa-pill{
  transform:translateY(-4px) scale(1.03);
  border-color:rgba(58,255,140,.35);
  box-shadow:
    0 0 0 1px rgba(58,255,140,.2),
    0 12px 40px rgba(0,0,0,.7),
    0 0 30px rgba(58,255,140,.2),
    inset 0 1px 0 rgba(255,255,255,.08);
}
#wa:active .wa-pill{transform:translateY(-1px) scale(.98)}

/* Ícono WA */
.wa-icon{
  position:relative;
  width:32px;height:32px;flex-shrink:0;
}
.wa-icon svg{
  width:100%;height:100%;
  filter:drop-shadow(0 0 6px rgba(58,255,140,.5));
  transition:filter .25s,transform .3s cubic-bezier(.34,1.56,.64,1);
}
#wa:hover .wa-icon svg{
  filter:drop-shadow(0 0 12px rgba(58,255,140,.9));
  transform:scale(1.12) rotate(-5deg);
}

/* Dot pulsante sobre el ícono */
.wa-dot{
  position:absolute;top:-1px;right:-1px;
  width:10px;height:10px;
  background:#25d366;border-radius:50%;
  border:1.5px solid #000;
  animation:waDot 2s ease-in-out infinite;
}
@keyframes waDot{
  0%,100%{box-shadow:0 0 0 0 rgba(37,211,102,.6)}
  50%    {box-shadow:0 0 0 5px rgba(37,211,102,0)}
}

/* Texto */
.wa-text{
  display:flex;flex-direction:column;gap:1px;
}
.wa-label{
  font-family:'Black Ops One',sans-serif;
  font-size:.75rem;letter-spacing:.1em;
  color:#fff;line-height:1;
}
.wa-sub{
  font-size:.58rem;letter-spacing:.12em;
  text-transform:uppercase;
  color:rgba(255,255,255,.38);
  line-height:1;
}

/* Flecha indicadora */
.wa-arr{
  display:flex;align-items:center;justify-content:center;
  width:22px;height:22px;
  border-radius:50%;
  background:rgba(255,255,255,.05);
  flex-shrink:0;
  transition:background .2s,transform .3s cubic-bezier(.34,1.56,.64,1);
}
#wa:hover .wa-arr{
  background:rgba(58,255,140,.15);
  transform:translateX(2px);
}
.wa-arr svg{transition:stroke .2s}
#wa:hover .wa-arr svg{stroke:#25d366}

/* Móvil: solo ícono */
@media(max-width:480px){
  .wa-text,.wa-arr{display:none}
  .wa-pill{padding:.82rem}
}
   /* ═══════════════════════════════════
   VIDEO INTRO
═══════════════════════════════════ */
#video-intro{
  position:fixed;inset:0;z-index:9000;
  background:#000;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
#video-intro video{
  width:100%;height:100%;
  object-fit:cover;
}
#video-intro.done{
  animation:videoOut 1.1s cubic-bezier(.7,0,.3,1) forwards;
  pointer-events:none;
}
@keyframes videoOut{
  0%  {opacity:1;transform:scale(1)}
  70% {opacity:1;transform:scale(1.03)}
  100%{opacity:0;transform:scale(1.06);visibility:hidden}
}

/* ═══════════════════════════════════
   BOTÓN CTA — YouTube
═══════════════════════════════════ */
.cta-yt-wrap{
  display:flex;
  justify-content:flex-end;
  padding:clamp(12px,2.5vw,28px) clamp(12px,3vw,32px);
  background:#000;
}
.cta-yt{
  display:inline-flex;align-items:center;
  gap:clamp(10px,1.5vw,18px);
  padding:clamp(16px,2.8vw,26px) clamp(28px,5vw,60px);
  background:#000;
  border:1px solid rgba(255,255,255,.13);
  color:#fff;
  font-family:'Black Ops One',sans-serif;
  font-size:clamp(.8rem,1.8vw,1.1rem);
  letter-spacing:.2em;text-transform:uppercase;
  text-decoration:none;border-radius:0;
  position:relative;overflow:hidden;
  transition:border-color .3s,box-shadow .35s,transform .25s cubic-bezier(.16,1,.3,1);
}
.cta-yt::before{
  content:'';position:absolute;bottom:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,transparent,#ff2020,#ff2d78,transparent);
  transform:scaleX(0);transform-origin:left;
  transition:transform .4s cubic-bezier(.16,1,.3,1);
}
.cta-yt::after{
  content:'';position:absolute;top:0;left:-100%;
  width:55%;height:100%;
  background:linear-gradient(105deg,transparent 0%,rgba(255,255,255,.06) 50%,transparent 100%);
  transition:left .55s cubic-bezier(.16,1,.3,1);
}
.cta-yt:hover{
  border-color:rgba(255,32,32,.55);
  box-shadow:0 0 28px rgba(255,32,32,.18),0 0 60px rgba(255,45,120,.08);
  transform:translateY(-2px);
}
.cta-yt:hover::before{transform:scaleX(1)}
.cta-yt:hover::after{left:160%}
.cta-yt:active{transform:translateY(0) scale(.98)}
.cta-yt-icon{
  flex-shrink:0;width:clamp(22px,3vw,32px);height:clamp(22px,3vw,32px);
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,32,32,.12);border-radius:50%;
  transition:background .25s;
}
.cta-yt:hover .cta-yt-icon{background:rgba(255,32,32,.3)}
@media(max-width:600px){
  .cta-yt-wrap{justify-content:center}
  .cta-yt{width:100%;justify-content:center}
}
</style>
</head>
<body>

<!-- CURSOR -->
<div id="cd" aria-hidden="true"></div>
<div id="cr" aria-hidden="true"></div>

<!-- ══════════════════════════════════════
     LOADER
══════════════════════════════════════ -->
<div id="video-intro" role="presentation" aria-hidden="true">
  <video
    id="intro-vid"
    src="dam.mp4"
    autoplay
    muted
    playsinline
    preload="auto"
  ></video>
</div>

<!-- ══════════════════════════════════════
     PÁGINAS + TORMENTAS
══════════════════════════════════════ -->

<!-- Página 1 — Portada -->
<div class="pg" id="pg1">
  <!--
    Reemplaza src con tus PNGs exportados del PDF.
    Resolución recomendada: 1800px de ancho mínimo.
    loading="eager" en la primera = carga inmediata.
  -->
  <img src="page1.png" alt="DAM DAM Press Kit 2026 — Portada" loading="eager"
       onerror="this.style.minHeight='80vw';this.style.background='#03050E'"/>
</div>

<!-- Separador tormenta 1 -->
<div class="storm" id="st1">
  <canvas class="storm-cv"></canvas>
  <div class="storm-fog"></div>
</div>

<!-- Página 2 — Bio -->
<div class="pg" id="pg2">
  <img src="page2.png" alt="DAM DAM — Biografía" loading="lazy"
       onerror="this.style.minHeight='80vw';this.style.background='#03050E'"/>
</div>

   <!-- ══════════════════════════════════════
     CTA — BOTÓN YOUTUBE
══════════════════════════════════════ -->
<div class="cta-yt-wrap">
  <a
    class="cta-yt"
    href="https://www.youtube.com/@damdamperreomx"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Ver DAM DAM en YouTube"
  >
    <span class="cta-yt-icon">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <path d="M3 2.5L11 7L3 11.5V2.5Z" fill="#ff2020"/>
      </svg>
    </span>
    VER EN YOUTUBE
  </a>
</div>
<!-- Separador tormenta 2 -->
<div class="storm" id="st2">
  <canvas class="storm-cv"></canvas>
  <div class="storm-fog"></div>
</div>

<!-- Página 3 — Shows + Hotspots redes -->
<div class="pg" id="pg3" style="position:relative;">
  <img src="page3.png" alt="DAM DAM — Shows y Redes Sociales" loading="lazy"
       id="p3img"
       onerror="this.style.minHeight='80vw';this.style.background='#03050E'"/>

  <!--
  ┌────────────────────────────────────────────┐
  │ HOTSPOTS REDES SOCIALES                    │
  │                                            │
  │ Los valores cx/cy están en % de la imagen. │
  │ Para ajustar exactamente sobre tus iconos: │
  │  1. Chrome F12 → Inspector                 │
  │  2. Busca cada .hs                         │
  │  3. Modifica left/top en px                │
  │  4. Convierte a % y actualiza SPOTS en JS  │
  │                                            │
  │ Para ver las áreas: en el CSS de .hs       │
  │ añade temporalmente: border:1px solid red  │
  └────────────────────────────────────────────┘
  -->
  <div class="hs-layer" id="hsLayer"></div>
</div>

<!-- Separador tormenta 3 -->
<div class="storm" id="st3">
  <canvas class="storm-cv"></canvas>
  <div class="storm-fog"></div>
</div>

<!-- Página 4 — Rider -->
<div class="pg" id="pg4">
  <img src="page4.png" alt="DAM DAM — Rider Técnico" loading="lazy"
       onerror="this.style.minHeight='80vw';this.style.background='#03050E'"/>
</div>

<!-- ══════════════════════════════════════
     WHATSAPP FLOTANTE
══════════════════════════════════════ -->
<!--
  TODO: Reemplaza TUNUMERO con tu número
  completo con código de país, sin + ni espacios.
  Ejemplo México: 521XXXXXXXXXX
-->
<a id="wa"
   href="https://wa.me/521TUNUMERO?text=Hola%20DAM%20DAM%2C%20quiero%20hablar%20de%20un%20booking"
   target="_blank" rel="noopener noreferrer"
   aria-label="Contactar por WhatsApp">
  <div class="wa-pill">

    <!-- Ícono WhatsApp -->
    <div class="wa-icon">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">

══════════════════════════════════════ -->
<script>
(function(){
'use strict';

/* ── UTILIDADES ───────────────────────── */
var raf = requestAnimationFrame.bind(window);

/* ══════════════════════════════════════
   VIDEO INTRO — control de reproducción
══════════════════════════════════════ */
(function(){
  var intro = document.getElementById('video-intro');
  var vid   = document.getElementById('intro-vid');
  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function dismiss(){
    intro.classList.add('done');
    setTimeout(function(){ intro.style.display = 'none'; }, 1150);
  }

  if(reduceMotion){
    intro.style.display = 'none';
    return;
  }

  // Cierre al terminar el vídeo
  vid.addEventListener('ended', dismiss);

  // Fallback: si el vídeo no carga en 8 seg, cierra igual
  var fallback = setTimeout(dismiss, 8000);
  vid.addEventListener('ended', function(){ clearTimeout(fallback); });

  // Skip con clic/tap
  intro.addEventListener('click', function(){
    clearTimeout(fallback);
    dismiss();
  });
})();
/* ══════════════════════════════════════
   CURSOR personalizado — desktop
══════════════════════════════════════ */
(function(){
  if(!window.matchMedia('(hover:hover) and (pointer:fine)').matches) return;
  var cd=document.getElementById('cd');
  var cr=document.getElementById('cr');
  var body=document.body;
  var mx=-100,my=-100,rx=-100,ry=-100;

  document.addEventListener('mousemove',function(e){
    mx=e.clientX;my=e.clientY;
    cd.style.left=mx+'px';cd.style.top=my+'px';
  });

  (function anim(){
    rx+=(mx-rx)*.12;ry+=(my-ry)*.12;
    cr.style.left=rx+'px';cr.style.top=ry+'px';
    raf(anim);
  })();

  var sel='a,button,.hs';
  document.addEventListener('mouseover',function(e){
    if(e.target.closest(sel)) body.classList.add('ch');
  });
  document.addEventListener('mouseout',function(e){
    if(e.target.closest(sel)) body.classList.remove('ch');
  });
})();

/* ══════════════════════════════════════
   PÁGINAS — fade in al scroll
══════════════════════════════════════ */
(function(){
  var pgs=document.querySelectorAll('.pg');
  if(!pgs.length) return;

  /* Primera página visible de inmediato */
  setTimeout(function(){ pgs[0].classList.add('in'); }, 100);

  var io=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){
        e.target.classList.add('in');
        io.unobserve(e.target);
      }
    });
  },{rootMargin:'0px 0px -4% 0px',threshold:.04});

  for(var i=1;i<pgs.length;i++) io.observe(pgs[i]);
})();

/* ══════════════════════════════════════
   TORMENTAS — electricidad solemne
   (MODO: rayos distantes, limpios, :)
══════════════════════════════════════ */
(function(){
  var storms=document.querySelectorAll('.storm');
  if(!storms.length) return;

  /* Reveal al scroll */
  var sio=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting) e.target.classList.add('in');
    });
  },{threshold:.05});
  storms.forEach(function(s){ sio.observe(s); });

  /* Genera puntos de rayo fino, trazos cortos, elegantes */
  function boltPts(x1,y1,x2,y2,d){
    if(d<=0) return [[x1,y1],[x2,y2]];
    var mx=(x1+x2)/2+(Math.random()-.5)*24; /* menos caos, más limpio */
    var my=(y1+y2)/2+(Math.random()-.5)*8;
    return boltPts(x1,y1,mx,my,d-1)
           .concat(boltPts(mx,my,x2,y2,d-1).slice(1));
  }

  function drawBolt(ctx,pts,alpha,lw,color){
    if(pts.length<2) return;
    /* Aureola muy sutil, apenas un halo */
    ctx.save();
    ctx.globalAlpha=alpha*.04; /* antes .1, ahora .04: mucho más limpio */
    ctx.globalCompositeOperation='lighter';
    ctx.strokeStyle='rgba(40,80,180,1)';
    ctx.lineWidth=lw*3;
    ctx.shadowBlur=6;ctx.shadowColor='rgba(40,80,180,.6)';
    ctx.lineJoin='round';ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(pts[0][0],pts[0][1]);
    pts.slice(1).forEach(function(p){ctx.lineTo(p[0],p[1])});
    ctx.stroke();ctx.restore();
    /* Núcleo fino: antes lw, ahora lw*0.65: más filigraña */
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.globalCompositeOperation='lighter';
    ctx.strokeStyle=color||'rgba(180,210,255,1)';
    ctx.lineWidth=lw*0.65;
    ctx.lineJoin='round';ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(pts[0][0],pts[0][1]);
    pts.slice(1).forEach(function(p){ctx.lineTo(p[0],p[1])});
    ctx.stroke();ctx.restore();
  }

  /* Inicializa cada separador */
  storms.forEach(function(storm){
    var cv=storm.querySelector('.storm-cv');
    if(!cv) return;
    var ctx=cv.getContext('2d');
    var W,H;
    var bolts=[];
    var lastB=0;
    var isVisible=false;

    function resize(){
      W=cv.width=storm.offsetWidth||window.innerWidth;
      H=cv.height=storm.offsetHeight||160;
    }
    resize();
    window.addEventListener('resize',function(){
      setTimeout(resize,50);
    });

    /* Observer de visibilidad para pausar si no está en pantalla */
    var vis=new IntersectionObserver(function(entries){
      isVisible=entries[0].isIntersecting;
    },{threshold:.01});
    vis.observe(storm);

    /* === UN SOLO rayo por spawn, a veces dos === */
    function spawnBolt(){
      /* Rayo horizontal, atraviesa el separador limpio */
      var startSide=Math.random()<.5;
      var sx=startSide?-8:W+8;
      var sy=H*(.15+Math.random()*.7); /* un poco más libre en Y */
      var ex=startSide?W+8:-8;
      var ey=H*(.15+Math.random()*.7);
      var pts=boltPts(sx,sy,ex,ey,8); /* 8 recursiones, antes 10: más simple */

      bolts.push({pts:pts, brs:[], a:.7, fade:.025, lw:.55, color:'rgba(160,200,255,1)'});

      /* A veces un rayo vertical pero SOLO 1 de 3 veces */
      if(Math.random()>0.67){
        var vx=W*(.15+Math.random()*.7);
        var vpts=boltPts(vx,-4,vx+(Math.random()-.5)*W*.1,H+4,6);
        bolts.push({pts:vpts, brs:[], a:.55, fade:.032, lw:.42, color:'rgba(130,170,255,1)'});
      }
      /* NO partículas ni chispas: es una tormenta seria */
    }

        function loop(ts){
      if(!isVisible){ raf(loop); return; }

      ctx.fillStyle='rgba(0,0,0,.14)';
      ctx.fillRect(0,0,W,H);

      if(!lastB) lastB=ts;
      if(ts-lastB > 900+Math.random()*1400){
        spawnBolt();
        lastB=ts;
      }

      bolts=bolts.filter(function(b){ return b.a > .008; });
      bolts.forEach(function(b){
        drawBolt(ctx,b.pts,b.a,b.lw,b.color);
        b.a -= b.fade;
      });

      raf(loop);
    }

    raf(loop);
  });   // cierra storms.forEach
})();   // cierra IIFE de tormentas
/* ══════════════════════════════════════
   HOTSPOTS REDES — dinámicos en %
══════════════════════════════════════ */
(function(){
  /*
    CÓMO AJUSTAR:
    Modifica cx/cy de cada spot (en % del tamaño de la imagen)
    para que los hotspots queden exactamente sobre los iconos.
    r = radio del área clickeable en % del ancho.
    
    Tip de debug: en el CSS añade a .hs: border:1px solid red
    para ver exactamente dónde está cada área.
  */
  var SPOTS=[
    {name:'Instagram',  cx:9.0, cy:91.90, r:3.75, url:'https://www.instagram.com/damdamperreomx'},
    {name:'Facebook',   cx:18.40, cy:91.90, r:3.75, url:'https://www.facebook.com/djdamdamperreomx/'},
    {name:'TikTok',     cx:28.20, cy:91.90, r:3.75, url:'https://www.tiktok.com/@damdamperreo'},
    {name:'YouTube',    cx:37.80, cy:91.90, r:3.75, url:'https://www.youtube.com/@damdamperreomx'},
    {name:'Apple Music',cx:47.40, cy:91.90, r:3.75, url:'https://music.apple.com/mx/artist/dam-dam/309077766'},
    {name:'Spotify',    cx:57.00, cy:91.9, r:3.75, url:'https://open.spotify.com/intl-es/artist/2Tm2uw29i6VXLI2hcY4xpz?si=_zH6G3VuRG-8jG_7PpwarQ'},
    {name:'SoundCloud', cx:66.60, cy:91.90, r:3.75, url:'https://soundcloud.com/damdamperreomx'},
  ];

  var layer=document.getElementById('hsLayer');
  var img  =document.getElementById('p3img');
  if(!layer||!img) return;

  function build(){
    layer.innerHTML='';
    var iw=img.offsetWidth, ih=img.offsetHeight;
    if(!iw||!ih) return;

    SPOTS.forEach(function(sp,i){
      var x=(sp.cx/100)*iw;
      var y=(sp.cy/100)*ih;
      var size=(sp.r/100)*iw*2;

      var el=document.createElement('div');
      el.className='hs';
      el.style.cssText='left:'+x+'px;top:'+y+'px;width:'+size+'px;height:'+size+'px;';
      el.setAttribute('role','link');
      el.setAttribute('tabindex','0');
      el.setAttribute('aria-label',sp.name);

      var tip=document.createElement('span');
      tip.className='hs-tip';
      tip.textContent=sp.name;
      el.appendChild(tip);

      el.addEventListener('click',function(){
        el.classList.remove('pop');
        void el.offsetWidth;
        el.classList.add('pop');
        window.open(sp.url,'_blank','noopener,noreferrer');
      });
      el.addEventListener('keydown',function(e){
        if(e.key==='Enter'||e.key===' '){e.preventDefault();el.click();}
      });
      layer.appendChild(el);
    });
  }

  if(img.complete&&img.naturalWidth) build();
  else img.addEventListener('load',build);

  var rt;
  window.addEventListener('resize',function(){
    clearTimeout(rt); rt=setTimeout(build,80);
  });
})();

})(); // end IIFE
</script>
