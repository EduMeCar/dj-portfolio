<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

<title>DAM DAM — Press Kit 2026</title>

<style>
*,*:before,*:after{box-sizing:border-box;margin:0;padding:0}
html{background:#000;scroll-behavior:smooth}
body{background:#000;overflow-x:hidden;-webkit-overflow-scrolling:touch}

/* GRAIN OVERLAY */
body:after{
  content:'';position:fixed;inset:0;z-index:8000;
  pointer-events:none;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4'/%3E%3CfeColorMatrix type='saturate'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;
}

/* SCAN LINE OVERLAY */
body:before{
  content:'';position:fixed;inset:0;z-index:7990;
  pointer-events:none;opacity:.01;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,1) 2px,rgba(0,0,0,1) 4px);
  animation:scanShift 8s linear infinite;
}
@keyframes scanShift{0%{background-position:0 0}100%{background-position:0 120px}}

/* CURSOR */
@media(hover:hover) and (pointer:fine){
body{cursor:none}
#cdot,#cring{
  position:fixed;border-radius:50%;
  pointer-events:none;z-index:9999;
  will-change:left,top;mix-blend-mode:exclusion;
}
#cdot{
  width:7px;height:7px;background:#fff;
  transform:translate(-50%,-50%);
  transition:width .1s,height .1s;
}
#cring{
  width:30px;height:30px;
  border:1px solid rgba(255,255,255,.55);
  transform:translate(-50%,-50%);
}
}

/* LOADER ANIMATION */
#loader{
  position:fixed;inset:0;z-index:9998;
  background:#000;
  display:flex;align-items:center;justify-content:center;
  opacity:1;transition:opacity 0.8s ease, visibility 0.8s ease;
}
#loader.fade-out{
  opacity:0;
  visibility:hidden;
}
.loader-bolt{
  width:120px;height:120px;
  position:relative;
  animation:loaderPulse 1.5s ease-in-out infinite;
}
.loader-bolt svg{
  width:100%;height:100%;
  filter:drop-shadow(0 0 20px rgba(0,180,255,0.8)) drop-shadow(0 0 40px rgba(0,180,255,0.4));
}
@keyframes loaderPulse{
  0%,100%{transform:scale(1);opacity:1}
  50%{transform:scale(1.1);opacity:0.8}
}

/* PAGE SECTIONS */
.page-section{
  position:relative;
  width:100%;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.page-section img{
  width:100%;
  height:auto;
  max-width:100%;
  display:block;
}

/* TRANSITION SPACES */
.transition-space{
  position:relative;
  width:100%;
  height:60px;
  background:#000;
  overflow:hidden;
}
.transition-lightning{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0;
  pointer-events:none;
}
.transition-lightning svg{
  position:absolute;
  width:100%;
  height:100%;
}

/* YOUTUBE SLIDER */
#yt-section{
  position:relative;
  width:100%;
  min-height:100vh;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
}
.yt-slider{
  position:relative;
  width:100%;
  max-width:900px;
  margin:0 auto;
}
.yt-slider-track{
  position:relative;
  width:100%;
  overflow:hidden;
}
.yt-slider-container{
  display:flex;
  transition:transform 0.5s cubic-bezier(0.4,0,0.2,1);
}
.yt-slide{
  min-width:100%;
  padding:0 10px;
}
.yt-ratio{
  position:relative;
  width:100%;
  padding-bottom:56.25%;
  background:#000;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 8px 32px rgba(0,180,255,0.3);
}
.yt-ratio iframe{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  border:0;
}
.yt-nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:50px;height:50px;
  background:rgba(0,180,255,0.2);
  border:2px solid rgba(0,180,255,0.6);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:10;
  transition:all 0.3s ease;
  color:#fff;
  font-size:24px;
  user-select:none;
}
.yt-nav:hover{
  background:rgba(0,180,255,0.4);
  border-color:rgba(0,180,255,1);
  box-shadow:0 0 20px rgba(0,180,255,0.5);
}
.yt-nav.prev{left:10px}
.yt-nav.next{right:10px}
.yt-dots{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:20px;
}
.yt-dot{
  width:10px;height:10px;
  border-radius:50%;
  background:rgba(255,255,255,0.3);
  cursor:pointer;
  transition:all 0.3s ease;
}
.yt-dot.active{
  background:rgba(0,180,255,1);
  box-shadow:0 0 10px rgba(0,180,255,0.8);
}

/* SOCIAL BUTTONS */
.social-row{
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:30px;
}
.social-btn{
  width:60px;height:60px;
  border-radius:50%;
  background:rgba(0,0,0,0.6);
  border:2px solid rgba(0,180,255,0.5);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all 0.3s ease;
  cursor:pointer;
}
.social-btn:hover{
  border-color:rgba(0,180,255,1);
  box-shadow:0 0 20px rgba(0,180,255,0.6);
  transform:scale(1.1);
}
.social-btn svg{
  width:28px;height:28px;
  fill:#fff;
}

/* WHATSAPP BUTTON */
#wa{
  position:fixed;
  bottom:30px;right:30px;
  z-index:7980;
  background:linear-gradient(135deg,rgba(0,180,100,0.9),rgba(0,220,130,0.9));
  border:2px solid rgba(0,255,150,0.6);
  border-radius:50px;
  padding:15px 28px;
  display:flex;
  align-items:center;
  gap:12px;
  cursor:pointer;
  transition:all 0.3s ease;
  text-decoration:none;
  box-shadow:0 4px 20px rgba(0,220,130,0.4);
}
#wa:hover{
  transform:translateY(-3px);
  box-shadow:0 6px 30px rgba(0,220,130,0.6);
  border-color:rgba(0,255,150,1);
}
#wa-icon svg{
  width:24px;height:24px;
  fill:#fff;
}
#wa-text{
  color:#fff;
  font-family:'Black Ops One',system-ui;
  font-size:14px;
  letter-spacing:1px;
}

/* FOOTER */
#footer{
  width:100%;
  height:200px;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* LIGHTNING EFFECTS */
@keyframes lightningFlash{
  0%,100%{opacity:0}
  5%,10%{opacity:0.6}
  15%,20%{opacity:0}
  25%{opacity:0.8}
  30%,100%{opacity:0}
}
</style>

<script>
// LOADER
window.addEventListener('load',()=>{
  setTimeout(()=>{
    document.getElementById('loader').classList.add('fade-out');
  },1500);
});

// CUSTOM CURSOR
const cdot=document.getElementById('cdot');
const cring=document.getElementById('cring');
let mouseX=0,mouseY=0,ringX=0,ringY=0;
document.addEventListener('mousemove',(e)=>{
  mouseX=e.clientX;
  mouseY=e.clientY;
  cdot.style.left=mouseX+'px';
  cdot.style.top=mouseY+'px';
});
function animateRing(){
  ringX+=(mouseX-ringX)*0.15;
  ringY+=(mouseY-ringY)*0.15;
  cring.style.left=ringX+'px';
  cring.style.top=ringY+'px';
  requestAnimationFrame(animateRing);
}
animateRing();

// YOUTUBE SLIDER (MANUAL)
let ytIndex=0;
const ytContainer=document.getElementById('yt-container');
const ytPrev=document.getElementById('ytPrev');
const ytNext=document.getElementById('ytNext');
const ytDots=document.getElementById('ytDots');
const ytSlides=document.querySelectorAll('.yt-slide');

ytSlides.forEach((slide,i)=>{
  const dot=document.createElement('div');
  dot.classList.add('yt-dot');
  if(i===0)dot.classList.add('active');
  dot.addEventListener('click',()=>goToSlide(i));
  ytDots.appendChild(dot);
});

function updateSlider(){
  ytContainer.style.transform=`translateX(-${ytIndex*100}%)`;
  document.querySelectorAll('.yt-dot').forEach((dot,i)=>{
    dot.classList.toggle('active',i===ytIndex);
  });
}

function goToSlide(index){
  ytIndex=index;
  updateSlider();
}

ytPrev.addEventListener('click',()=>{
  ytIndex=(ytIndex-1+ytSlides.length)%ytSlides.length;
  updateSlider();
});

ytNext.addEventListener('click',()=>{
  ytIndex=(ytIndex+1)%ytSlides.length;
  updateSlider();
});

// TRANSITION LIGHTNING ANIMATION
const transitions=document.querySelectorAll('.transition-lightning');
let lastLightning=0;
function triggerLightning(){
  const now=Date.now();
  if(now-lastLightning>3000){
    const rand=Math.floor(Math.random()*transitions.length);
    const t=transitions[rand];
    t.style.animation='lightningFlash 0.8s ease-in-out';
    setTimeout(()=>t.style.animation='',800);
    lastLightning=now;
  }
}
setInterval(triggerLightning,4000);
window.addEventListener('scroll',()=>{
  if(Math.random()>0.85)triggerLightning();
});
</script>
