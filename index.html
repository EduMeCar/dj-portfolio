<title>DAM DAM — Press Kit 2026</title>

<style>
*,*:before,*:after{box-sizing:border-box;margin:0;padding:0}
html{background:#000;scroll-behavior:smooth}
body{background:#000;overflow-x:hidden;-webkit-overflow-scrolling:touch}

/* GRAIN OVERLAY */
body:after{
  content:'';position:fixed;inset:0;z-index:8000;
  pointer-events:none;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4'/%3E%3CfeColorMatrix type='saturate'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;
}

/* SCAN LINE OVERLAY */
body:before{
  content:'';position:fixed;inset:0;z-index:7990;
  pointer-events:none;opacity:.01;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,1) 2px,rgba(0,0,0,1) 4px);
  animation:scanShift 8s linear infinite;
}
@keyframes scanShift{0%{background-position:0 0}100%{background-position:0 120px}}

/* CURSOR */
@media(hover:hover) and (pointer:fine){
body{cursor:none}
#cdot,#cring{
  position:fixed;border-radius:50%;
  pointer-events:none;z-index:9999;
  will-change:left,top;mix-blend-mode:exclusion;
}
#cdot{
  width:7px;height:7px;background:#fff;
  transform:translate(-50%,-50%);
  transition:width .1s,height .1s;
}
#cring{
  width:30px;height:30px;
  border:1px solid rgba(255,255,255,.55);
  transform:translate(-50%,-50%);
}
}

/* LOADER WITH  */
#loader{
  position:fixed;inset:0;z-index:9998;
  background:#000;
  display:flex;align-items:center;justify-content:center;
  opacity:1;transition:opacity 0.8s ease, visibility 0.8s ease;
}
#loader.fade-out{
  opacity:0;
  visibility:hidden;
}
.loader-logo{
  width:180px;height:180px;
  position:relative;
  animation:loaderPulse 1.5s ease-in-out infinite;
  filter:drop-shadow(0 0 30px rgba(0,180,255,0.8)) drop-shadow(0 0 60px rgba(0,180,255,0.4));
}
.loader-logo img{
  width:100%;height:100%;
  object-fit:contain;
}
@keyframes loaderPulse{
  0%,100%{transform:scale(1);opacity:1}
  50%{transform:scale(1.15);opacity:0.85}
}

/* ELECTRIC PARTICLES - MÁS GRANDES Y BRILLANTES */
.electric-particle{
  position:absolute;
  width:4px;height:4px;
  background:rgba(0,200,255,1);
  border-radius:50%;
  pointer-events:none;
  animation:particleFloat 3s infinite;
  box-shadow:0 0 12px rgba(0,200,255,1), 0 0 24px rgba(0,180,255,0.7), 0 0 40px rgba(0,150,255,0.4);
}
@keyframes particleFloat{
  0%{transform:translateY(0) translateX(0) scale(1);opacity:0}
  10%{opacity:1;transform:translateY(-30px) translateX(10px) scale(1.5)}
  30%{opacity:0.8;transform:translateY(-60px) translateX(-15px) scale(0.8)}
  60%{opacity:0.3;transform:translateY(-90px) translateX(25px) scale(1.3)}
  100%{transform:translateY(-130px) translateX(5px) scale(0);opacity:0}
}

/* PAGE SECTIONS - OPTIMIZADO PARA MÓVIL */
.page-section{
  position:relative;
  width:100%;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.page-section img{
  width:100%;
  height:auto;
  max-width:100%;
  display:block;
}
@media(max-width:768px){
  .page-section{
    min-height:auto;
  }
}

/* TRANSITION SPACES - CON RAYOS MEJORADOS */
.transition-space{
  position:relative;
  width:100%;
  height:100px;
  background:#000;
  overflow:hidden;
}
@media(max-width:768px){
  .transition-space{
    height:50px;
  }
}
.transition-lightning{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0;
  pointer-events:none;
}
.transition-lightning svg{
  position:absolute;
  width:100%;
  height:100%;
}
.electric-glow{
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(ellipse at center, rgba(0,200,255,0.25) 0%, rgba(0,150,255,0.1) 40%, transparent 70%);
  animation:glowPulse 2.5s ease-in-out infinite;
}
@keyframes glowPulse{
  0%,100%{opacity:0.4}
  50%{opacity:0.9}
}

/* YOUTUBE SLIDER - AHORA CON MÁS RAYOS */
#yt-section{
  position:relative;
  width:100%;
  min-height:100vh;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:60px 20px;
  overflow:hidden;
}
@media(max-width:768px){
  #yt-section{
    min-height:auto;
    padding:40px 15px;
  }
}
#yt-section::before{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse at 50% 50%, rgba(0,200,255,0.15) 0%, rgba(0,150,255,0.05) 40%, transparent 65%);
  animation:glowPulse 3s ease-in-out infinite;
}
/* TORMENTA ELÉCTRICA DE FONDO EN YOUTUBE */
.yt-storm{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:0;
  opacity:0.6;
}
.yt-storm-bolt{
  position:absolute;
  opacity:0;
}
.yt-storm-bolt:nth-child(1){
  top:0;left:15%;
  width:3px;height:120px;
  background:linear-gradient(to bottom, transparent, rgba(0,220,255,0.9), rgba(0,180,255,0.3), transparent);
  border-radius:50%;
  animation:stormBolt1 5s ease-in-out infinite;
  box-shadow:0 0 20px rgba(0,200,255,0.8), 0 0 40px rgba(0,180,255,0.5);
}
.yt-storm-bolt:nth-child(2){
  top:10%;right:20%;
  width:2px;height:90px;
  background:linear-gradient(to bottom, transparent, rgba(0,220,255,0.8), rgba(0,180,255,0.2), transparent);
  border-radius:50%;
  animation:stormBolt2 7s ease-in-out 2s infinite;
  box-shadow:0 0 15px rgba(0,200,255,0.7), 0 0 35px rgba(0,180,255,0.4);
}
.yt-storm-bolt:nth-child(3){
  top:5%;left:55%;
  width:2.5px;height:100px;
  background:linear-gradient(to bottom, transparent, rgba(0,230,255,0.85), rgba(0,190,255,0.25), transparent);
  border-radius:50%;
  animation:stormBolt3 6s ease-in-out 4s infinite;
  box-shadow:0 0 18px rgba(0,210,255,0.75), 0 0 38px rgba(0,180,255,0.45);
}
@keyframes stormBolt1{
  0%,85%,100%{opacity:0;transform:scaleY(0.3)}
  88%{opacity:1;transform:scaleY(1)}
  90%{opacity:0.6;transform:scaleY(0.8)}
  92%{opacity:1;transform:scaleY(1.1)}
  94%{opacity:0.2;transform:scaleY(0.4)}
}
@keyframes stormBolt2{
  0%,90%,100%{opacity:0;transform:scaleY(0.2)}
  92%{opacity:0.9;transform:scaleY(1)}
  95%{opacity:0.3;transform:scaleY(0.6)}
}
@keyframes stormBolt3{
  0%,88%,100%{opacity:0;transform:scaleY(0.3)}
  91%{opacity:0.95;transform:scaleY(1.05)}
  93%{opacity:0.5;transform:scaleY(0.7)}
  96%{opacity:0.8;transform:scaleY(0.95)}
  98%{opacity:0.1;transform:scaleY(0.3)}
}

.yt-slider{
  position:relative;
  width:100%;
  max-width:1400px;
  margin:0 auto;
  z-index:1;
}
.yt-slider-track{
  position:relative;
  width:100%;
  overflow:hidden;
}
.yt-slider-container{
  display:flex;
  transition:transform 0.5s cubic-bezier(0.4,0,0.2,1);
}
.yt-slide{
  min-width:100%;
  padding:0 10px;
}
.yt-ratio{
  position:relative;
  width:100%;
  padding-bottom:56.25%;
  background:#000;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 12px 48px rgba(0,180,255,0.5), 0 0 100px rgba(0,200,255,0.3), 0 0 150px rgba(0,150,255,0.15);
}
.yt-ratio iframe{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  border:0;
}
@media(min-width:1024px){
  .yt-slider{max-width:1600px}
  .yt-ratio{border-radius:20px}
  #yt-section{padding:80px 40px}
}
@media(min-width:1440px){
  .yt-slider{max-width:1800px}
}
.yt-nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:60px;height:60px;
  background:rgba(0,180,255,0.2);
  border:2px solid rgba(0,200,255,0.7);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:10;
  transition:all 0.3s ease;
  color:#fff;
  font-size:28px;
  user-select:none;
  box-shadow:0 0 20px rgba(0,180,255,0.3);
}
.yt-nav:hover{
  background:rgba(0,200,255,0.5);
  border-color:rgba(0,220,255,1);
  box-shadow:0 0 40px rgba(0,200,255,0.8), 0 0 80px rgba(0,180,255,0.4);
  transform:translateY(-50%) scale(1.15);
}
.yt-nav.prev{left:15px}
.yt-nav.next{right:15px}
@media(min-width:1024px){
  .yt-nav{width:70px;height:70px;font-size:32px}
  .yt-nav.prev{left:30px}
  .yt-nav.next{right:30px}
}
.yt-dots{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:30px;
}
@media(max-width:768px){
  .yt-dots{
    margin-top:20px;
    gap:10px;
  }
}
.yt-dot{
  width:12px;height:12px;
  border-radius:50%;
  background:rgba(255,255,255,0.3);
  cursor:pointer;
  transition:all 0.3s ease;
}
.yt-dot.active{
  background:rgba(0,210,255,1);
  box-shadow:0 0 20px rgba(0,200,255,1), 0 0 40px rgba(0,180,255,0.6);
  transform:scale(1.3);
}

/* SOCIAL BUTTONS - POSITIONED VIA HOTSPOTS */
#social-overlay{
  position:absolute;
  width:100%;
  height:100%;
  top:0;left:0;
  pointer-events:none;
}
.social-hotspot{
  position:absolute;
  border-radius:50%;
  background:rgba(0,200,255,0.15);
  border:2px solid rgba(0,200,255,0.5);
  transition:all 0.3s ease;
  cursor:pointer;
  pointer-events:all;
}
.social-hotspot:hover{
  background:rgba(0,200,255,0.3);
  border-color:rgba(0,220,255,1);
  box-shadow:0 0 30px rgba(0,200,255,0.8), 0 0 60px rgba(0,180,255,0.4);
  transform:scale(1.15);
}

/* WHATSAPP BUTTON WITH LOGO - MEJORADO */
#wa{
  position:fixed;
  bottom:30px;right:30px;
  z-index:7980;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  border:2px solid rgba(0,200,255,0.5);
  border-radius:50px;
  padding:14px 26px;
  display:flex;
  align-items:center;
  gap:12px;
  cursor:pointer;
  transition:all 0.4s ease;
  text-decoration:none;
  box-shadow:0 4px 30px rgba(0,200,255,0.4), 0 0 70px rgba(0,180,255,0.2);
  animation:bookingPulse 3s ease-in-out infinite;
}
@keyframes bookingPulse{
  0%,100%{box-shadow:0 4px 30px rgba(0,200,255,0.4), 0 0 70px rgba(0,180,255,0.2)}
  50%{box-shadow:0 4px 50px rgba(0,200,255,0.7), 0 0 100px rgba(0,180,255,0.4)}
}
#wa:hover{
  transform:translateY(-4px);
  background:rgba(0,0,0,0.85);
  border-color:rgba(0,220,255,0.9);
  box-shadow:0 8px 60px rgba(0,200,255,0.7), 0 0 120px rgba(0,180,255,0.5);
  animation:none;
}
#wa-icon{
  width:38px;height:38px;
  border-radius:50%;
  overflow:hidden;
  background:transparent;
  animation:logoGlow 2s ease-in-out infinite;
}
@keyframes logoGlow{
  0%,100%{filter:drop-shadow(0 0 8px rgba(0,200,255,0.7)) drop-shadow(0 0 16px rgba(0,180,255,0.4))}
  50%{filter:drop-shadow(0 0 16px rgba(0,220,255,1)) drop-shadow(0 0 32px rgba(0,180,255,0.6))}
}
#wa-icon img{
  width:100%;height:100%;
  object-fit:contain;
}
#wa-text{
  color:#fff;
  font-family:'Black Ops One',system-ui;
  font-size:15px;
  letter-spacing:2px;
  text-shadow:0 0 12px rgba(0,200,255,0.7);
}
@media(min-width:1024px){
  #wa{padding:16px 30px}
  #wa-icon{width:44px;height:44px}
  #wa-text{font-size:16px}
}
@media(max-width:768px){
  #wa{
    bottom:20px;right:20px;
    padding:12px 20px;
    gap:8px;
  }
  #wa-icon{width:32px;height:32px}
  #wa-text{font-size:13px}
}

/* FOOTER WITH ELECTRIC EFFECTS */
#footer{
  width:100%;
  height:250px;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}
@media(max-width:768px){
  #footer{
    height:150px;
  }
}
#footer::before{
  content:'';
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(ellipse at 50% 0%, rgba(0,200,255,0.25) 0%, rgba(0,150,255,0.1) 30%, transparent 60%);
  animation:glowPulse 4s ease-in-out infinite;
}

/* LIGHTNING EFFECTS - MEGA POTENTE */
@keyframes lightningFlash{
  0%,100%{opacity:0}
  3%{opacity:0.3}
  6%{opacity:1}
  9%{opacity:0.6}
  12%{opacity:0.9}
  15%{opacity:0.2}
  18%{opacity:0.7}
  21%{opacity:0}
}

/* FLASH DE PANTALLA COMPLETA EN TORMENTAS */
.screen-flash{
  position:fixed;
  inset:0;
  background:rgba(0,200,255,0.08);
  pointer-events:none;
  z-index:7500;
  opacity:0;
  transition:opacity 0.05s;
}
.screen-flash.active{
  opacity:1;
  transition:opacity 0.15s;
}
</style>
</head>
<body>

<!-- LOADER WITH DAMLOGO.PNG -->
<div id="loader">
  <div class="loader-logo">
    <img src="damlogo.png" alt="DAM DAM">
  </div>
</div>

<!-- CUSTOM CURSOR -->
<div id="cdot"></div>
<div id="cring"></div>

<!-- SCREEN FLASH PARA RAYOS -->
<div class="screen-flash" id="screenFlash"></div>

<!-- PAGE 1 -->
<div class="page-section" id="pg1">
  <img src="page1.webp" alt="DAM DAM Press Kit 2026 — Portada">
</div>

<!-- TRANSITION 1 - RAYOS POTENTES -->
<div class="transition-space">
  <div class="electric-glow"></div>
  <div class="transition-lightning" id="tl1">
    <svg viewBox="0 0 1000 100" preserveAspectRatio="none">
      <!-- Rayo principal grueso -->
      <path d="M0,50 L80,30 L130,55 L200,20 L270,60 L340,15 L410,50 L480,25 L550,55 L620,30 L700,60 L780,25 L850,50 L920,20 L1000,50" 
            stroke="rgba(0,220,255,0.9)" 
            stroke-width="3" 
            fill="none"
            filter="url(#glow1)"/>
      <!-- Resplandor del rayo -->
      <path d="M0,50 L80,30 L130,55 L200,20 L270,60 L340,15 L410,50 L480,25 L550,55 L620,30 L700,60 L780,25 L850,50 L920,20 L1000,50" 
            stroke="rgba(0,200,255,0.5)" 
            stroke-width="8" 
            fill="none" 
            filter="blur(5px)"/>
      <!-- Aura exterior -->
      <path d="M0,50 L80,30 L130,55 L200,20 L270,60 L340,15 L410,50 L480,25 L550,55 L620,30 L700,60 L780,25 L850,50 L920,20 L1000,50" 
            stroke="rgba(0,180,255,0.3)" 
            stroke-width="16" 
            fill="none" 
            filter="blur(10px)"/>
      <!-- Ramificaciones -->
      <path d="M200,20 L220,0 L235,15" stroke="rgba(0,220,255,0.7)" stroke-width="1.5" fill="none"/>
      <path d="M480,25 L500,5 L510,20" stroke="rgba(0,220,255,0.6)" stroke-width="1.5" fill="none"/>
      <path d="M700,60 L720,75 L735,55" stroke="rgba(0,220,255,0.65)" stroke-width="1.5" fill="none"/>
      <defs>
        <filter id="glow1">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
    </svg>
  </div>
</div>

<!-- PAGE 2 - BIOGRAFÍA -->
<div class="page-section">
  <img src="page2.webp" alt="DAM DAM — Biografía">
</div>

<!-- TRANSITION 2 - RAYOS POTENTES -->
<div class="transition-space">
  <div class="electric-glow"></div>
  <div class="transition-lightning" id="tl2">
    <svg viewBox="0 0 1000 100" preserveAspectRatio="none">
      <!-- Rayo en zigzag -->
      <path d="M0,50 Q150,20 250,50 T500,20 T750,55 T1000,30" 
            stroke="rgba(0,230,255,0.9)" 
            stroke-width="3.5" 
            fill="none"
            filter="url(#glow2)"/>
      <path d="M0,50 Q150,20 250,50 T500,20 T750,55 T1000,30" 
            stroke="rgba(0,200,255,0.5)" 
            stroke-width="9" 
            fill="none" 
            filter="blur(5px)"/>
      <path d="M0,50 Q150,20 250,50 T500,20 T750,55 T1000,30" 
            stroke="rgba(0,180,255,0.3)" 
            stroke-width="18" 
            fill="none" 
            filter="blur(12px)"/>
      <!-- Ramificaciones -->
      <path d="M250,50 L270,30 L285,45" stroke="rgba(0,230,255,0.7)" stroke-width="1.5" fill="none"/>
      <path d="M500,20 L520,0 L535,18" stroke="rgba(0,230,255,0.65)" stroke-width="1.5" fill="none"/>
      <defs>
        <filter id="glow2">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
    </svg>
  </div>
</div>

<!-- YOUTUBE SECTION - AHORA DESPUÉS DE PAGE 2 -->
<div id="yt-section">
  <!-- TORMENTA ELÉCTRICA DE FONDO -->
  <div class="yt-storm">
    <div class="yt-storm-bolt"></div>
    <div class="yt-storm-bolt"></div>
    <div class="yt-storm-bolt"></div>
  </div>
  
  <div class="yt-slider">
    <div class="yt-slider-track">
      <div class="yt-slider-container" id="yt-container">
        <div class="yt-slide">
          <div class="yt-ratio">
            <iframe src="https://www.youtube.com/embed/pgj892GGL0o?rel=0&modestbranding=1&color=white&iv_load_policy=3" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen></iframe>
          </div>
        </div>
        <div class="yt-slide">
          <div class="yt-ratio">
            <iframe src="https://www.youtube.com/embed/DEjjE4Mv2yQ?rel=0&modestbranding=1&color=white&iv_load_policy=3" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen></iframe>
          </div>
        </div>
        <div class="yt-slide">
          <div class="yt-ratio">
            <iframe src="https://www.youtube.com/embed/ZGxSXchZNfo?rel=0&modestbranding=1&color=white&iv_load_policy=3" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen></iframe>
          </div>
        </div>
      </div>

<script>
// LOADER

// CUSTOM CURSOR

document.addEventListener('mousemove',(e)=>{
  mouseX=e.clientX;
  mouseY=e.clientY;
  cdot.style.left=mouseX+'px';
  cdot.style.top=mouseY+'px';
});
function animateRing(){
  ringX+=(mouseX-ringX)*0.15;

}

// YOUTUBE SLIDER (MANUAL)
let ytIndex=0;
const ytContainer=document.getElementById('yt-container');
const ytPrev=document.getElementById('ytPrev');
const ytNext=document.getElementById('ytNext');
const ytDots=document.getElementById('ytDots');
const ytSlides=document.querySelectorAll('.yt-slide');

ytSlides.forEach((slide,i)=>{
  const dot=document.createElement('div');
  dot.classList.add('yt-dot');
  if(i===0)dot.classList.add('active');
  dot.addEventListener('click',()=>goToSlide(i));
  ytDots.appendChild(dot);
});

function updateSlider(){
  ytContainer.style.transform=`translateX(-${ytIndex*100}%)`;
  document.querySelectorAll('.yt-dot').forEach((dot,i)=>{
    dot.classList.toggle('active',i===ytIndex);
  });
}

function goToSlide(index){
  ytIndex=index;
  updateSlider();
}

ytPrev.addEventListener('click',()=>{
  ytIndex=(ytIndex-1+ytSlides.length)%ytSlides.length;
  updateSlider();
});

ytNext.addEventListener('click',()=>{
  ytIndex=(ytIndex+1)%ytSlides.length;
  updateSlider();
});

// HOTSPOT SOCIAL BUTTONS
const SPOTS=[
  {name:'Instagram',  cx:9.0,  cy:91.9, r:3.75, url:'https://www.instagram.com/damdamperreomx'},
  {name:'Facebook',   cx:18.6, cy:91.9, r:3.75, url:'https://www.facebook.com/djdamdamperreomx/'},
  {name:'TikTok',     cx:28.2, cy:91.9, r:3.75, url:'https://www.tiktok.com/@damdamperreo'},
  {name:'YouTube',    cx:37.8, cy:91.9, r:3.75, url:'https://www.youtube.com/@damdamperreomx'},

  {name:'Spotify',    cx:57.0, cy:91.9, r:3.75, url:'https://open.spotify.com/intl-es/artist/2Tm2uw29i6VXLI2hcY4xpz?si=_zH6G3VuRG-8jG_7PpwarQ'},
  {name:'SoundCloud', cx:66.6, cy:91.9, r:3.75, url:'https://soundcloud.com/damdamperreomx'}
];

const socialOverlay=document.getElementById('social-overlay');
const p3img=document.getElementById('p3img');

function createHotspots(){
  if(!p3img.complete){
    p3img.addEventListener('load',createHotspots);
    return;
  }
  const imgRect=p3img.getBoundingClientRect();
  const imgW=p3img.naturalWidth;
  const imgH=p3img.naturalHeight;
  
  SPOTS.forEach(spot=>{
    const a=document.createElement('a');
    a.href=spot.url;
    a.target='_blank';
    a.classList.add('social-hotspot');

    const pxX=(spot.cx/100)*imgW;

    a.style.height=`${(spot.r*2)*(imgW/imgH)}%`;
    a.style.transform='translate(-50%,-50%)';
    
    socialOverlay.appendChild(a);
  });
}

if(document.readyState==='complete'){

// TRANSITION LIGHTNING ANIMATION - SÚPER FRECUENTE Y CON FLASH
const transitions=document.querySelectorAll('.transition-lightning');
const screenFlash=document.getElementById('screenFlash');
let lastLightning=0;

function triggerLightning(){
  const now=Date.now();
  if(now-lastLightning>1200){
    const rand=Math.floor(Math.random()*transitions.length);
    const t=transitions[rand];
    t.style.animation='lightningFlash 0.8s ease-in-out';
    
    // Flash de pantalla
    screenFlash.classList.add('active');
    setTimeout(()=>screenFlash.classList.remove('active'),150);
    
    setTimeout(()=>t.style.animation='',800);
    lastLightning=now;
  }
}

// Tormenta más frecuente
setInterval(triggerLightning,1500);

// Scroll también dispara rayos
let scrollTimeout;
window.addEventListener('scroll',()=>{
  if(Math.random()>0.5)triggerLightning();
  
  // Doble rayo en scroll rápido
  clearTimeout(scrollTimeout);
  scrollTimeout=setTimeout(()=>{
    if(Math.random()>0.7){
      triggerLightning();
      setTimeout(()=>triggerLightning(),200);
    }
  },100);
});
