<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>DAM DAM — Experiencia eléctrica</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,500;14..32,700&family=Black+Ops+One&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* evita selecciones molestas, mejora la sensación táctil */
    }

    body {
      background-color: #03050E;
      color: #FFFFFF;
      font-family: "Inter", sans-serif;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    /* ---------- CANVAS DE RELÁMPAGOS VIVO (FONDO) ---------- */
    #lightning-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(circle at 30% 20%, #070b1a, #010101);
    }

    /* ---------- CONTENEDOR PRINCIPAL ---------- */
    .page-wrapper {
      position: relative;
      z-index: 1;
      padding: 0;
      margin: 0;
    }

    /* ---------- SECCIONES CON IMÁGENES: TRANSICIÓN CREMOSA ---------- */
    section {
      width: 100%;
      position: relative;
    }

    .image-wrapper {
      opacity: 0;
      transform: translateY(60px) scale(0.98);
      transition: opacity 1.2s cubic-bezier(0.2, 0.9, 0.1, 1.1), transform 1.2s cubic-bezier(0.2, 0.9, 0.1, 1.1);
      will-change: opacity, transform;
      filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.4));
    }

    .image-wrapper.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .press-page {
      display: block;
      width: 100%;
      height: auto;
      pointer-events: auto;
    }

    /* ---------- HOTSPOTS PREMIUM (sobre page3) ---------- */
    #hotspotsContainer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .hotspot {
      position: absolute;
      pointer-events: auto;
      cursor: pointer;
      border-radius: 20px;
      transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      z-index: 5;
      backdrop-filter: blur(2px);
    }

    /* Efecto de onda al hacer hover */
    .hotspot::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0%;
      height: 0%;
      background: radial-gradient(circle, rgba(58,126,255,0.5) 0%, rgba(255,45,120,0) 80%);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.4s ease-out, height 0.4s ease-out;
      z-index: -1;
    }

    .hotspot:hover::before {
      width: 180%;
      height: 180%;
    }

    .hotspot:hover {
      background-color: rgba(58, 126, 255, 0.15);
      box-shadow: 0 0 28px rgba(58, 126, 255, 0.8), inset 0 0 12px rgba(255,255,255,0.2);
      transform: scale(1.08);
      border: 1px solid rgba(255,45,120,0.6);
    }

    .hotspot-tooltip {
      position: absolute;
      bottom: 120%;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      padding: 6px 14px;
      background: rgba(3, 5, 14, 0.85);
      backdrop-filter: blur(16px);
      color: white;
      font-size: 0.7rem;
      font-weight: 500;
      border-radius: 60px;
      white-space: nowrap;
      border: 1px solid rgba(58,126,255,0.5);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
      font-family: "Inter", sans-serif;
      z-index: 10;
    }

    .hotspot:hover .hotspot-tooltip {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ---------- BOTÓN FLOTANTE DAM DAM (premium, sin texto feo) ---------- */
    .floating-brand {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 56px;
      height: 56px;
      background: radial-gradient(circle at 30% 20%, #1a1f2e, #03050E);
      backdrop-filter: blur(12px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(58,126,255,0.3), 0 8px 20px rgba(0,0,0,0.4);
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      border: 1px solid rgba(58,126,255,0.5);
      text-decoration: none;
    }

    .floating-brand:hover {
      transform: scale(1.1) rotate(5deg);
      box-shadow: 0 0 32px rgba(58,126,255,0.8);
      border-color: #FF2D78;
    }

    .floating-brand span {
      font-family: "Black Ops One", monospace;
      font-size: 1.2rem;
      color: #3A7EFF;
      text-shadow: 0 0 6px #3A7EFF;
      transition: all 0.2s;
    }

    .floating-brand:hover span {
      color: #FF2D78;
      text-shadow: 0 0 10px #FF2D78;
    }

    /* Tooltip del botón flotante */
    .floating-brand::after {
      content: "DAM DAM";
      position: absolute;
      right: 70px;
      white-space: nowrap;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      padding: 4px 12px;
      border-radius: 60px;
      font-size: 0.7rem;
      font-family: "Inter", sans-serif;
      letter-spacing: 0.1em;
      color: white;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      border: 1px solid #3A7EFF;
    }

    .floating-brand:hover::after {
      opacity: 1;
    }

    /* ---------- LOADER MÁS PREMIUM ---------- */
    .loader-overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, #03050E, #000000);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      transition: opacity 0.8s cubic-bezier(0.2, 0.9, 0.1, 1), visibility 0.8s;
    }
    .loader-overlay.hidden {
      opacity: 0;
      visibility: hidden;
    }
    .loader-title {
      font-family: "Black Ops One", monospace;
      font-size: clamp(2.5rem, 8vw, 4rem);
      background: linear-gradient(135deg, #3A7EFF, #FF2D78);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      animation: pulseGlow 1.2s infinite alternate;
      letter-spacing: 0.2em;
    }
    @keyframes pulseGlow {
      0% { text-shadow: 0 0 0px rgba(58,126,255,0); transform: scale(1); }
      100% { text-shadow: 0 0 20px rgba(58,126,255,0.6); transform: scale(1.03); }
    }
    .loader-bar-wrapper {
      width: 220px;
      height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-top: 24px;
      overflow: hidden;
    }
    .loader-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #3A7EFF, #FF2D78);
      animation: loaderProgress 2.2s ease-out forwards;
    }
    @keyframes loaderProgress {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    /* Pequeño mensaje de carga */
    .loader-sub {
      margin-top: 18px;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    /* Ajustes para móvil: hotspots más tolerantes */
    @media (max-width: 768px) {
      .hotspot {
        border-radius: 16px;
      }
      .hotspot-tooltip {
        font-size: 0.6rem;
        padding: 4px 10px;
      }
      .floating-brand {
        width: 48px;
        height: 48px;
        bottom: 20px;
        right: 20px;
      }
      .floating-brand span {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <canvas id="lightning-canvas"></canvas>

  <!-- LOADER ELEGANTE -->
  <div class="loader-overlay" id="loader">
    <div class="loader-title">DAM DAM</div>
    <div class="loader-bar-wrapper"><div class="loader-bar"></div></div>
    <div class="loader-sub">electro experiencia</div>
  </div>

  <div class="page-wrapper">
    <!-- Todas las imágenes, sin navbar ni footer -->
    <section>
      <div class="image-wrapper">
        <img src="page1.png" alt="DAM DAM" class="press-page" loading="lazy" />
      </div>
    </section>

    <section>
      <div class="image-wrapper">
        <img src="page2.png" alt="DAM DAM" class="press-page" loading="lazy" />
      </div>
    </section>

    <!-- Sección con hotspots (page3) -->
    <section style="position: relative;">
      <div class="image-wrapper" style="position: relative;">
        <img src="page3.png" alt="Shows y redes" class="press-page" id="socialImage" style="width:100%; height:auto; display:block;" />
        <div id="hotspotsContainer"></div>
      </div>
    </section>

    <section>
      <div class="image-wrapper">
        <img src="page4.png" alt="DAM DAM" class="press-page" loading="lazy" />
      </div>
    </section>
  </div>

  <!-- Botón flotante con identidad DAM DAM (sin texto feo) -->
  <a href="https://wa.me/34666666666?text=Hola%20DAM%20DAM" class="floating-brand" target="_blank" rel="noopener noreferrer">
    <span>⚡</span>
  </a>

  <script>
    (function() {
      // ----------------------------- LOADER -----------------------------
      setTimeout(() => {
        const loader = document.getElementById('loader');
        if (loader) loader.classList.add('hidden');
      }, 2600);

      // ----------------------------- FADE IN CREMOSO -----------------------------
      const wrappers = document.querySelectorAll('.image-wrapper');
      const fadeObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            fadeObserver.unobserve(entry.target);
          }
        });
      }, { threshold: 0.2, rootMargin: "0px 0px -20px 0px" });
      wrappers.forEach(w => fadeObserver.observe(w));

      // ----------------------------- HOTSPOTS PREMIUM (page3) -----------------------------
      // Dimensiones reales de page3.png: 1700x2200
      const ORIG_W = 1700;
      const ORIG_H = 2200;

      // Coordenadas originales (x, y, ancho, alto) - AJUSTAR SEGÚN TU DISEÑO
      // Son valores de ejemplo, basados en tu posición anterior. Cámbialos si es necesario.
      const hotspotsData = [
        { x: 605, y: 1860, w: 52, h: 52, name: "Instagram", url: "https://instagram.com/damdam" },
        { x: 685, y: 1860, w: 52, h: 52, name: "TikTok", url: "https://tiktok.com/@damdam" },
        { x: 765, y: 1860, w: 52, h: 52, name: "YouTube", url: "https://youtube.com/@damdam" },
        { x: 845, y: 1860, w: 52, h: 52, name: "Spotify", url: "https://open.spotify.com/artist/damdam" },
        { x: 925, y: 1860, w: 52, h: 52, name: "SoundCloud", url: "https://soundcloud.com/damdam" },
        { x: 1005, y: 1860, w: 52, h: 52, name: "X", url: "https://x.com/damdam" },
        { x: 1085, y: 1860, w: 52, h: 52, name: "Facebook", url: "https://facebook.com/damdam" }
      ];

      function buildHotspots() {
        const container = document.getElementById('hotspotsContainer');
        if (!container) return;
        container.innerHTML = '';
        const img = document.getElementById('socialImage');
        if (!img) return;
        const currentW = img.clientWidth;
        const currentH = img.clientHeight;
        const scaleX = currentW / ORIG_W;
        const scaleY = currentH / ORIG_H;

        hotspotsData.forEach(data => {
          const left = data.x * scaleX;
          const top = data.y * scaleY;
          const width = data.w * scaleX;
          const height = data.h * scaleY;

          const hotspot = document.createElement('div');
          hotspot.className = 'hotspot';
          hotspot.style.left = `${left}px`;
          hotspot.style.top = `${top}px`;
          hotspot.style.width = `${width}px`;
          hotspot.style.height = `${height}px`;

          const tooltip = document.createElement('span');
          tooltip.className = 'hotspot-tooltip';
          tooltip.textContent = data.name;
          hotspot.appendChild(tooltip);

          hotspot.addEventListener('click', (e) => {
            e.stopPropagation();
            window.open(data.url, '_blank');
          });

          container.appendChild(hotspot);
        });
      }

      window.addEventListener('load', () => { buildHotspots(); });
      window.addEventListener('resize', () => { buildHotspots(); });

      // ----------------------------- RELÁMPAGOS VIVOS (con interacción al ratón) -----------------------------
      const canvas = document.getElementById('lightning-canvas');
      const ctx = canvas.getContext('2d');
      let width = window.innerWidth, height = window.innerHeight;
      let mouseX = width / 2, mouseY = height / 2;

      window.addEventListener('resize', () => {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      });
      window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
      });

      function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }
      resizeCanvas();

      let lastStrike = 0;
      let lightningActive = false;

      function drawLightningBolt(withMouse = true) {
        // Desvanecer sutilmente
        ctx.fillStyle = 'rgba(0, 0, 0, 0.06)';
        ctx.fillRect(0, 0, width, height);

        // El rayo principal se dirige ligeramente hacia el mouse
        let targetX = mouseX;
        let targetY = mouseY * 0.6 + 50; // para que no baje demasiado
        if (!withMouse) {
          targetX = width * (0.3 + Math.random() * 0.4);
          targetY = height * (0.3 + Math.random() * 0.4);
        }

        let startX = Math.random() * width;
        let startY = -20;
        let segments = [];
        let x = startX, y = startY;
        let step = 22;
        let maxSteps = 18;
        let steps = 0;

        while (y < targetY && steps < maxSteps) {
          let nextX = x + (targetX - x) * 0.15 + (Math.random() - 0.5) * 48;
          let nextY = y + step + Math.random() * 18;
          segments.push({ x1: x, y1: y, x2: nextX, y2: nextY });
          x = nextX;
          y = nextY;
          steps++;
        }

        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.shadowBlur = 24;
        ctx.shadowColor = '#3A7EFF';
        ctx.beginPath();
        ctx.strokeStyle = '#3A7EFF';
        ctx.lineWidth = 2.6;
        for (let seg of segments) {
          ctx.moveTo(seg.x1, seg.y1);
          ctx.lineTo(seg.x2, seg.y2);
        }
        ctx.stroke();

        // Detalle extra: ramificaciones
        for (let i = 0; i < 3; i++) {
          let seg = segments[Math.floor(Math.random() * segments.length)];
          if (!seg) continue;
          ctx.beginPath();
          ctx.moveTo(seg.x2, seg.y2);
          let branchX = seg.x2 + (Math.random() - 0.5) * 60;
          let branchY = seg.y2 + 25 + Math.random() * 35;
          ctx.lineTo(branchX, branchY);
          ctx.strokeStyle = '#7BAEFF';
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }

        // Chispas (partículas)
        for (let i = 0; i < 35; i++) {
          let seg = segments[Math.floor(Math.random() * segments.length)];
          let t = Math.random();
          let px = seg.x1 + (seg.x2 - seg.x1) * t;
          let py = seg.y1 + (seg.y2 - seg.y1) * t;
          let rad = 1.5 + Math.random() * 4;
          let gradient = ctx.createRadialGradient(px, py, 0, px, py, rad * 3);
          gradient.addColorStop(0, 'rgba(200, 220, 255, 1)');
          gradient.addColorStop(1, 'rgba(58, 126, 255, 0)');
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(px, py, rad * 2.5, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }

      function animateLightning(time) {
        if (!lastStrike) lastStrike = time;
        let elapsed = time - lastStrike;
        let interval = 1600 + Math.random() * 1400;
        if (elapsed > interval) {
          drawLightningBolt(true);
          lastStrike = time;
        } else {
          // Fundido suave del canvas para persistencia
          ctx.fillStyle = 'rgba(0, 0, 0, 0.02)';
          ctx.fillRect(0, 0, width, height);
        }
        requestAnimationFrame(animateLightning);
      }
      requestAnimationFrame(animateLightning);
    })();
  </script>
</body>
</html>
